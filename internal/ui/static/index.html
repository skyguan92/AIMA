    // Polling intervals
    _timers: [],

    init() {
      this.messages = [];

      this.pollSystemStatus();
      this.pollEngines();
      this.pollModels();
      this.pollDeployments();
      this.pollFleet();
      this.pollAgentInfo();
      this.loadSupportManifest();

      this._timers.push(setInterval(() => this.pollSystemStatus(), 5000));
      this._timers.push(setInterval(() => this.pollEngines(), 30000));
      this._timers.push(setInterval(() => this.pollModels(), 30000));
      this._deployPollMs = 10000;
      this._deployTimer = setInterval(() => this.pollDeployments(), 10000);
      this._timers.push(setInterval(() => this.pollFleet(), 10000));
      this._timers.push(setInterval(() => this.pollAgentInfo(), 30000));

      this.$nextTick(() => {
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      });
    },

    destroy() {
      this._timers.forEach(t => clearInterval(t));
      this._timers = [];
      if (this._deployTimer) clearInterval(this._deployTimer);
    },

    // ── API helpers ──

    async callToolRaw(name, params) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/tools/' + encodeURIComponent(name), {
          method: 'POST',
          headers,
          body: JSON.stringify(params || {})
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        return await resp.json();
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    async callTool(name, params) {
      const raw = await this.callToolRaw(name, params);
      if (raw._err) return { _err: raw._err };
      if (raw.error && typeof raw.error === 'string') return { _err: raw.error };
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        const text = raw.content[0].text || '';
        if (raw.isError) return { _err: text };
        try { return JSON.parse(text); } catch { return { _raw: text }; }
      }
      return raw;
    },

    async callCLI(command) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/cli/exec', {
          method: 'POST',
          headers,
          body: JSON.stringify({ command: command || '' })
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        const data = await resp.json();
        if (!resp.ok) {
          const msg = data && data.error && data.error.message ? data.error.message : ('HTTP ' + resp.status);
          return { _err: msg };
        }
        return data;
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    async loadSupportManifest(force) {
      if (this.supportManifestLoading) return this.supportManifest;
      if (this.supportManifest && !force) return this.supportManifest;

      this.supportManifestLoading = true;
      this.supportManifestError = '';
      const headers = {};
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/ui/api/support-manifest', { headers });
        if (!resp.ok) throw new Error('support manifest unavailable');
        const data = await resp.json();
        if (!data || typeof data !== 'object') throw new Error('invalid support manifest');
        this.supportManifest = data;
        return data;
      } catch (e) {
        this.supportManifestError = e.message || 'support manifest unavailable';
        return null;
      } finally {
        this.supportManifestLoading = false;
      }
    },

    // Helper to get a single config value (returns string or null)
    async getConfig(key) {
      const raw = await this.callToolRaw('system.config', { key: key });
      if (raw._err) return null;
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        var text = raw.content[0].text || '';
        if (raw.isError) return null;
        // system.config get returns plain text like the value, or JSON with a value field
        try {
          var parsed = JSON.parse(text);
          return parsed.value !== undefined ? String(parsed.value) : text;
        } catch {
          return text;
        }
      }
      return null;
    },

    // ── Polling functions ──

    async pollSystemStatus() {
      const data = await this.callTool('system.status');
      if (data._err) return;
      this.systemOnline = true;

      // Capture hostname from backend
      if (data.hostname) {
        this.hostname = data.hostname;
      }
      // Get IP from browser's location (what user used to access this device)
      if (!this.selfIp) {
        const h = window.location.host || '';
        this.selfIp = h.split(':')[0];  // strip port
      }

      const hw = data.hardware;
      const met = data.metrics;

      if (hw && hw.gpu) {
        const g = hw.gpu;
        const gm = (met && met.gpu) || {};
        const memTotal = gm.memory_total_mib || g.vram_mib || 0;
        const memUsed = gm.memory_used_mib || 0;
        const memPct = memTotal > 0 ? Math.round(memUsed / memTotal * 100) : 0;
        this.hw.gpu = {
          name: g.name || 'GPU',
          util: gm.utilization_percent || 0,
          memTotal: this.fmtMiB(memTotal),
          memUsed: this.fmtMiB(memUsed),
          memPct: memPct,
          temp: gm.temperature_celsius || g.temperature_celsius || 0,
          power: gm.power_draw_watts || g.power_draw_watts || 0
        };
      } else {
        this.hw.gpu = null;
      }

      if (met && met.cpu) {
        this.hw.cpu.pct = Math.round(met.cpu.usage_percent || 0);
      }

      if (met && met.ram) {
        const mt = met.ram.total_mib || 0;
        const mu = met.ram.used_mib || 0;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(mt)
        };
      } else if (hw && hw.ram) {
        const mt = hw.ram.total_mib || 0;
        const avail = hw.ram.available_mib || 0;
        const mu = mt - avail;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(mt)
        };
      }
      this.handleSupportStatus(data.support);
      this.handleOpenClawStatus(data.openclaw);
    },

    handleSupportStatus(data) {
      if (!data || typeof data !== 'object') return;
      this.supportState = this.mergeSupportState(data);
      this.supportConnected = data.enabled === true && data.registered === true;
      // On first poll, seed _supportSeen with current state so stale data
      // doesn't appear as new chat messages.
      if (!this._supportSeen.initialized) {
        this._supportSeen.initialized = true;
        if (data.device_id) this._supportSeen.connection = data.device_id;
        if (this.supportState.activeTask) this._supportSeen.activeTask = this.supportTaskSignature(this.supportState.activeTask);
        if (this.supportState.lastTask) this._supportSeen.lastTask = this.supportTaskSignature(this.supportState.lastTask);
        const msgs = this.supportState.messages || [];
        if (msgs.length > 0) this._supportSeen.msgSeq = msgs[msgs.length - 1].seq || 0;
        return;
      }
      this.syncSupportPageUpdates();
    },

    handleOpenClawStatus(data) {
      if (!data || typeof data !== 'object') return;
      this.openclaw = {
        connected: data.connected === true,
        gatewayLive: data.gateway_live === true,
        gatewayURL: data.gateway_url || '',
        configPath: data.config_path || '',
        aimaConfigured: data.aima_configured === true,
        claimNeeded: data.claim_needed === true,
        syncReady: data.sync_ready === true,
        issues: Array.isArray(data.issues) ? data.issues : []
      };
      if (!this.openclaw.claimNeeded) {
        this.openclawClaimError = '';
      }
    },

    openClawDotClass() {
      if (this.openclaw.connected) return 'online';
      if (this.openclaw.gatewayLive || this.openclaw.aimaConfigured || this.openclaw.claimNeeded) return 'warn';
      return 'offline';
    },

    openClawStatusText() {
      if (this.openclaw.connected) return this.t('openclaw_connected');
      if (!this.openclaw.gatewayLive && (this.openclaw.gatewayURL || this.openclaw.configPath)) return this.t('openclaw_offline');
      if (this.openclaw.claimNeeded) return this.t('openclaw_claim_needed');
      if (this.openclaw.gatewayLive && this.openclaw.aimaConfigured) return this.t('openclaw_sync_needed');
      return this.t('openclaw_unconfigured');
    },

    openClawStatusTitle() {
      const parts = [];
      if (Array.isArray(this.openclaw.issues) && this.openclaw.issues.length > 0) {
        parts.push(this.openclaw.issues.join(' | '));
      }
      if (this.openclaw.gatewayURL) parts.push(this.openclaw.gatewayURL);
      if (this.openclaw.configPath) parts.push(this.openclaw.configPath);
      return parts.join(' | ');
    },

    openClawSummaryCount(summary) {
      if (!summary || typeof summary !== 'object') return 0;
      const chat = Array.isArray(summary.chat_models) ? summary.chat_models.length : 0;
      const vision = Array.isArray(summary.vision_models) ? summary.vision_models.length : 0;
      const asr = Array.isArray(summary.asr_models) ? summary.asr_models.length : 0;
      const imageGen = Array.isArray(summary.image_gen_models) ? summary.image_gen_models.length : 0;
      const tts = summary.tts_model ? 1 : 0;
      return chat + vision + asr + imageGen + tts;
    },

    async claimOpenClaw() {
      if (this.openclawClaiming) return;
      this.openclawClaiming = true;
      this.openclawClaimError = '';
      try {
        const claim = await this.callTool('openclaw.claim', {});
        if (claim._err) {
          this.openclawClaimError = claim._err;
          return;
        }
        const claimedCount = this.openClawSummaryCount(claim.claimed);
        if (claimedCount === 0) {
          const issues = Array.isArray(claim.issues) ? claim.issues : [];
          this.openclawClaimError = issues.join(' | ') || 'openclaw claim failed';
          return;
        }
        const sync = await this.callTool('openclaw.sync', {});
        if (sync._err) {
          this.openclawClaimError = sync._err;
          return;
        }
        await this.pollSystemStatus();
      } finally {
        this.openclawClaiming = false;
      }
    },

    mergeSupportState(data) {
      const next = Object.assign({}, this.supportState || {});
      if (data.enabled !== undefined) next.enabled = data.enabled === true;
      if (data.endpoint !== undefined) next.endpoint = data.endpoint || '';
      if (data.registered !== undefined) next.registered = data.registered === true;
      if (data.device_id !== undefined) next.deviceId = data.device_id || '';
      if (data.referral_code !== undefined) next.referralCode = data.referral_code || '';
      if (data.share_text !== undefined) next.shareText = data.share_text || '';
      if (data.max_tasks !== undefined) next.maxTasks = Number(data.max_tasks || 0);
      if (data.used_tasks !== undefined) next.usedTasks = Number(data.used_tasks || 0);
      if (data.budget_usd !== undefined) next.budgetUSD = Number(data.budget_usd || 0);
      if (data.spent_usd !== undefined) next.spentUSD = Number(data.spent_usd || 0);
      if (data.budget_status !== undefined) next.budgetStatus = data.budget_status || '';
      if (data.is_bound !== undefined) next.isBound = data.is_bound === true;
      if (data.referral_count !== undefined) next.referralCount = Number(data.referral_count || 0);
      if (data.active_task !== undefined) {
        next.activeTask = data.active_task || null;
      } else if (data.task_id || data.task_status || data.task_target) {
        next.activeTask = {
          task_id: data.task_id || '',
          status: data.task_status || '',
          target: data.task_target || ''
        };
      }
      if (data.last_task !== undefined) next.lastTask = data.last_task || null;
      if (data.last_message !== undefined) next.lastMessage = data.last_message || null;
      if (data.messages !== undefined) next.messages = Array.isArray(data.messages) ? data.messages : [];
      return next;
    },

    supportTaskSignature(task) {
      if (!task) return '';
      return [
        task.task_id || '',
        task.status || '',
        task.target || ''
      ].join('|');
    },

    rememberSupportResult(data) {
      if (!data || typeof data !== 'object') return;
      this.supportState = this.mergeSupportState(data);
      if (data.enabled === true || data.device_id) {
        this.supportConnected = true;
      }
      if (data.device_id) {
        this._supportSeen.connection = data.device_id;
        this._supportPageSeen.connection = data.device_id;
      }
      if (data.task_id || data.task_status || data.task_target) {
        const taskSig = this.supportTaskSignature({
          task_id: data.task_id || '',
          status: data.task_status || '',
          target: data.task_target || ''
        });
        this._supportSeen.activeTask = taskSig;
        this._supportPageSeen.activeTask = taskSig;
      }
    },

    syncSupportMessages() {
      const support = this.supportState || {};
      let changed = false;

      // Process in-memory message log (seq-based, no messages lost)
      const msgs = support.messages || [];
      const seenSeq = this._supportSeen.msgSeq || 0;
      for (const m of msgs) {
        if (!m.seq || m.seq <= seenSeq) continue;
        this._supportSeen.msgSeq = m.seq;
        const msg = (m.message || '').trim();
        if (!msg) continue;

        // Format based on type
        let prefix = '[support] ';
        if (m.type === 'command_intent') prefix = '[running] ';
        else if (m.type === 'notification') prefix = '';
        else if (m.type === 'task_completion') prefix = '[task] ';
        else if (m.type === 'info_request') prefix = '[question] ';
        else if (m.type === 'choice') prefix = '[choice] ';
        else if (m.type === 'approval') prefix = '[approval] ';

        this.messages.push({ role: 'ai', text: prefix + msg });
        changed = true;
      }

      // Track active task changes (for task status updates not covered by message log)
      const activeSig = this.supportTaskSignature(support.activeTask);
      if (activeSig && activeSig !== this._supportSeen.activeTask) {
        const task = support.activeTask;
        let text = 'Support task active: ' + (task.task_id || 'pending');
        if (task.status) text += ' (' + task.status + ')';
        if (task.target) text += ' - ' + task.target;
        this.messages.push({ role: 'ai', text: text });
        this._supportSeen.activeTask = activeSig;
        changed = true;
      } else if (!activeSig) {
        this._supportSeen.activeTask = '';
      }

      // Track task completion
      const lastTaskSig = this.supportTaskSignature(support.lastTask);
      if (lastTaskSig && lastTaskSig !== this._supportSeen.lastTask) {
        const task = support.lastTask;
        let text = 'Support task ' + (task.task_id || 'pending') + ' finished';
        if (task.status) text += ': ' + task.status;
        this.messages.push({ role: 'ai', text: text });
        this._supportSeen.lastTask = lastTaskSig;
        changed = true;
      }

      // Track initial connection (only if no messages from log yet)
      const connectionSig = support.enabled && support.registered && support.deviceId ? support.deviceId : '';
      if (connectionSig && connectionSig !== this._supportSeen.connection && !activeSig && !lastTaskSig && msgs.length === 0) {
        this.messages.push({ role: 'ai', text: 'Support connected as device ' + support.deviceId });
        this._supportSeen.connection = connectionSig;
        changed = true;
      }

      if (changed) {
        this.scrollChat();
      }
    },

    primeSupportPageSeen() {
      if (this._supportPageSeen.initialized) return;
      this._supportPageSeen.initialized = true;
      if (this.supportState.deviceId) this._supportPageSeen.connection = this.supportState.deviceId;
      if (this.supportState.activeTask) this._supportPageSeen.activeTask = this.supportTaskSignature(this.supportState.activeTask);
      if (this.supportState.lastTask) this._supportPageSeen.lastTask = this.supportTaskSignature(this.supportState.lastTask);
      const msgs = this.supportState.messages || [];
      if (msgs.length > 0) this._supportPageSeen.msgSeq = msgs[msgs.length - 1].seq || 0;
    },

    appendSupportPageMessage(text, type) {
      const msg = String(text || '').trim();
      if (!msg) return;
      this._supportPageLocalSeq += 1;
      this.supportPageFeed.push({
        id: 'support-local-' + this._supportPageLocalSeq,
        text: msg,
        type: type || 'info'
      });
      this.scrollSupportPage();
    },

    scrollSupportPage() {
      this.$nextTick(() => {
        const el = this.$refs.supportPageScroll || this.$refs.supportMsgList;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    syncSupportPageUpdates() {
      if (!this._supportPageSeen.initialized) return;

      const support = this.supportState || {};
      const msgs = support.messages || [];
      const seenSeq = this._supportPageSeen.msgSeq || 0;
      for (const m of msgs) {
        if (!m.seq || m.seq <= seenSeq) continue;
        this._supportPageSeen.msgSeq = m.seq;
        const msg = (m.message || m.content || '').trim();
        if (!msg) continue;
        this.appendSupportPageMessage(msg, m.type || 'info');
      }

      const activeSig = this.supportTaskSignature(support.activeTask);
      if (activeSig && activeSig !== this._supportPageSeen.activeTask) {
        const task = support.activeTask;
        let text = 'Support task active: ' + (task.task_id || 'pending');
        if (task.status) text += ' (' + task.status + ')';
        if (task.target) text += ' - ' + task.target;
        this.appendSupportPageMessage(text, 'command_intent');
        this._supportPageSeen.activeTask = activeSig;
        this.supportPageAwaitingDescription = false;
      } else if (!activeSig) {
        this._supportPageSeen.activeTask = '';
      }

      const lastTaskSig = this.supportTaskSignature(support.lastTask);
      if (lastTaskSig && lastTaskSig !== this._supportPageSeen.lastTask) {
        const task = support.lastTask;
        let text = 'Support task ' + (task.task_id || 'pending') + ' finished';
        if (task.status) text += ': ' + task.status;
        this.appendSupportPageMessage(text, 'task_completion');
        this._supportPageSeen.lastTask = lastTaskSig;
      }
    },

    supportPageTypeClass(type) {
      switch (type) {
        case 'command_intent':
          return 'command';
        case 'task_completion':
          return 'complete';
        case 'info_request':
          return 'question';
        case 'choice':
          return 'info';
        case 'approval':
          return 'approval';
        case 'error':
          return 'error';
        default:
          return 'info';
      }
    },

    supportPageTypeLabel(type) {
      switch (type) {
        case 'command_intent':
          return 'run';
        case 'task_completion':
          return 'task';
        case 'info_request':
          return 'ask';
        case 'choice':
          return 'you';
        case 'approval':
          return 'approval';
        case 'error':
          return 'error';
        default:
          return 'info';
      }
    },

    supportManifestLocale() {
      return this.lang === 'zh' ? 'zh_cn' : 'en_us';
    },

    supportManifestText(value, fallback) {
      if (!value) return fallback || '';
      if (typeof value === 'string') return value || fallback || '';
      const locale = this.supportManifestLocale();
      return value[locale] || value.text || value.en_us || value.zh_cn || fallback || '';
    },

    supportManifestBlock(id) {
      const blocks = this.supportManifest && this.supportManifest.blocks;
      if (!blocks || typeof blocks !== 'object') return null;
      return blocks[id] || null;
    },

    supportManifestOnboarding(key) {
      const onboarding = this.supportManifest && this.supportManifest.onboarding;
      if (!onboarding || typeof onboarding !== 'object') return null;
      return onboarding[key] || null;
    },

    supportTaskMenuBlock() {
      return this.supportManifestBlock('task_menu');
    },

    supportTaskMenuTitle() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.title, this.t('support_connect'));
    },

    supportTaskMenuSubtitle() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.subtitle, this.t('support_desc'));
    },

    supportTaskMenuPrompt() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.prompt, this.t('support_enter_desc'));
    },

    supportTaskMenuFooter() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.footer, '');
    },

    supportTaskMenuFreeformHint() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.freeform_hint, 'Examples');
    },

    supportTaskMenuSecretWarning() {
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.secret_warning, '');
    },

    supportTaskMenuOptions() {
      const block = this.supportTaskMenuBlock();
      return Array.isArray(block && block.options) ? block.options : [];
    },

    supportTaskMenuExamples() {
      const block = this.supportTaskMenuBlock();
      return Array.isArray(block && block.context && block.context.freeform_examples) ? block.context.freeform_examples : [];
    },

    supportTaskMenuGuidedFlow(key) {

    supportRecoveryPromptText() {

    supportDisconnectLabel() {

      return this.supportManifestText(block && block.context && block.context.disconnect_option_label, this.t('support_disconnect'));

    supportEntryLabel() {

    },

    supportTaskCompletionBlock() {

    },

    supportTaskCompletionText(key, fallback) {

    supportSummaryVisible() {
      return !!(this.supportState.deviceId || this.supportState.referralCode || this.supportState.shareText || this.supportState.maxTasks > 0 || this.supportState.budgetUSD > 0 || this.supportConnected);
    },

    supportBindActionLabel() {
      if (this.supportState.isBound) return this.t('support_open_workspace');
      const block = this.supportTaskMenuBlock();
      return this.supportManifestText(block && block.context && block.context.bind_option_label, this.t('support_bind'));

    supportBindSummaryText() {
      if (!this.supportState.deviceId && !this.supportConnected) return this.t('support_connecting');
      if (this.supportState.isBound) return this.t('support_bound');
      return this.t('support_unbound');
    },

    supportBudgetTasksLabel() {
      return this.supportTaskCompletionText('budget_tasks_label', this.t('support_task_budget'));
    },

    supportBudgetAmountLabel() {
      return this.supportTaskCompletionText('budget_amount_label', this.t('support_amount_budget'));
    },

    supportBudgetRemainingLabel() {
      return this.supportTaskCompletionText('budget_remaining_label', this.t('support_tasks_remaining'));
    },

    supportTaskBudgetValue() {
      if (this.supportState.maxTasks > 0) return this.supportState.usedTasks + ' / ' + this.supportState.maxTasks;
      return this.t('support_budget_pending');
    },

    supportBudgetAmountSummary() {
      const parts = [];
      if (this.supportState.budgetUSD > 0) {
        parts.push(this.supportBudgetAmountLabel() + ': ' + this.fmtUSD(this.supportState.spentUSD) + ' / ' + this.fmtUSD(this.supportState.budgetUSD));
      }
      if (this.supportState.maxTasks > 0) {
        parts.push(this.supportBudgetRemainingLabel() + ': ' + Math.max(this.supportState.maxTasks - this.supportState.usedTasks, 0));
      }
      return parts.join(' · ') || this.t('support_budget_pending');
    },

    supportShareHeading() {
      return this.supportTaskCompletionText('share_heading', this.t('support_share_heading'));
    },

    supportSharePrimaryValue() {
      if (this.supportState.referralCode) return this.supportState.referralCode;
      if (this.supportState.shareText) return this.t('support_share_ready');
      return '—';
    },

    supportShareMetaText() {
      const parts = [];
      if (this.supportState.referralCount > 0) parts.push(this.t('support_referrals') + ': ' + this.supportState.referralCount);
      if (this.supportState.shareText) parts.push(this.t('support_share_ready'));
      return parts.join(' · ') || this.t('support_share_empty');

    supportCopyShareLabel() {
      return this.t('support_share_copy');
    },

    supportCanBind() {
      return !!this.supportBindingURL();
    },

    supportPublicBaseURL() {
      const context = this.supportManifest && this.supportManifest.context;
      let base = context && context.public_base_url ? String(context.public_base_url) : '';
      if (!base) base = String(this.supportState.endpoint || '');
      if (!base) return '';
      return base
        .replace(/\/+$/, '')
        .replace(/\/platform\/api\/v1$/, '')
        .replace(/\/api\/v1$/, '')
        .replace(/\/platform$/, '');
    },

    supportBindingURL() {
      const base = this.supportPublicBaseURL();
      return base ? base + '/link' : '';
    },

    openSupportBinding() {
      const url = this.supportBindingURL();
      if (!url) return;
      window.open(url, '_blank', 'noopener');
    },

    async copySupportShareText() {
      if (!this.supportState.shareText) return;
      try {
        await navigator.clipboard.writeText(this.supportState.shareText);
        this.appendSupportPageMessage(this.supportTaskCompletionText('copied_notice', this.t('support_share_copied')), 'info');
      } catch (e) {
        this.supportPageError = (e && e.message) ? e.message : 'clipboard unavailable';
      }
    },

    supportPageShowTaskMenu() {
      return !this.supportPagePrompt && !this.supportState.activeTask;
    },

    supportPageEmptyStateText() {
      if (this.supportPageConnecting) return this.t('support_connecting');
      return this.supportTaskMenuSubtitle() || this.t('support_desc');
    },

    applySupportTaskOption(option) {
      const key = option && (option.value || option.id);
      const guided = this.supportTaskMenuGuidedFlow(key);
      const step = guided && Array.isArray(guided.steps) && guided.steps.length > 0 ? guided.steps[0] : null;
      const defaultAnswer = this.supportManifestText(step && step.default_answer, '');
      const optionLabel = this.supportManifestText(option && option.label, '');

      this.supportPageGuidedHint = this.supportManifestText(step && step.prompt, '');
      if (defaultAnswer) {
        this.supportPageDesc = defaultAnswer;
      } else if (!step) {
        this.supportPageDesc = optionLabel;
      } else {
        this.supportPageDesc = '';
      }
      if (this.supportConnected && !this.supportState.activeTask) {
        this.supportPageAwaitingDescription = true;
      }
      this.focusSupportInput();
    },

    applySupportExample(example) {
      this.supportPageDesc = this.supportManifestText(example, '');
      this.supportPageGuidedHint = '';
      if (this.supportConnected && !this.supportState.activeTask) {
        this.supportPageAwaitingDescription = true;
      }
      this.focusSupportInput();
    },

    formatSupportLinkedMessage(result) {
      const lines = ['Device linked 设备已连接!'];
      if (result && result.device_id) {
        lines.push('Device ID: ' + result.device_id);
      }
      if (result && result.budget_usd > 0) {
        let budget = 'Budget 额度: $' + Number(result.spent_usd || 0).toFixed(2) + '/$' + Number(result.budget_usd || 0).toFixed(2) + ' USD';
        if (result.max_tasks > 0) {
          budget += ' (' + (result.used_tasks || 0) + '/' + result.max_tasks + ' tasks 任务)';
        }
        lines.push(budget);
      } else if (result && result.max_tasks > 0) {
        lines.push('Budget 额度: ' + (result.used_tasks || 0) + '/' + result.max_tasks + ' tasks 任务');
      }
      if (result && result.is_bound) {
        lines.push('Account bound 已绑定账户');
      }
      if (result && result.referral_code) {
        lines.push('Your referral code 你的推荐码: ' + result.referral_code);
      }
      return lines.join('\n');
    },

    formatSupportTaskMessage(result) {
      if (!result || !result.task_id) return '';
      let text = '';
      if (result.created) {
        text = 'Support task active 任务已创建: ' + result.task_id + ' (' + (result.task_status || 'created') + ')';
      } else if (result.reused_active_task) {
        text = 'Support task active 任务继续中: ' + result.task_id + ' (' + (result.task_status || 'created') + ')';
      } else {
        text = 'Support task: ' + result.task_id + ' (' + (result.task_status || 'created') + ')';
      }
      if (result.task_target) {
        text += '\nTarget 目标: ' + result.task_target;
      }
      return text;
    },

    supportPageInputValue() {
      return this.supportPagePrompt ? this.supportPageCode : this.supportPageDesc;
    },

    setSupportPageInput(value) {
      if (this.supportPagePrompt) {
        this.supportPageCode = value;
      } else {
        this.supportPageDesc = value;
        if (value && value.trim()) this.supportPageGuidedHint = '';
      }
    },

    supportPageInputDisabled() {
      if (this.supportPageConnecting) return true;
      if (this.supportPagePrompt) return false;
      if (this.supportState.activeTask) return true;
      return !this.supportPageAwaitingDescription;
    },

    supportPageInputPlaceholder() {
      if (this.supportPagePrompt === 'recovery') return 'recovery-code';
      if (this.supportPagePrompt === 'invite') return 'invite-code';
      if (this.supportState.activeTask) return this.t('support_waiting');
      if (this.supportPageAwaitingDescription) return this.supportPageGuidedHint || this.supportTaskMenuPrompt() || this.t('support_enter_desc');
      return this.t('support_connecting');
    },

    supportPageButtonLabel() {
      if (this.supportPageConnecting) return this.t('support_connecting');
      if (this.supportPagePrompt) return this.t('send');
      if (this.supportState.activeTask) return this.t('support_waiting');
      if (this.supportPageAwaitingDescription) return this.t('send');
      return this.t('support_connect');
    },

    supportPageCanSubmit() {
      if (this.supportPageConnecting) return false;
      if (this.supportPagePrompt) return this.supportPageCode.trim().length > 0;
      if (this.supportState.activeTask) return false;
      if (this.supportPageAwaitingDescription) return this.supportPageDesc.trim().length > 0;
      return true;
    },

    focusSupportInput() {
      this.$nextTick(() => {
        const el = this.$refs.supportPageInput;
        if (el && !this.supportPageInputDisabled()) el.focus();
      });
    },

    async pollEngines() {
      const data = await this.callTool('engine.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.engines = list.map(e => ({
        id: e.id || (e.type + (e.tag || '')),
        type: e.type || 'unknown',
        variant: e.tag || '',
        available: e.available !== false
      }));
    },

    async pollModels() {
      const data = await this.callTool('model.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      // Deduplicate by name (multiple registrations of same model file)
      const seen = new Set();
      this.models = list.filter(m => {
        const n = m.name || 'unknown';
        if (seen.has(n)) return false;
        seen.add(n);
        return true;
      }).map(m => ({
        name: m.name || 'unknown',
        size: this.fmtModelSize(m.size_bytes || 0, m.format || '')
      }));
    },

    async pollDeployments() {
      const data = await this.callTool('deploy.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      const hasStarting = list.some(d => d.phase === 'starting' || (d.phase === 'running' && !d.ready));
      this.deployments = list.map(d => {
        let eta = '';
        if (d.estimated_total_s && d.startup_progress > 0 && d.startup_progress < 100) {
          const elapsed = d.estimated_total_s * d.startup_progress / 100;
          const remaining = Math.max(0, d.estimated_total_s - elapsed);
          eta = remaining >= 60 ? Math.ceil(remaining / 60) + 'm' : Math.ceil(remaining) + 's';
        }
        return {
          name: d.name || 'unknown',
          phase: d.phase || 'unknown',
          ready: d.ready || false,
          address: d.address || '',
          detail: [d.runtime, d.ready ? d.address : d.phase].filter(Boolean).join(' '),
          startup_phase: d.startup_phase || '',
          startup_progress: d.startup_progress || 0,
          startup_message: d.startup_message || '',
          error_lines: d.error_lines || '',
          failure_detail: this.summarizeDeploymentFailure(d),
          eta
        };
      });
      // Adaptive polling: 3s during startup, 10s when stable
      this._adjustDeployPoll(hasStarting);
    },

    _adjustDeployPoll(fast) {
      const want = fast ? 3000 : 10000;
      if (this._deployPollMs === want) return;
      this._deployPollMs = want;
      if (this._deployTimer) clearInterval(this._deployTimer);
      this._deployTimer = setInterval(() => this.pollDeployments(), want);
    },

    async pollFleet() {
      const data = await this.callTool('fleet.list_devices');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.fleet = list.map(d => ({
        id: d.id || d.name || 'unknown',
        name: d.name || d.id || 'unknown',
        online: d.online !== false,
        meta: (d.models && d.models.length > 0) ? d.models.join(', ') : (d.addr_v4 || ''),
        addr: d.addr_v4 || '',
        port: d.port || 6188
      }));
    },

    openDeviceUI(device) {
      if (!device.addr) return;
      const url = `http://${device.addr}:${device.port}/ui/`;
      window.open(url, '_blank');
    },

    // Combined agent status + LLM config polling
    async pollAgentInfo() {
      // Fetch agent.status
      const statusData = await this.callTool('agent.status');
      if (!statusData._err) {
        this.agentInfo.agentAvailableFromStatus = statusData.agent_available === true;
      }

      // Fetch LLM config from system.config
      var endpoint = await this.getConfig('llm.endpoint');
      if (endpoint && endpoint !== '***') this.agentInfo.llmEndpoint = endpoint;

      var model = await this.getConfig('llm.model');
      if (model && model !== '***') this.agentInfo.llmModel = model;

      var ua = await this.getConfig('llm.user_agent');
      if (ua && ua !== '***') this.agentInfo.llmUserAgent = ua;

      // Update agentAvailable based on combined info
      this.agentAvailable = this.agentInfo.agentAvailableFromStatus === true ||
        this._agentConfirmed === true;
    },
    _agentConfirmed: false,

    // ── Chat ──

    _supportPendingType: null,
    _supportPendingParams: null,

    async send() {
      const text = this.input.trim();
      if (!text || this.thinking) return;
      this.input = '';

      this.messages.push({ role: 'user', text });
      this.thinking = true;
      this.scrollChat();

      // If there's a pending support registration prompt, treat input as the code
      if (this._supportPendingType) {
        await this._retrySupportWithCode(text);
      } else if (text.startsWith('/cli')) {
        await this.sendCLI(text.slice(4).trim());
      } else if (text.startsWith('/askforhelp')) {
        await this.sendAskForHelp(text.slice('/askforhelp'.length).trim());
      } else {
        await this.sendAgent(text);
      }

      this.thinking = false;
      this.scrollChat();
      this.$nextTick(() => { if (this.$refs.chatInput) this.$refs.chatInput.focus(); });
    },

    async sendAgent(text) {
      const params = { query: text };
      if (this.sessionId) params.session_id = this.sessionId;

      // Try SSE streaming first, fall back to synchronous
      try {
        await this._sendAgentStream(text, params);
      } catch (e) {
        // SSE failed (e.g. endpoint not available) → fall back to sync
        await this._sendAgentSync(text, params);
      }
    },

    async sendAskForHelp(text) {
      const toolIndex = this.messages.length;
      const startTime = Date.now();
      const params = {};
      if (text) params.description = text;

      this.messages.push({
        role: 'tool',
        toolName: 'support.askforhelp',
        args: params,
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('support.askforhelp', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      if (data._err) {
        const errLower = (data._err || '').toLowerCase();
        const needsInvite = errLower.includes('invite_code') || errLower.includes('invite code') || errLower.includes('worker_enrollment_code') || errLower.includes('worker enrollment code');
        const needsRecovery = errLower.includes('recovery_code') || errLower.includes('recovery code');

        if (needsInvite || needsRecovery) {
          // Prompt user for the required code via chat
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'error',
            result: data._err,
            duration: duration
          });
          const promptText = needsRecovery
            ? 'This device was previously registered. Please enter your saved recovery code:\n此设备之前已经注册过，请输入已保存的恢复码：'
            : 'Device registration requires an invite code or worker code. Please enter it below:\n设备注册需要邀请码或 Worker 接入码，请在下方输入：';
          this.messages.push({ role: 'ai', text: promptText });
          this.scrollChat();

          // Wait for user input
          this._supportPromiseResolve = null;
          this._supportPendingType = needsRecovery ? 'recovery' : 'invite';
          this._supportPendingParams = params;
          this.thinking = false;
          return;
        }

        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        this.scrollChat();
        return;
      }

      this._supportPendingType = null;
      this._supportPendingParams = null;
      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });
      this.rememberSupportResult(data);

      if (data.created) {
        this.messages.push({ role: 'ai', text: 'Support task created: ' + (data.task_id || 'pending') + '\nWaiting for remote assistance... 等待远程协助中...' });
      } else if (data.reused_active_task) {
        this.messages.push({ role: 'ai', text: 'Support task already active: ' + (data.task_id || 'pending') + ' (' + (data.task_status || 'in progress') + ')\nWaiting for remote assistance... 等待远程协助中...' });
      } else {
        // Connected but no task yet — prompt user for a description
        let connMsg = 'Device linked 设备已连接! (ID: ' + (data.device_id || 'unknown') + ')';
        if (data.max_tasks > 0) connMsg += '\nBudget 额度: ' + (data.used_tasks || 0) + '/' + data.max_tasks + ' tasks';
        if (data.referral_code) connMsg += '\nReferral code 推荐码: ' + data.referral_code;
        connMsg += '\n\nWhat would you like help with? 请描述你需要的帮助：';
        this.messages.push({ role: 'ai', text: connMsg });
        this._supportPendingType = 'description';
        this._supportPendingParams = {};
        this.thinking = false;
        this.scrollChat();
        return;
      }
      this.scrollChat();
    },

    async _retrySupportWithCode(code) {
      const params = this._supportPendingParams || {};
      const pendingType = this._supportPendingType;
      if (pendingType === 'recovery') {
        params.recovery_code = code;
      } else if (pendingType === 'description') {
        params.description = code;
      } else {
        params.invite_code = code;
      }
      this._supportPendingType = null;
      this._supportPendingParams = null;

      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'support.askforhelp',
        args: params,
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('support.askforhelp', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      if (data._err) {
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        this.scrollChat();
        return;
      }

      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });
      this.rememberSupportResult(data);

      if (data.created) {
        this.messages.push({ role: 'ai', text: 'Support task created: ' + (data.task_id || 'pending') + '\nWaiting for remote assistance... 等待远程协助中...' });
      } else if (data.reused_active_task) {
        this.messages.push({ role: 'ai', text: 'Support task already active: ' + (data.task_id || 'pending') + ' (' + (data.task_status || 'in progress') + ')' });
      } else {
        this.messages.push({ role: 'ai', text: 'Support connected as device ' + (data.device_id || 'unknown') });
      }
      this.scrollChat();
    },

    // ── Support Page methods (independent from chat /askforhelp) ──

    openSupportFlow() {
      if (this.currentView === 'support') {
        this.currentView = 'chat';
        return;
      }
      this.currentView = 'support';
      this.loadSupportManifest();
      this.primeSupportPageSeen();
      if (!this.supportPageConnecting && (!this.supportConnected || (!this.supportState.activeTask && !this.supportPagePrompt && !this.supportPageAwaitingDescription))) {
        this.connectSupport();
      } else {
        this.scrollSupportPage();
        this.focusSupportInput();
      }
    },

    async connectSupport() {
      if (this.supportPageConnecting) return;
      this.supportPageConnecting = true;
      this.supportPagePrompt = null;
      this.supportPageError = '';
      this.supportPageAwaitingDescription = false;
      this.appendSupportPageMessage(this.t('support_connecting'), 'info');

      const data = await this.callTool('support.askforhelp', {});

      if (data._err) {
        const errLower = (data._err || '').toLowerCase();
        const needsInvite = errLower.includes('invite_code') || errLower.includes('invite code') || errLower.includes('worker_enrollment_code') || errLower.includes('worker enrollment code');
        const needsRecovery = errLower.includes('recovery_code') || errLower.includes('recovery code');

        if (needsInvite || needsRecovery) {
          this.supportPagePrompt = needsRecovery ? 'recovery' : 'invite';
          this.supportPageConnecting = false;
          this.appendSupportPageMessage(this.supportPagePrompt === 'recovery' ? this.supportRecoveryPromptText() : this.supportInvitePromptText(), needsRecovery ? 'info_request' : 'approval');
          this.focusSupportInput();
          return;
        }
        this.supportPageConnecting = false;
        this.supportPageError = data._err;
        this.appendSupportPageMessage(data._err, 'error');
        return;
      }

      this.supportPageConnecting = false;
      this.supportPageError = '';
      this.supportPageCode = '';
      this.rememberSupportResult(data);
      if (data.created) {
        this.appendSupportPageMessage(this.formatSupportTaskMessage(data), 'task_completion');
        this.appendSupportPageMessage(this.t('support_waiting'), 'info');
      } else if (data.reused_active_task) {
        this.appendSupportPageMessage(this.formatSupportTaskMessage(data), 'command_intent');
        this.appendSupportPageMessage(this.t('support_waiting'), 'info');
      } else {
        this.appendSupportPageMessage(this.formatSupportLinkedMessage(data), 'complete');
        this.appendSupportPageMessage(this.supportTaskMenuTitle(), 'info_request');
        this.supportPageAwaitingDescription = true;
      }
      await this.pollSystemStatus();
      this.focusSupportInput();
    },

    async submitSupportCode() {
      if (!this.supportPageCode.trim()) return;
      this.supportPageConnecting = true;
      this.supportPageError = '';
      const params = {};
      if (this.supportPageDesc.trim()) params.description = this.supportPageDesc.trim();
      if (this.supportPagePrompt === 'recovery') {
        params.recovery_code = this.supportPageCode.trim();
      } else {
        params.invite_code = this.supportPageCode.trim();
      }

      const data = await this.callTool('support.askforhelp', params);
      this.supportPageConnecting = false;

      if (data._err) {
        this.supportPageError = data._err;
        this.appendSupportPageMessage(data._err, 'error');
        return;
      }
      this.supportPageError = '';
      this.supportPagePrompt = null;
      this.supportPageCode = '';
      this.rememberSupportResult(data);
      if (data.reused_active_task) {
        this.appendSupportPageMessage(this.formatSupportTaskMessage(data), 'command_intent');
        this.appendSupportPageMessage(this.t('support_waiting'), 'info');
        this.supportPageAwaitingDescription = false;
      } else {
        this.appendSupportPageMessage(this.formatSupportLinkedMessage(data), 'complete');
        this.appendSupportPageMessage(this.supportTaskMenuTitle(), 'info_request');
        this.supportPageAwaitingDescription = true;
      }
      await this.pollSystemStatus();
      this.focusSupportInput();
    },

    async disconnectSupport() {
      this.supportPageError = '';
      const data = await this.callTool('system.config', { key: 'support.enabled', value: 'false' });
      if (data._err) {
        this.supportPageError = data._err;
        return;
      }
      this.supportConnected = false;
      this.supportPagePrompt = null;
      this.supportPageAwaitingDescription = false;
      this.supportPageGuidedHint = '';
      this.supportPageDesc = '';
      this.supportPageCode = '';
      this.supportPageFeed = [];
      this._supportPageLocalSeq = 0;
      this._supportPageSeen = { initialized: false, msgSeq: 0, activeTask: '', lastTask: '', connection: '' };
      this.supportState.activeTask = null;
      this.supportState.messages = [];
      await this.pollSystemStatus();
    },

    submitSupportInput() {
      if (this.supportPagePrompt) return this.submitSupportCode();
      if (this.supportPageAwaitingDescription) return this.submitSupportTask();
      return this.connectSupport();
    },

    async submitSupportTask() {
      if (!this.supportPageDesc.trim()) return;
      const description = this.supportPageDesc.trim();
      this.appendSupportPageMessage(description, 'choice');
      this.supportPageConnecting = true;
      this.supportPageError = '';
      const data = await this.callTool('support.askforhelp', { description: description });
      this.supportPageConnecting = false;
      if (data._err) {
        this.supportPageError = data._err;
        this.appendSupportPageMessage(data._err, 'error');
        return;
      }
      this.supportPageError = '';
      this.rememberSupportResult(data);
      this.supportPageAwaitingDescription = false;
      this.supportPageGuidedHint = '';
      if (data.created) {
        this.appendSupportPageMessage(this.formatSupportTaskMessage(data), 'task_completion');
        this.appendSupportPageMessage(this.t('support_waiting'), 'info');
      } else if (data.reused_active_task) {
        this.appendSupportPageMessage(this.formatSupportTaskMessage(data), 'command_intent');
        this.appendSupportPageMessage(this.t('support_waiting'), 'info');
      }
      this.supportPageDesc = '';
      await this.pollSystemStatus();
    },

    async _sendAgentStream(text, params) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;

      const resp = await fetch('/api/v1/agent/ask/stream', {
        method: 'POST',
        headers,
        body: JSON.stringify(params)
      });

      if (!resp.ok || !resp.body) throw new Error('SSE not available');

      // Track tool call messages by index for updating
      const toolIndexMap = {};
      const startTimes = {};
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE events from buffer
        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // keep incomplete part

        for (const part of parts) {
          if (!part.trim()) continue;
          let eventType = 'message';
          let dataStr = '';
          for (const line of part.split('\n')) {
            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
            else if (line.startsWith('data: ')) dataStr = line.slice(6);
          }
          if (!dataStr) continue;

          try {
            const data = JSON.parse(dataStr);
            this._handleStreamEvent(eventType, data, toolIndexMap, startTimes);
          } catch {}
        }
      }
    },

    _handleStreamEvent(eventType, data, toolIndexMap, startTimes) {
      if (eventType === 'tool_start') {
        const msgIdx = this.messages.length;
        toolIndexMap[data.index] = msgIdx;
        startTimes[data.index] = Date.now();
        this.messages.push({
          role: 'tool',
          toolName: data.name,
          args: data.arguments || {},
          status: 'running',
          expanded: false
        });
        this.scrollChat();
      } else if (eventType === 'tool_done') {
        const msgIdx = toolIndexMap[data.index];
        if (msgIdx !== undefined && this.messages[msgIdx]) {
          const elapsed = startTimes[data.index] ? ((Date.now() - startTimes[data.index]) / 1000).toFixed(1) + 's' : '';
          this.messages.splice(msgIdx, 1, {
            ...this.messages[msgIdx],
            status: data.is_error ? 'error' : 'success',
            result: data.result || null,
            duration: elapsed
          });
        }
        this.scrollChat();
      } else if (eventType === 'response') {
        this._agentConfirmed = true;
        this.agentAvailable = true;
        if (data.session_id) this.sessionId = data.session_id;
        const result = data.result || JSON.stringify(data);
        this.messages.push({ role: 'ai', text: result });
        this.scrollChat();
      } else if (eventType === 'error') {
        this._agentConfirmed = false;
        this.agentAvailable = false;
        this.messages.push({ role: 'ai', text: data.error || 'Agent error' });
        this.scrollChat();
      }
    },

    async _sendAgentSync(text, params) {
      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'agent.ask',
        args: { query: text },
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('agent.ask', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

      if (data._err) {
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this._agentConfirmed = false;
        this.agentAvailable = false;
        await this.sendDirect(text);
        return;
      }

      this._agentConfirmed = true;
      this.agentAvailable = true;
      if (data.session_id) this.sessionId = data.session_id;

      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });

      if (data.tool_calls && Array.isArray(data.tool_calls)) {
        for (const tc of data.tool_calls) {
          this.messages.push({
            role: 'tool',
            toolName: tc.name || tc.tool || 'unknown',
            args: tc.args || tc.arguments || {},
            status: tc.error ? 'error' : 'success',
            result: tc.result || tc.error || null,
            expanded: false
          });
        }
      }

      const result = data.result || data._raw || data.response || JSON.stringify(data);
      this.messages.push({ role: 'ai', text: result });
      this.scrollChat();
    },

    async sendDirect(text) {
      const toolMap = {
        'status': 'system.status',
        'hardware': 'hardware.detect',
        'detect': 'hardware.detect',
        'metrics': 'hardware.metrics',
        'models': 'model.list',
        'engines': 'engine.list',
        'deployments': 'deploy.list',
        'deploys': 'deploy.list',
        'fleet': 'fleet.list_devices',
        'devices': 'fleet.list_devices'
      };

      const lower = text.toLowerCase().trim();

      if (lower === 'help' || lower === '?') {
        this.messages.push({ role: 'ai', text: this.t('help_text') });
        this.scrollChat();
        return;
      }

      if (toolMap[lower]) {
        const toolName = toolMap[lower];
        const toolIndex = this.messages.length;

        // Show tool call
        this.messages.push({
          role: 'tool',
          toolName: toolName,
          args: {},
          status: 'running',
          expanded: false
        });
        this.scrollChat();

        const data = await this.callTool(toolName);

        if (data._err) {
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'error',
            result: data._err
          });
          this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        } else {
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'success',
            result: data
          });
          this.messages.push({ role: 'ai', text: JSON.stringify(data, null, 2) });
        }
        this.scrollChat();
        return;
      }

      this.messages.push({ role: 'error', text: this.t('agent_unavailable') });
    },

    // ── CLI Mode (/cli prefix) ──

    async sendCLI(args) {
      const command = (args || '').trim() || 'help';

      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'aima',
        args: command,
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callCLI(command);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

      if (data._err) {
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this.messages.push({ role: 'error', text: 'Error: ' + data._err });
      } else {
        const output = data.output || '';
        const exitCode = data.exit_code || 0;
        const resultText = output || data.error || '';
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: exitCode === 0 ? 'success' : 'error',
          result: resultText,
          duration: duration
        });
        if (output) {
          this.messages.push({ role: exitCode === 0 ? 'ai' : 'system', text: output });
        }
        if (exitCode !== 0 && data.error) {
          this.messages.push({ role: 'error', text: data.error });
        } else if (exitCode === 0) {
          const head = Array.isArray(data.args) && data.args.length > 0 ? String(data.args[0]).toLowerCase() : '';
          if (head && head !== 'help' && !head.startsWith('-')) {
            this.pollSystemStatus();
            this.pollEngines();
            this.pollModels();
            this.pollDeployments();
          }
        }
      }
      this.scrollChat();
    },

    scrollChat() {
      this.$nextTick(() => {
        const el = this.$refs.chatMessages;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    // ── Settings modal ──

    async openSettings() {
      this.settingsFeedback = null;
      // General tab
      this.settingsForm.apiKey = this.apiKey;
      // Agent tab
      this.settingsForm.llmEndpoint = this.agentInfo.llmEndpoint || '';
      this.settingsForm.llmModel = this.agentInfo.llmModel || '';
      this.settingsForm.llmApiKey = '';
      this.settingsForm.llmUserAgent = this.agentInfo.llmUserAgent || '';
      // Load extra params
      try {
        var ep = await this.callTool('system.config', { key: 'llm.extra_params' });
        this.settingsForm.llmExtraParams = (ep && ep.value && ep.value !== '***') ? ep.value : '';
      } catch(e) { this.settingsForm.llmExtraParams = ''; }
      // Monitoring tab — load from patrol config
      try {
        var pc = await this.callTool('agent.patrol_config', { action: 'get' });
        if (pc) {
          this.settingsForm.patrolInterval = (pc.Interval === 0 || pc.Interval) ? this.formatGoDuration(pc.Interval) : '5m';
          this.settingsForm.selfHeal = pc.SelfHealEnabled !== false;
          this.settingsForm.gpuTempWarn = typeof pc.GPUTempWarnC === 'number' ? pc.GPUTempWarnC : 85;
          this.settingsForm.gpuIdlePct = typeof pc.GPUIdlePct === 'number' ? pc.GPUIdlePct : 10;
          this.settingsForm.gpuIdleMinutes = typeof pc.GPUIdleMinutes === 'number' ? pc.GPUIdleMinutes : 15;
          this.settingsForm.vramOpportunityPct = typeof pc.VRAMOpportunityPct === 'number' ? pc.VRAMOpportunityPct : 50;
        }
      } catch(e) {}
      // Connectivity tab
      try {
        var ce = await this.callTool('system.config', { key: 'central.endpoint' });
        this.settingsForm.centralEndpoint = (ce && ce.value && ce.value !== '***') ? ce.value : '';
      } catch(e) { this.settingsForm.centralEndpoint = ''; }
      this.settingsForm.centralApiKey = '';
      try {
        var se = await this.callTool('system.config', { key: 'support.enabled' });
        this.settingsForm.supportEnabled = se && (se.value === 'true' || se.value === '1');
      } catch(e) { this.settingsForm.supportEnabled = false; }
      try {
        var sep = await this.callTool('system.config', { key: 'support.endpoint' });
        this.settingsForm.supportEndpoint = (sep && sep.value && sep.value !== '***') ? sep.value : '';
      } catch(e) { this.settingsForm.supportEndpoint = ''; }
      this.showSettings = true;
    },

    formatGoDuration(ns) {
      if (typeof ns === 'string') return ns;
      var sec = Math.floor(ns / 1e9);
      if (sec >= 3600 && sec % 3600 === 0) return (sec / 3600) + 'h';
      if (sec >= 60 && sec % 60 === 0) return (sec / 60) + 'm';
      return sec + 's';
    },

    async saveSettings() {
      this.settingsSaving = true;
      this.settingsFeedback = null;
      var errors = [];

      // General tab: API key to localStorage
      this.apiKey = this.settingsForm.apiKey;
      if (this.apiKey) {
        localStorage.setItem('aima_api_key', this.apiKey);
      } else {
        localStorage.removeItem('aima_api_key');
      }

      // Monitoring tab: patrol config
      var patrolKeys = [
        { key: 'interval', value: this.settingsForm.patrolInterval },
        { key: 'gpu_temp_warn', value: String(this.settingsForm.gpuTempWarn) },
        { key: 'gpu_idle_pct', value: String(this.settingsForm.gpuIdlePct) },
        { key: 'gpu_idle_minutes', value: String(this.settingsForm.gpuIdleMinutes) },
        { key: 'vram_opportunity_pct', value: String(this.settingsForm.vramOpportunityPct) },
        { key: 'self_heal', value: this.settingsForm.selfHeal ? 'true' : 'false' }
      ];
      for (var pk of patrolKeys) {
        try {
          var pr = await this.callTool('agent.patrol_config', { action: 'set', key: pk.key, value: pk.value });
          if (pr && pr._err) errors.push(pk.key + ': ' + pr._err);
        } catch(e) { errors.push(pk.key + ': ' + e.message); }
      }

      // Agent tab: LLM config
      var r = await this.callTool('system.config', { key: 'llm.endpoint', value: this.settingsForm.llmEndpoint });
      if (r._err) errors.push('llm.endpoint: ' + r._err);
      var r2 = await this.callTool('system.config', { key: 'llm.model', value: this.settingsForm.llmModel });
      if (r2._err) errors.push('llm.model: ' + r2._err);
      if (this.settingsForm.llmApiKey) {
        var r3 = await this.callTool('system.config', { key: 'llm.api_key', value: this.settingsForm.llmApiKey });
        if (r3._err) errors.push('llm.api_key: ' + r3._err);
      }
      var r4 = await this.callTool('system.config', { key: 'llm.user_agent', value: this.settingsForm.llmUserAgent });
      if (r4._err) errors.push('llm.user_agent: ' + r4._err);
      var r5 = await this.callTool('system.config', { key: 'llm.extra_params', value: this.settingsForm.llmExtraParams });
      if (r5._err) errors.push('llm.extra_params: ' + r5._err);

      // Connectivity tab
      var r6 = await this.callTool('system.config', { key: 'central.endpoint', value: this.settingsForm.centralEndpoint });
      if (r6._err) errors.push('central.endpoint: ' + r6._err);
      if (this.settingsForm.centralApiKey) {
        var r7 = await this.callTool('system.config', { key: 'central.api_key', value: this.settingsForm.centralApiKey });
        if (r7._err) errors.push('central.api_key: ' + r7._err);
      }
      var r8 = await this.callTool('system.config', { key: 'support.enabled', value: this.settingsForm.supportEnabled ? 'true' : 'false' });
      if (r8._err) errors.push('support.enabled: ' + r8._err);
      var r9 = await this.callTool('system.config', { key: 'support.endpoint', value: this.settingsForm.supportEndpoint });
      if (r9._err) errors.push('support.endpoint: ' + r9._err);

      this.settingsSaving = false;

      if (errors.length > 0) {
        this.settingsFeedback = { type: 'error', text: this.t('settings_error') + ' ' + errors.join('; ') };
      } else {
        this.settingsFeedback = { type: 'success', text: this.t('settings_saved') };
        await this.pollAgentInfo();
        setTimeout(() => { this.showSettings = false; this.settingsFeedback = null; }, 1200);
      }
    },

    async clearSettings() {
      this.apiKey = '';
      localStorage.removeItem('aima_api_key');
      this.settingsForm = {
        apiKey: '', patrolInterval: '5m', selfHeal: true, gpuTempWarn: 85,
        gpuIdlePct: 10, gpuIdleMinutes: 15, vramOpportunityPct: 50,
        llmEndpoint: '', llmModel: '', llmApiKey: '', llmUserAgent: '', llmExtraParams: '',
        centralEndpoint: '', centralApiKey: '', supportEnabled: false, supportEndpoint: ''
      };

      // Clear server-side LLM config
      await this.callTool('system.config', { key: 'llm.endpoint', value: '' });
      await this.callTool('system.config', { key: 'llm.model', value: '' });
      await this.callTool('system.config', { key: 'llm.api_key', value: '' });
      await this.callTool('system.config', { key: 'llm.user_agent', value: '' });
      await this.callTool('system.config', { key: 'llm.extra_params', value: '' });
      await this.callTool('system.config', { key: 'central.endpoint', value: '' });
      await this.callTool('system.config', { key: 'central.api_key', value: '' });
      await this.callTool('system.config', { key: 'support.enabled', value: '' });
      await this.callTool('system.config', { key: 'support.endpoint', value: '' });

      // Reset patrol to defaults
      await this.callTool('agent.patrol_config', { action: 'set', key: 'interval', value: '5m' });
      await this.callTool('agent.patrol_config', { action: 'set', key: 'self_heal', value: 'true' });
      await this.callTool('agent.patrol_config', { action: 'set', key: 'gpu_temp_warn', value: '85' });
      await this.callTool('agent.patrol_config', { action: 'set', key: 'gpu_idle_pct', value: '10' });
      await this.callTool('agent.patrol_config', { action: 'set', key: 'gpu_idle_minutes', value: '15' });
      await this.callTool('agent.patrol_config', { action: 'set', key: 'vram_opportunity_pct', value: '50' });

      this.agentInfo.llmEndpoint = '';
      this.agentInfo.llmModel = '';
      this.settingsFeedback = { type: 'success', text: this.t('settings_cleared') };
      setTimeout(() => { this.settingsFeedback = null; }, 2000);
    },

    // Mobile tab
    setMobileTab(tab) {
      this.mobileTab = this.mobileTab === tab ? 'chat' : tab;
      if (this.mobileTab === 'support') {
        this.loadSupportManifest();
        this.primeSupportPageSeen();
        if (!this.supportPageConnecting && (!this.supportConnected || (!this.supportState.activeTask && !this.supportPagePrompt && !this.supportPageAwaitingDescription))) {
          this.connectSupport();
        } else {
          this.scrollSupportPage();
          this.focusSupportInput();
        }
      }
    },

    // Global keyboard shortcut
    handleGlobalKey(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      }
    },

    // ── Helpers ──

    truncateUrl(url) {
      if (!url) return '';
      // Remove protocol prefix for display
      var short = url.replace(/^https?:\/\//, '');
      return short.length > 24 ? short.substring(0, 22) + '...' : short;
    },

    fmtMiB(mib) {
      if (!mib || mib <= 0) return '0M';
      if (mib >= 1024) return (mib / 1024).toFixed(1) + 'G';
      return mib + 'M';
    },

    fmtUSD(amount) {
      return '$' + Number(amount || 0).toFixed(2);
    },

    fmtModelSize(bytes, format) {
      if (bytes > 0) {
        const gb = bytes / (1024 * 1024 * 1024);
        return gb >= 1 ? gb.toFixed(1) + 'G' : (bytes / (1024 * 1024)).toFixed(0) + 'M';
      }
      return format || '';
    },

    summarizeDeploymentFailure(dep) {
      if (!dep || dep.phase !== 'failed') return '';

      const startupMessage = String(dep.startup_message || '').trim();
      if (startupMessage && !/^(initializing|loading|scheduling|pulling|ready)/i.test(startupMessage)) {
        return startupMessage;
      }

      const lines = String(dep.error_lines || '')
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);
      const noise = /(tokens per second|eval time|total time|done request|all slots are idle|slot\s+release|stop processing)/i;
      const signal = /(error|failed|exception|panic|traceback|out of memory|oom|killed|denied|not found|no such|cannot|unable|fatal)/i;

      const match = lines.find(line => signal.test(line) && !noise.test(line));
      if (!match) return '';
      return match.length > 180 ? match.slice(0, 177) + '...' : match;
    }
  };
}
</script>
