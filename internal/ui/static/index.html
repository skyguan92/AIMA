function aimaApp() {
  return {
    // i18n
    lang: localStorage.getItem('aima_lang') || 'en',
    theme: localStorage.getItem('aima_theme') || 'dark',

    saveTheme() {
      localStorage.setItem('aima_theme', this.theme);
      document.documentElement.setAttribute('data-theme', this.theme);
    },


    t(key) {
      var dict = I18N[this.lang] || I18N.en;
      return dict[key] || I18N.en[key] || key;
    },

    saveLang() {
      localStorage.setItem('aima_lang', this.lang);
      // Update welcome message to match language
      if (this.messages.length === 1 && this.messages[0].role === 'system') {
        this.messages[0].text = this.t('welcome');
      }
    },

    // State
    systemOnline: false,
    agentAvailable: false,
    showSettings: false,
    apiKey: localStorage.getItem('aima_api_key') || '',
    input: '',
    thinking: false,
    messages: [],
    sessionId: '',
    mobileTab: 'chat',

    // Settings modal form
    settingsForm: { apiKey: '', llmEndpoint: '', llmModel: '', llmApiKey: '', llmUserAgent: '' },
    settingsSaving: false,
    settingsFeedback: null,

    // Agent info
    agentInfo: {
      llmEndpoint: '',
      llmModel: '',
      llmUserAgent: '',
      agentAvailableFromStatus: false
    },

    // Dashboard data
    hw: {
      gpu: null,
      cpu: { pct: 0 },
      mem: { pct: 0, used: '0', total: '0' }
    },
    hostname: '',
    selfIp: '',
    engines: [],
    models: [],
    deployments: [],
    fleet: [],
    // View toggle (chat / support)
    currentView: 'chat',
    // Support page state
    supportConnected: false,
    supportPageConnecting: false,
    supportPagePrompt: null,
    supportPageDesc: '',
    supportPageCode: '',
    supportPageError: '',

    supportState: {
      enabled: false,
      registered: false,
      deviceId: '',
      activeTask: null,
      lastTask: null,
      lastMessage: null,
      messages: []
    },
    _supportSeen: {
      connection: '',
      activeTask: '',
      lastTask: '',
      msgSeq: 0,
      initialized: false
    },

    // Polling intervals
    _timers: [],

    init() {
      // Set welcome message in current language
      this.messages = [{ role: 'system', text: this.t('welcome') }];

      this.pollSystemStatus();
      this.pollEngines();
      this.pollModels();
      this.pollDeployments();
      this.pollFleet();
      this.pollAgentInfo();

      this._timers.push(setInterval(() => this.pollSystemStatus(), 5000));
      this._timers.push(setInterval(() => this.pollEngines(), 30000));
      this._timers.push(setInterval(() => this.pollModels(), 30000));
      this._deployPollMs = 10000;
      this._deployTimer = setInterval(() => this.pollDeployments(), 10000);
      this._timers.push(setInterval(() => this.pollFleet(), 10000));
      this._timers.push(setInterval(() => this.pollAgentInfo(), 30000));

      this.$nextTick(() => {
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      });
    },

    destroy() {
      this._timers.forEach(t => clearInterval(t));
      this._timers = [];
      if (this._deployTimer) clearInterval(this._deployTimer);
    },

    // ── API helpers ──

    async callToolRaw(name, params) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/tools/' + encodeURIComponent(name), {
          method: 'POST',
          headers,
          body: JSON.stringify(params || {})
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        return await resp.json();
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    async callTool(name, params) {
      const raw = await this.callToolRaw(name, params);
      if (raw._err) return { _err: raw._err };
      if (raw.error && typeof raw.error === 'string') return { _err: raw.error };
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        const text = raw.content[0].text || '';
        if (raw.isError) return { _err: text };
        try { return JSON.parse(text); } catch { return { _raw: text }; }
      }
      return raw;
    },

    async callCLI(command) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/cli/exec', {
          method: 'POST',
          headers,
          body: JSON.stringify({ command: command || '' })
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        const data = await resp.json();
        if (!resp.ok) {
          const msg = data && data.error && data.error.message ? data.error.message : ('HTTP ' + resp.status);
          return { _err: msg };
        }
        return data;
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    // Helper to get a single config value (returns string or null)
    async getConfig(key) {
      const raw = await this.callToolRaw('system.config', { key: key });
      if (raw._err) return null;
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        var text = raw.content[0].text || '';
        if (raw.isError) return null;
        // system.config get returns plain text like the value, or JSON with a value field
        try {
          var parsed = JSON.parse(text);
          return parsed.value !== undefined ? String(parsed.value) : text;
        } catch {
          return text;
        }
      }
      return null;
    },

    // ── Polling functions ──

    async pollSystemStatus() {
      const data = await this.callTool('system.status');
      if (data._err) return;
      this.systemOnline = true;

      // Capture hostname from backend
      if (data.hostname) {
        this.hostname = data.hostname;
      }
      // Get IP from browser's location (what user used to access this device)
      if (!this.selfIp) {
        const h = window.location.host || '';
        this.selfIp = h.split(':')[0];  // strip port
      }

      const hw = data.hardware;
      const met = data.metrics;

      if (hw && hw.gpu) {
        const g = hw.gpu;
        const gm = (met && met.gpu) || {};
        const memTotal = gm.memory_total_mib || g.vram_mib || 0;
        const memUsed = gm.memory_used_mib || 0;
        const memPct = memTotal > 0 ? Math.round(memUsed / memTotal * 100) : 0;
        this.hw.gpu = {
          name: g.name || 'GPU',
          util: gm.utilization_percent || 0,
          memTotal: this.fmtMiB(memTotal),
          memUsed: this.fmtMiB(memUsed),
          memPct: memPct,
          temp: gm.temperature_celsius || g.temperature_celsius || 0,
          power: gm.power_draw_watts || g.power_draw_watts || 0
        };
      } else {
        this.hw.gpu = null;
      }

      if (met && met.cpu) {
        this.hw.cpu.pct = Math.round(met.cpu.usage_percent || 0);
      }

      if (met && met.ram) {
        const mt = met.ram.total_mib || 0;
        const mu = met.ram.used_mib || 0;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(mt)
        };
      } else if (hw && hw.ram) {
        const mt = hw.ram.total_mib || 0;
        const avail = hw.ram.available_mib || 0;
        const mu = mt - avail;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(mt)
        };
      }
      this.handleSupportStatus(data.support);
    },

    handleSupportStatus(data) {
      if (!data || typeof data !== 'object') return;
      this.supportState = {
        enabled: data.enabled === true,
        registered: data.registered === true,
        deviceId: data.device_id || '',
        activeTask: data.active_task || null,
        lastTask: data.last_task || null,
        lastMessage: data.last_message || null,
        messages: Array.isArray(data.messages) ? data.messages : []
      };
      this.supportConnected = data.enabled === true && data.registered === true;
      // On first poll, seed _supportSeen with current state so stale data
      // doesn't appear as new chat messages.
      if (!this._supportSeen.initialized) {
        this._supportSeen.initialized = true;
        if (data.device_id) this._supportSeen.connection = data.device_id;
        if (this.supportState.activeTask) this._supportSeen.activeTask = this.supportTaskSignature(this.supportState.activeTask);
        if (this.supportState.lastTask) this._supportSeen.lastTask = this.supportTaskSignature(this.supportState.lastTask);
        const msgs = this.supportState.messages || [];
        if (msgs.length > 0) this._supportSeen.msgSeq = msgs[msgs.length - 1].seq || 0;
        return;
      }
      this.syncSupportMessages();
    },

    supportTaskSignature(task) {
      if (!task) return '';
      return [
        task.task_id || '',
        task.status || '',
        task.target || '',
        task.updated_at || ''
      ].join('|');
    },

    rememberSupportResult(data) {
      if (!data || typeof data !== 'object') return;
      if (data.device_id) {
        this._supportSeen.connection = data.device_id;
      }
      if (data.task_id || data.task_status || data.task_target) {
        this._supportSeen.activeTask = this.supportTaskSignature({
          task_id: data.task_id || '',
          status: data.task_status || '',
          target: data.task_target || ''
        });
      }
    },

    syncSupportMessages() {
      const support = this.supportState || {};
      let changed = false;

      // Process in-memory message log (seq-based, no messages lost)
      const msgs = support.messages || [];
      const seenSeq = this._supportSeen.msgSeq || 0;
      for (const m of msgs) {
        if (!m.seq || m.seq <= seenSeq) continue;
        this._supportSeen.msgSeq = m.seq;
        const msg = (m.message || '').trim();
        if (!msg) continue;

        // Format based on type
        let prefix = '[support] ';
        if (m.type === 'command_intent') prefix = '[running] ';
        else if (m.type === 'notification') prefix = '';
        else if (m.type === 'task_completion') prefix = '[task] ';
        else if (m.type === 'info_request') prefix = '[question] ';
        else if (m.type === 'choice') prefix = '[choice] ';
        else if (m.type === 'approval') prefix = '[approval] ';

        this.messages.push({ role: 'ai', text: prefix + msg });
        changed = true;
      }

      // Track active task changes (for task status updates not covered by message log)
      const activeSig = this.supportTaskSignature(support.activeTask);
      if (activeSig && activeSig !== this._supportSeen.activeTask) {
        const task = support.activeTask;
        let text = 'Support task active: ' + (task.task_id || 'pending');
        if (task.status) text += ' (' + task.status + ')';
        if (task.target) text += ' - ' + task.target;
        this.messages.push({ role: 'ai', text: text });
        this._supportSeen.activeTask = activeSig;
        changed = true;
      } else if (!activeSig) {
        this._supportSeen.activeTask = '';
      }

      // Track task completion
      const lastTaskSig = this.supportTaskSignature(support.lastTask);
      if (lastTaskSig && lastTaskSig !== this._supportSeen.lastTask) {
        const task = support.lastTask;
        let text = 'Support task ' + (task.task_id || 'pending') + ' finished';
        if (task.status) text += ': ' + task.status;
        this.messages.push({ role: 'ai', text: text });
        this._supportSeen.lastTask = lastTaskSig;
        changed = true;
      }

      // Track initial connection (only if no messages from log yet)
      const connectionSig = support.enabled && support.registered && support.deviceId ? support.deviceId : '';
      if (connectionSig && connectionSig !== this._supportSeen.connection && !activeSig && !lastTaskSig && msgs.length === 0) {
        this.messages.push({ role: 'ai', text: 'Support connected as device ' + support.deviceId });
        this._supportSeen.connection = connectionSig;
        changed = true;
      }

      if (changed) {
        this.scrollChat();
      }
    },

    async pollEngines() {
      const data = await this.callTool('engine.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.engines = list.map(e => ({
        id: e.id || (e.type + (e.tag || '')),
        type: e.type || 'unknown',
        variant: e.tag || '',
        available: e.available !== false
      }));
    },

    async pollModels() {
      const data = await this.callTool('model.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      // Deduplicate by name (multiple registrations of same model file)
      const seen = new Set();
      this.models = list.filter(m => {
        const n = m.name || 'unknown';
        if (seen.has(n)) return false;
        seen.add(n);
        return true;
      }).map(m => ({
        name: m.name || 'unknown',
        size: this.fmtModelSize(m.size_bytes || 0, m.format || '')
      }));
    },

    async pollDeployments() {
      const data = await this.callTool('deploy.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      const hasStarting = list.some(d => d.phase === 'starting' || (d.phase === 'running' && !d.ready));
      this.deployments = list.map(d => {
        let eta = '';
        if (d.estimated_total_s && d.startup_progress > 0 && d.startup_progress < 100) {
          const elapsed = d.estimated_total_s * d.startup_progress / 100;
          const remaining = Math.max(0, d.estimated_total_s - elapsed);
          eta = remaining >= 60 ? Math.ceil(remaining / 60) + 'm' : Math.ceil(remaining) + 's';
        }
        return {
          name: d.name || 'unknown',
          phase: d.phase || 'unknown',
          ready: d.ready || false,
          address: d.address || '',
          detail: [d.runtime, d.ready ? d.address : d.phase].filter(Boolean).join(' '),
          startup_phase: d.startup_phase || '',
          startup_progress: d.startup_progress || 0,
          startup_message: d.startup_message || '',
          error_lines: d.error_lines || '',
          eta
        };
      });
      // Adaptive polling: 3s during startup, 10s when stable
      this._adjustDeployPoll(hasStarting);
    },

    _adjustDeployPoll(fast) {
      const want = fast ? 3000 : 10000;
      if (this._deployPollMs === want) return;
      this._deployPollMs = want;
      if (this._deployTimer) clearInterval(this._deployTimer);
      this._deployTimer = setInterval(() => this.pollDeployments(), want);
    },

    async pollFleet() {
      const data = await this.callTool('fleet.list_devices');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.fleet = list.map(d => ({
        id: d.id || d.name || 'unknown',
        name: d.name || d.id || 'unknown',
        online: d.online !== false,
        meta: (d.models && d.models.length > 0) ? d.models.join(', ') : (d.addr_v4 || ''),
        addr: d.addr_v4 || '',
        port: d.port || 6188
      }));
    },

    openDeviceUI(device) {
      if (!device.addr) return;
      const url = `http://${device.addr}:${device.port}/ui/`;
      window.open(url, '_blank');
    },

    // Combined agent status + LLM config polling
    async pollAgentInfo() {
      // Fetch agent.status
      const statusData = await this.callTool('agent.status');
      if (!statusData._err) {
        this.agentInfo.agentAvailableFromStatus = statusData.agent_available === true;
      }

      // Fetch LLM config from system.config
      var endpoint = await this.getConfig('llm.endpoint');
      if (endpoint && endpoint !== '***') this.agentInfo.llmEndpoint = endpoint;

      var model = await this.getConfig('llm.model');
      if (model && model !== '***') this.agentInfo.llmModel = model;

      var ua = await this.getConfig('llm.user_agent');
      if (ua && ua !== '***') this.agentInfo.llmUserAgent = ua;

      // Update agentAvailable based on combined info
      this.agentAvailable = this.agentInfo.agentAvailableFromStatus === true ||
        this._agentConfirmed === true;
    },
    _agentConfirmed: false,

    // ── Chat ──

    _supportPendingType: null,
    _supportPendingParams: null,

    async send() {
      const text = this.input.trim();
      if (!text || this.thinking) return;
      this.input = '';

      // Clear welcome message on first user input
      if (this.messages.length === 1 && this.messages[0].role === 'system') {
        this.messages = [];
      }

      this.messages.push({ role: 'user', text });
      this.thinking = true;
      this.scrollChat();

      // If there's a pending support registration prompt, treat input as the code
      if (this._supportPendingType) {
        await this._retrySupportWithCode(text);
      } else if (text.startsWith('/cli')) {
        await this.sendCLI(text.slice(4).trim());
      } else if (text.startsWith('/askforhelp')) {
        await this.sendAskForHelp(text.slice('/askforhelp'.length).trim());
      } else {
        await this.sendAgent(text);
      }

      this.thinking = false;
      this.scrollChat();
      this.$nextTick(() => { if (this.$refs.chatInput) this.$refs.chatInput.focus(); });
    },

    async sendAgent(text) {
      const params = { query: text };
      if (this.sessionId) params.session_id = this.sessionId;

      // Try SSE streaming first, fall back to synchronous
      try {
        await this._sendAgentStream(text, params);
      } catch (e) {
        // SSE failed (e.g. endpoint not available) → fall back to sync
        await this._sendAgentSync(text, params);
      }
    },

    async sendAskForHelp(text) {
      const toolIndex = this.messages.length;
      const startTime = Date.now();
      const params = {};
      if (text) params.description = text;

      this.messages.push({
        role: 'tool',
        toolName: 'support.askforhelp',
        args: params,
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('support.askforhelp', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      if (data._err) {
        const errLower = (data._err || '').toLowerCase();
        const needsInvite = errLower.includes('invite_code') || errLower.includes('invite code') || errLower.includes('worker_enrollment_code') || errLower.includes('worker enrollment code');
        const needsRecovery = errLower.includes('recovery_code') || errLower.includes('recovery code');

        if (needsInvite || needsRecovery) {
          // Prompt user for the required code via chat
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'error',
            result: data._err,
            duration: duration
          });
          const promptText = needsRecovery
            ? 'This device was previously registered. Please enter your saved recovery code:\n此设备之前已经注册过，请输入已保存的恢复码：'
            : 'Device registration requires an invite code or worker code. Please enter it below:\n设备注册需要邀请码或 Worker 接入码，请在下方输入：';
          this.messages.push({ role: 'ai', text: promptText });
          this.scrollChat();

          // Wait for user input
          this._supportPromiseResolve = null;
          this._supportPendingType = needsRecovery ? 'recovery' : 'invite';
          this._supportPendingParams = params;
          this.thinking = false;
          return;
        }

        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        this.scrollChat();
        return;
      }

      this._supportPendingType = null;
      this._supportPendingParams = null;
      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });
      this.rememberSupportResult(data);

      if (data.created) {
        this.messages.push({ role: 'ai', text: 'Support task created: ' + (data.task_id || 'pending') + '\nWaiting for remote assistance... 等待远程协助中...' });
      } else if (data.reused_active_task) {
        this.messages.push({ role: 'ai', text: 'Support task already active: ' + (data.task_id || 'pending') + ' (' + (data.task_status || 'in progress') + ')\nWaiting for remote assistance... 等待远程协助中...' });
      } else {
        // Connected but no task yet — prompt user for a description
        let connMsg = 'Device linked 设备已连接! (ID: ' + (data.device_id || 'unknown') + ')';
        if (data.max_tasks > 0) connMsg += '\nBudget 额度: ' + (data.used_tasks || 0) + '/' + data.max_tasks + ' tasks';
        if (data.referral_code) connMsg += '\nReferral code 推荐码: ' + data.referral_code;
        connMsg += '\n\nWhat would you like help with? 请描述你需要的帮助：';
        this.messages.push({ role: 'ai', text: connMsg });
        this._supportPendingType = 'description';
        this._supportPendingParams = {};
        this.thinking = false;
        this.scrollChat();
        return;
      }
      this.scrollChat();
    },

    async _retrySupportWithCode(code) {
      const params = this._supportPendingParams || {};
      const pendingType = this._supportPendingType;
      if (pendingType === 'recovery') {
        params.recovery_code = code;
      } else if (pendingType === 'description') {
        params.description = code;
      } else {
        params.invite_code = code;
      }
      this._supportPendingType = null;
      this._supportPendingParams = null;

      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'support.askforhelp',
        args: params,
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('support.askforhelp', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
      if (data._err) {
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        this.scrollChat();
        return;
      }

      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });
      this.rememberSupportResult(data);

      if (data.created) {
        this.messages.push({ role: 'ai', text: 'Support task created: ' + (data.task_id || 'pending') + '\nWaiting for remote assistance... 等待远程协助中...' });
      } else if (data.reused_active_task) {
        this.messages.push({ role: 'ai', text: 'Support task already active: ' + (data.task_id || 'pending') + ' (' + (data.task_status || 'in progress') + ')' });
      } else {
        this.messages.push({ role: 'ai', text: 'Support connected as device ' + (data.device_id || 'unknown') });
      }
      this.scrollChat();
    },

    // ── Support Page methods (independent from chat /askforhelp) ──

    toggleView(view) {
      this.currentView = this.currentView === view ? 'chat' : view;
    },

    async connectSupport() {
      this.supportPageConnecting = true;
      this.supportPagePrompt = null;
      this.supportPageError = '';
      const params = {};
      if (this.supportPageDesc.trim()) params.description = this.supportPageDesc.trim();

      const data = await this.callTool('support.askforhelp', params);

      if (data._err) {
        const errLower = (data._err || '').toLowerCase();
        const needsInvite = errLower.includes('invite_code') || errLower.includes('invite code') || errLower.includes('worker_enrollment_code') || errLower.includes('worker enrollment code');
        const needsRecovery = errLower.includes('recovery_code') || errLower.includes('recovery code');

        if (needsInvite || needsRecovery) {
          this.supportPagePrompt = needsRecovery ? 'recovery' : 'invite';
          this.supportPageConnecting = false;
          return;
        }
        this.supportPageConnecting = false;
        this.supportPageError = data._err;
        return;
      }

      this.supportPageConnecting = false;
      this.supportPageError = '';
      this.supportPageDesc = '';
      await this.pollSystemStatus();
    },

    async submitSupportCode() {
      if (!this.supportPageCode.trim()) return;
      this.supportPageConnecting = true;
      this.supportPageError = '';
      const params = {};
      if (this.supportPageDesc.trim()) params.description = this.supportPageDesc.trim();
      if (this.supportPagePrompt === 'recovery') {
        params.recovery_code = this.supportPageCode.trim();
      } else {
        params.invite_code = this.supportPageCode.trim();
      }

      const data = await this.callTool('support.askforhelp', params);
      this.supportPageConnecting = false;

      if (data._err) {
        this.supportPageError = data._err;
        return;
      }
      this.supportPageError = '';
      this.supportPagePrompt = null;
      this.supportPageCode = '';
      this.supportPageDesc = '';
      await this.pollSystemStatus();
    },

    async disconnectSupport() {
      this.supportPageError = '';
      const data = await this.callTool('system.config', { key: 'support.enabled', value: 'false' });
      if (data._err) {
        this.supportPageError = data._err;
        return;
      }
      this.supportConnected = false;
      this.supportPagePrompt = null;
      this.supportPageDesc = '';
      this.supportPageCode = '';
      this.supportState.activeTask = null;
      this.supportState.messages = [];
      await this.pollSystemStatus();
    },

    async submitSupportTask() {
      if (!this.supportPageDesc.trim()) return;
      this.supportPageConnecting = true;
      this.supportPageError = '';
      const data = await this.callTool('support.askforhelp', { description: this.supportPageDesc.trim() });
      this.supportPageConnecting = false;
      if (data._err) {
        this.supportPageError = data._err;
        return;
      }
      this.supportPageError = '';
      this.supportPageDesc = '';
      await this.pollSystemStatus();
    },

    async _sendAgentStream(text, params) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;

      const resp = await fetch('/api/v1/agent/ask/stream', {
        method: 'POST',
        headers,
        body: JSON.stringify(params)
      });

      if (!resp.ok || !resp.body) throw new Error('SSE not available');

      // Track tool call messages by index for updating
      const toolIndexMap = {};
      const startTimes = {};
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE events from buffer
        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // keep incomplete part

        for (const part of parts) {
          if (!part.trim()) continue;
          let eventType = 'message';
          let dataStr = '';
          for (const line of part.split('\n')) {
            if (line.startsWith('event: ')) eventType = line.slice(7).trim();
            else if (line.startsWith('data: ')) dataStr = line.slice(6);
          }
          if (!dataStr) continue;

          try {
            const data = JSON.parse(dataStr);
            this._handleStreamEvent(eventType, data, toolIndexMap, startTimes);
          } catch {}
        }
      }
    },

    _handleStreamEvent(eventType, data, toolIndexMap, startTimes) {
      if (eventType === 'tool_start') {
        const msgIdx = this.messages.length;
        toolIndexMap[data.index] = msgIdx;
        startTimes[data.index] = Date.now();
        this.messages.push({
          role: 'tool',
          toolName: data.name,
          args: data.arguments || {},
          status: 'running',
          expanded: false
        });
        this.scrollChat();
      } else if (eventType === 'tool_done') {
        const msgIdx = toolIndexMap[data.index];
        if (msgIdx !== undefined && this.messages[msgIdx]) {
          const elapsed = startTimes[data.index] ? ((Date.now() - startTimes[data.index]) / 1000).toFixed(1) + 's' : '';
          this.messages.splice(msgIdx, 1, {
            ...this.messages[msgIdx],
            status: data.is_error ? 'error' : 'success',
            result: data.result || null,
            duration: elapsed
          });
        }
        this.scrollChat();
      } else if (eventType === 'response') {
        this._agentConfirmed = true;
        this.agentAvailable = true;
        if (data.session_id) this.sessionId = data.session_id;
        const result = data.result || JSON.stringify(data);
        this.messages.push({ role: 'ai', text: result });
        this.scrollChat();
      } else if (eventType === 'error') {
        this._agentConfirmed = false;
        this.agentAvailable = false;
        this.messages.push({ role: 'ai', text: data.error || 'Agent error' });
        this.scrollChat();
      }
    },

    async _sendAgentSync(text, params) {
      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'agent.ask',
        args: { query: text },
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('agent.ask', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

      if (data._err) {
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this._agentConfirmed = false;
        this.agentAvailable = false;
        await this.sendDirect(text);
        return;
      }

      this._agentConfirmed = true;
      this.agentAvailable = true;
      if (data.session_id) this.sessionId = data.session_id;

      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });

      if (data.tool_calls && Array.isArray(data.tool_calls)) {
        for (const tc of data.tool_calls) {
          this.messages.push({
            role: 'tool',
            toolName: tc.name || tc.tool || 'unknown',
            args: tc.args || tc.arguments || {},
            status: tc.error ? 'error' : 'success',
            result: tc.result || tc.error || null,
            expanded: false
          });
        }
      }

      const result = data.result || data._raw || data.response || JSON.stringify(data);
      this.messages.push({ role: 'ai', text: result });
      this.scrollChat();
    },

    async sendDirect(text) {
      const toolMap = {
        'status': 'system.status',
        'hardware': 'hardware.detect',
        'detect': 'hardware.detect',
        'metrics': 'hardware.metrics',
        'models': 'model.list',
        'engines': 'engine.list',
        'deployments': 'deploy.list',
        'deploys': 'deploy.list',
        'fleet': 'fleet.list_devices',
        'devices': 'fleet.list_devices'
      };

      const lower = text.toLowerCase().trim();

      if (lower === 'help' || lower === '?') {
        this.messages.push({ role: 'ai', text: this.t('help_text') });
        this.scrollChat();
        return;
      }

      if (toolMap[lower]) {
        const toolName = toolMap[lower];
        const toolIndex = this.messages.length;

        // Show tool call
        this.messages.push({
          role: 'tool',
          toolName: toolName,
          args: {},
          status: 'running',
          expanded: false
        });
        this.scrollChat();

        const data = await this.callTool(toolName);

        if (data._err) {
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'error',
            result: data._err
          });
          this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        } else {
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'success',
            result: data
          });
          this.messages.push({ role: 'ai', text: JSON.stringify(data, null, 2) });
        }
        this.scrollChat();
        return;
      }

      this.messages.push({ role: 'error', text: this.t('agent_unavailable') });
    },

    // ── CLI Mode (/cli prefix) ──

    async sendCLI(args) {
      const command = (args || '').trim() || 'help';

      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'aima',
        args: command,
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callCLI(command);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

      if (data._err) {
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this.messages.push({ role: 'error', text: 'Error: ' + data._err });
      } else {
        const output = data.output || '';
        const exitCode = data.exit_code || 0;
        const resultText = output || data.error || '';
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: exitCode === 0 ? 'success' : 'error',
          result: resultText,
          duration: duration
        });
        if (output) {
          this.messages.push({ role: exitCode === 0 ? 'ai' : 'system', text: output });
        }
        if (exitCode !== 0 && data.error) {
          this.messages.push({ role: 'error', text: data.error });
        } else if (exitCode === 0) {
          const head = Array.isArray(data.args) && data.args.length > 0 ? String(data.args[0]).toLowerCase() : '';
          if (head && head !== 'help' && !head.startsWith('-')) {
            this.pollSystemStatus();
            this.pollEngines();
            this.pollModels();
            this.pollDeployments();
          }
        }
      }
      this.scrollChat();
    },

    scrollChat() {

      this.$nextTick(() => {
        const el = this.$refs.chatMessages;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    // ── Settings modal ──

    async openSettings() {
      this.settingsFeedback = null;
      this.settingsForm.apiKey = this.apiKey;
      this.settingsForm.llmEndpoint = this.agentInfo.llmEndpoint || '';
      this.settingsForm.llmModel = this.agentInfo.llmModel || '';
      this.settingsForm.llmApiKey = '';
      this.settingsForm.llmUserAgent = this.agentInfo.llmUserAgent || '';
      this.showSettings = true;
    },

    async saveSettings() {
      this.settingsSaving = true;
      this.settingsFeedback = null;
      var errors = [];

      // Save AIMA API key to localStorage
      this.apiKey = this.settingsForm.apiKey;
      if (this.apiKey) {
        localStorage.setItem('aima_api_key', this.apiKey);
      } else {
        localStorage.removeItem('aima_api_key');
      }

      // Save LLM config to server via system.config set
      // Always send these (empty string = reset to default)
      var r = await this.callTool('system.config', { key: 'llm.endpoint', value: this.settingsForm.llmEndpoint });
      if (r._err) errors.push('llm.endpoint: ' + r._err);
      var r2 = await this.callTool('system.config', { key: 'llm.model', value: this.settingsForm.llmModel });
      if (r2._err) errors.push('llm.model: ' + r2._err);
      // Only send api_key if non-empty (empty = "don't change", form starts blank for security)
      if (this.settingsForm.llmApiKey) {
        var r3 = await this.callTool('system.config', { key: 'llm.api_key', value: this.settingsForm.llmApiKey });
        if (r3._err) errors.push('llm.api_key: ' + r3._err);
      }
      var r4 = await this.callTool('system.config', { key: 'llm.user_agent', value: this.settingsForm.llmUserAgent });
      if (r4._err) errors.push('llm.user_agent: ' + r4._err);

      this.settingsSaving = false;

      if (errors.length > 0) {
        this.settingsFeedback = { type: 'error', text: this.t('settings_error') + ' ' + errors.join('; ') };
      } else {
        this.settingsFeedback = { type: 'success', text: this.t('settings_saved') };
        // Refresh agent info
        await this.pollAgentInfo();
        // Auto-close after brief delay
        setTimeout(() => { this.showSettings = false; this.settingsFeedback = null; }, 1200);
      }
    },

    async clearSettings() {
      this.apiKey = '';
      localStorage.removeItem('aima_api_key');
      this.settingsForm = { apiKey: '', llmEndpoint: '', llmModel: '', llmApiKey: '', llmUserAgent: '' };

      // Clear server-side config
      await this.callTool('system.config', { key: 'llm.endpoint', value: '' });
      await this.callTool('system.config', { key: 'llm.model', value: '' });
      await this.callTool('system.config', { key: 'llm.api_key', value: '' });
      await this.callTool('system.config', { key: 'llm.user_agent', value: '' });

      this.agentInfo.llmEndpoint = '';
      this.agentInfo.llmModel = '';
      this.settingsFeedback = { type: 'success', text: this.t('settings_cleared') };
      setTimeout(() => { this.settingsFeedback = null; }, 2000);
    },

    // Mobile tab
    setMobileTab(tab) {
      this.mobileTab = this.mobileTab === tab ? 'chat' : tab;
    },

    // Global keyboard shortcut
    handleGlobalKey(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      }
    },

    // ── Helpers ──

    truncateUrl(url) {
      if (!url) return '';
      // Remove protocol prefix for display
      var short = url.replace(/^https?:\/\//, '');
      return short.length > 24 ? short.substring(0, 22) + '...' : short;
    },

    fmtMiB(mib) {
      if (!mib || mib <= 0) return '0M';
      if (mib >= 1024) return (mib / 1024).toFixed(1) + 'G';
      return mib + 'M';
    },

    fmtModelSize(bytes, format) {
      if (bytes > 0) {
        const gb = bytes / (1024 * 1024 * 1024);
        return gb >= 1 ? gb.toFixed(1) + 'G' : (bytes / (1024 * 1024)).toFixed(0) + 'M';
      }
      return format || '';
    }
  };
}
</script>
