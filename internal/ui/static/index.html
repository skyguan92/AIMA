<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AIMA</title>
<style>
/* ===== CSS Variables (Apple-inspired Design System) ===== */
:root {
  /* Background - Elegant dark gradients */
  --bg-primary: #1d1d1f;
  --bg-secondary: #2d2d2d;
  --bg-tertiary: #3a3a3c;
  --bg-panel: rgba(45, 45, 45, 0.72);
  --bg-input: rgba(58, 58, 60, 0.85);
  --bg-deep: linear-gradient(180deg, #1d1d1f 0%, #0d0d0d 100%);

  /* Accent - Apple System Blue */
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --accent-dim: rgba(10, 132, 255, 0.25);
  --accent-glow: rgba(10, 132, 255, 0.12);
  --cyan: var(--accent);
  --cyan-bright: var(--accent-hover);
  --cyan-dim: var(--accent-dim);
  --cyan-glow: var(--accent-glow);

  /* Status Colors - Apple HIG */
  --success: #30d158;
  --warning: #ff9f0a;
  --error: #ff453a;
  --green: var(--success);
  --orange: var(--warning);
  --red: var(--error);

  /* Text - High contrast */
  --text: #f5f5f7;
  --text-dim: rgba(245, 245, 247, 0.55);
  --text-tertiary: rgba(245, 245, 247, 0.35);

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;

  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --panel-radius: var(--radius-md);

  /* Animation */
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;

  /* Panel Styles */
  --panel-border: 1px solid var(--border-light);
  --panel-shadow:
    0 4px 24px rgba(0, 0, 0, 0.4),
    0 1px 2px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}
:root[data-theme="light"] {
  /* Use Apple's pure window background and soft page background */
  --bg-primary: #f5f5f7;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e5e5ea;
  --bg-panel: rgba(255,255,255,0.85);
  --bg-input: rgba(0, 0, 0, 0.04);
  --bg-deep: #f5f5f7;

  --accent: #007aff;
  --accent-hover: #0056b3;
  --accent-dim: rgba(0, 122, 255, 0.15);
  --accent-glow: rgba(0, 122, 255, 0.08);

  --text: #1d1d1f;
  --text-dim: rgba(29, 29, 31, 0.65);
  --text-tertiary: rgba(29, 29, 31, 0.45);

  --panel-border: 0.5px solid rgba(0, 0, 0, 0.1);
  --panel-shadow: 0 2px 10px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);

  --glass-bg: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(0, 0, 0, 0.08);
  
  --btn-icon-hover: rgba(0, 0, 0, 0.05);
  --border-light: rgba(0, 0, 0, 0.06);
  --border-medium: rgba(0, 0, 0, 0.1);
  
  --sidebar-bg: transparent;
  
  --msg-user-bg: transparent;
  --msg-tool-bg: #f5f5f7;
  --msg-tool-hover: #e5e5ea;
  --msg-tool-content-bg: #f9f9f9;
  
  --gauge-bg: rgba(0, 0, 0, 0.06);
  --modal-bg: rgba(255, 255, 255, 0.95);
  --input-bg: rgba(0, 0, 0, 0.03);
  --input-focus-bg: #ffffff;
  --input-border-focus: #007aff;
}

:root {
  --glass-bg: rgba(29, 29, 31, 0.72);
  --glass-border: rgba(255, 255, 255, 0.15);
  --btn-icon-hover: rgba(255, 255, 255, 0.1);
  --border-light: rgba(255, 255, 255, 0.05);
  --border-medium: rgba(255, 255, 255, 0.1);
  --sidebar-bg: transparent;
  --msg-tool-bg: rgba(255, 255, 255, 0.04);
  --msg-tool-hover: rgba(255, 255, 255, 0.08);
  --msg-tool-content-bg: var(--bg-secondary);
  --gauge-bg: rgba(255, 255, 255, 0.08);
  --modal-bg: rgba(28, 28, 30, 0.85);
  --panel-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
  --input-bg: rgba(255, 255, 255, 0.05);
  --input-focus-bg: rgba(255, 255, 255, 0.08);
}


/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text);
  font-size: 14px;
  letter-spacing: -0.01em;
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Layout ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: transparent;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  min-height: 52px;
  z-index: 100;
}
.topbar-logo {
  display: flex;
  align-items: center;
}
.topbar-logo-img {
  display: block;
  height: 20px;
  width: auto;
  object-fit: contain;
  border-radius: 4px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(48, 209, 88, 0.5); }
.status-dot.warn { background: var(--warning); box-shadow: 0 0 6px rgba(255, 159, 10, 0.45); }
.status-dot.offline { background: var(--error); box-shadow: 0 0 6px rgba(255, 69, 58, 0.5); }
.status-text { font-size: 12px; color: var(--text-tertiary); }
.btn-icon {
  background: var(--input-bg);
  border: none;
  color: var(--text-dim);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.btn-icon:hover {
  background: var(--btn-icon-hover);
  color: var(--text);
}

/* Language selector */
.lang-select {
  background: var(--input-bg);
  border: none;
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.lang-select:hover { background: var(--btn-icon-hover); color: var(--text); }
.lang-select option {
  background: var(--bg-secondary);
  color: var(--text);
}

/* Main content area */
.main {
  display: grid;
  grid-template-columns: 260px 1fr 300px;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* Side panels */
.sidebar-left, .sidebar-right {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-left {
  border-right: 0.5px solid var(--border-medium);
  background: transparent;
  padding: 16px;
  gap: 16px;
}
.sidebar-right {
  border-left: 0.5px solid var(--border-medium);
  background: transparent;
  padding: 16px;
  gap: 16px;
}

/* Panel card - subtle style */
.panel {
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-medium);
  border-radius: 16px;
  padding: 16px;
  box-shadow: var(--panel-shadow, 0 4px 24px rgba(0, 0, 0, 0.2));
}
.fleet-panel {
  display: flex;
  flex-direction: column;
}
.panel-title {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Device identity in hardware panel */
.device-identity {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid var(--border-medium);
}
.device-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.device-ip {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

/* Gauge bars */
.gauge { margin-bottom: 8px; }
.gauge-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.gauge-bar {
  height: 6px;
  background: var(--msg-tool-hover);
  border-radius: 3px;
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width var(--duration-slow) var(--ease-smooth);
}
.gauge-fill.warn {
  background: var(--warning);
}
.gauge-fill.crit {
  background: var(--error);
}

/* List items in panels */
.panel-list { list-style: none; }
.panel-list li {
  padding: 8px 0;
  font-size: 13px;
  font-family: var(--font-sans);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 0.5px solid var(--border-light);
}
.panel-list li:last-child { border-bottom: none; }
.panel-list .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-green { background: var(--success); }
.dot-orange { background: var(--warning); }
.dot-red { background: var(--error); }
.dot-dim { background: var(--text-tertiary); }
.panel-list .item-detail {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: auto;
}

/* Fleet device card */
.fleet-device {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.fleet-device:last-child { border-bottom: none; }
.fleet-device .name { font-family: var(--font-sans); font-weight: 500; }
.fleet-device .meta { font-size: 11px; color: var(--text-tertiary); }
.fleet-device.clickable {
  cursor: pointer;
  border-radius: 6px;
  padding: 8px;
  margin: 0 -8px;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.fleet-device.clickable:hover {
  background: var(--btn-icon-hover);
}
.fleet-link-hint {
  font-size: 14px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity var(--duration-fast) var(--ease-smooth);
}
.fleet-device.clickable:hover .fleet-link-hint {
  opacity: 1;
  color: var(--accent);
}
.fleet-scroll {
  max-height: clamp(160px, 34vh, 320px);
  overflow-y: auto;
  overscroll-behavior: contain;
  scrollbar-width: none;
  scrollbar-color: transparent transparent;
  padding-right: 4px;
  margin-right: -4px;
  min-height: 0;
}
.fleet-scroll::-webkit-scrollbar {
  width: 0;
}
.fleet-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.fleet-scroll::-webkit-scrollbar-thumb {
  background: transparent;
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.fleet-panel:hover .fleet-scroll,
.fleet-panel:focus-within .fleet-scroll {
  scrollbar-width: thin;
  scrollbar-color: var(--border-light) transparent;
}
.fleet-panel:hover .fleet-scroll::-webkit-scrollbar,
.fleet-panel:focus-within .fleet-scroll::-webkit-scrollbar {
  width: 8px;
}
.fleet-panel:hover .fleet-scroll::-webkit-scrollbar-thumb,
.fleet-panel:focus-within .fleet-scroll::-webkit-scrollbar-thumb {
  background: var(--border-light);
}
.fleet-panel:hover .fleet-scroll::-webkit-scrollbar-thumb:hover,
.fleet-panel:focus-within .fleet-scroll::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}

/* Agent info rows */
.agent-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 13px;
  border-bottom: 0.5px solid var(--border-light);
}
.agent-info-row:last-child { border-bottom: none; }
.agent-info-label { color: var(--text-tertiary); }
.agent-info-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
}
.agent-info-value.clickable {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: transparent;
  transition: text-decoration-color var(--duration-fast) var(--ease-smooth);
}
.agent-info-value.clickable:hover { text-decoration-color: var(--accent); }

/* ===== Center: Agent Chat ===== */
.center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: transparent;
  min-width: 0;
  min-height: 0;
}

.chat-view {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* Agent header - minimal Claude Code style */
.agent-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 24px;
  border-bottom: 0.5px solid var(--border-medium);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  z-index: 10;
}
.agent-header-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.agent-avatar {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  display: block;
  object-fit: contain;
  border-radius: 8px;
  opacity: 1;
}
.agent-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.agent-name {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.agent-mode {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 5px;
}
.agent-support-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-sans);
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(10, 132, 255, 0.35);
  border-radius: 999px;
  cursor: pointer;
  white-space: nowrap;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.agent-support-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.agent-support-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.agent-support-btn.connected {
  color: var(--success);
  border-color: rgba(48, 209, 88, 0.45);
  background: rgba(48, 209, 88, 0.12);
}
.agent-support-btn.connected:hover,
.agent-support-btn.connected.active {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}
.agent-support-btn .support-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* Chat messages - refined typography */
.chat-messages {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  scroll-behavior: smooth;
  padding: 24px 32px;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
}
.chat-messages::-webkit-scrollbar { width: 8px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.chat-messages::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}

.msg {
  display: flex;
  align-items: flex-start;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: 800px;
  margin-bottom: 12px;
}
.msg:last-child {
  margin-bottom: 0;
}
.msg-prefix {
  font-weight: 500;
  margin-right: 6px;
  user-select: none;
  flex-shrink: 0;
}
.msg-text {
  flex: 1;
}
.msg-user .msg-prefix { color: var(--accent); opacity: 0.5; }
.msg-user .msg-text { color: var(--text); }
.msg-ai .msg-prefix { color: var(--success); opacity: 0.6; }
.msg-ai .msg-text { color: var(--text); }
.msg-error .msg-text { color: var(--error); }
.msg-system .msg-text { color: var(--text-tertiary); font-style: italic; font-size: 12px; }

/* Tool call display - Claude Code style indicator lights */
.msg-tool {
  margin: 4px 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.msg-tool-header {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 4px 4px;
  background: var(--msg-tool-bg);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.msg-tool-header:hover {
  background: var(--msg-tool-hover);
}
.msg-tool-indicator {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  flex-shrink: 0;
}
.msg-tool-indicator.running {
  background: rgba(10, 132, 255, 0.2);
  color: var(--accent);
  animation: indicatorPulse 1.2s ease-in-out infinite;
}
.msg-tool-indicator.running::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: indicatorDot 1.2s ease-in-out infinite;
}
.msg-tool-indicator.success {
  background: rgba(48, 209, 88, 0.2);
  color: var(--success);
}
.msg-tool-indicator.success::after {
  content: '✓';
}
.msg-tool-indicator.error {
  background: rgba(255, 69, 58, 0.2);
  color: var(--error);
}
.msg-tool-indicator.error::after {
  content: '✗';
}
@keyframes indicatorPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.95); }
}
@keyframes indicatorDot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.msg-tool-name {
  color: var(--text);
  font-weight: 500;
  font-family: var(--font-mono);
}
.msg-tool-duration {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-left: 4px;
}
.msg-tool-expand {
  font-size: 10px;
  color: var(--text-tertiary);
  transition: transform var(--duration-fast) var(--ease-smooth);
  margin-left: auto;
}
.msg-tool.expanded .msg-tool-expand {
  transform: rotate(90deg);
}
.msg-tool-content {
  display: none;
  margin-top: 8px;
  margin-left: 28px;
  padding: 12px 16px;
  background: var(--msg-tool-content-bg);
  border-radius: 12px;
  border: 0.5px solid var(--border-medium);
  font-size: 12px;
  color: var(--text-dim);
  overflow-x: auto;
  max-width: 100%;
}
.msg-tool.expanded .msg-tool-content {
  display: block;
  animation: fadeIn var(--duration-fast) var(--ease-smooth);
}
.msg-tool-args {
  margin-bottom: 6px;
}
.msg-tool-args strong {
  color: var(--text-tertiary);
  font-weight: 500;
}
.msg-tool-result {
  border-top: 1px solid var(--border-light);
  padding-top: 6px;
  margin-top: 6px;
}
.msg-tool-result.success {
  color: var(--success);
  opacity: 0.9;
}
.msg-tool-result.error {
  color: var(--error);
}
.msg-tool pre {
  margin: 4px 0 0 0;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Welcome/empty state */
.chat-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px 24px;
  text-align: center;
}
.chat-welcome-icon {
  font-size: 32px;
  margin-bottom: 16px;
  opacity: 0.6;
}
.chat-welcome-title {
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  color: var(--text);
  margin-bottom: 8px;
}
.chat-welcome-hint {
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.4;
  max-width: 320px;
}

/* Thinking indicator */
.thinking {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 12px;
  animation: thinkingPulse 1.5s ease-in-out infinite;
  margin-bottom: 16px;
  letter-spacing: 2px;
}
@keyframes thinkingPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* Chat input - clean minimal style */
.chat-input-wrap {
  display: flex;
  align-items: center;
  padding: 16px 24px;
  border-top: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  gap: 12px;
}
.chat-prompt {
  color: var(--accent);
  opacity: 0.6;
  font-family: var(--font-mono);
  font-size: 14px;
  flex-shrink: 0;
  user-select: none;
}
.chat-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border-medium);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  outline: none;
  padding: 10px 16px;
  line-height: 1.5;
  transition: all 0.2s ease;
}
.chat-input:focus {
  background: var(--msg-tool-hover);
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}
.chat-input::placeholder { color: var(--text-tertiary); }
.chat-send {
  background: var(--accent);
  border: none;
  color: white;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    opacity var(--duration-fast) var(--ease-smooth),
    transform var(--duration-fast) var(--ease-spring);
}
.chat-send:hover:not(:disabled) {
  background: var(--accent-hover);
}
.chat-send:active:not(:disabled) {
  transform: scale(0.96);
}
.chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ===== Bottom bar ===== */
.bottombar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 24px;
  border-top: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  font-size: 11px;
  min-height: 36px;
}
.bottom-gauge {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 280px;
}
.bottom-gauge-label {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  font-size: 10px;
}
.bottom-gauge-bar {
  flex: 1;
  height: 3px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 2px;
  overflow: hidden;
}
.bottom-gauge-fill {
  height: 100%;
  border-radius: 2px;
  transition: width var(--duration-slow) var(--ease-smooth);
}
.bottom-temp {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  font-size: 10px;
}

/* ===== Settings Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn var(--duration-fast) var(--ease-smooth);
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--modal-bg);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 0.5px solid rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
  padding: 32px;
  width: 440px;
  max-height: 85vh;
  overflow-y: auto;
  animation: modalIn var(--duration-normal) var(--ease-smooth);
}
@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.96) translateY(8px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
.modal h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 24px;
  font-family: var(--font-sans);
  letter-spacing: -0.3px;
}
.modal-section {
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-light);
}
.modal-section:last-of-type { border-bottom: none; margin-bottom: 12px; padding-bottom: 0; }
.modal-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.modal-field { margin-bottom: 12px; }
.modal-field:last-child { margin-bottom: 0; }
.modal-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.modal input[type="text"],
.modal input[type="password"],
.modal input[type="url"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.modal input:focus {
  border-color: var(--accent);
  background: var(--msg-tool-hover);
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-btn {
  background: var(--msg-tool-hover);
  border: 0.5px solid var(--border-medium);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  cursor: pointer;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.modal-btn:hover {
  background: var(--btn-icon-hover);
  border-color: var(--border-medium);
}
.modal-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.modal-btn.primary:hover {
  background: var(--accent-hover);
}
.modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.modal-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}
.modal-feedback {
  font-size: 12px;
  font-family: var(--font-mono);
  margin-bottom: 14px;
  padding: 8px 10px;
  border-radius: 6px;
}
.modal-feedback.success { color: var(--success); background: rgba(48, 209, 88, 0.1); }
.modal-feedback.error { color: var(--error); background: rgba(255, 69, 58, 0.1); }

/* Settings tabs */
.settings-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 0;
}
.settings-tab {
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  padding: 8px 12px;
  cursor: pointer;
  letter-spacing: 0.2px;
  border-bottom: 2px solid transparent;
  transition: color var(--duration-fast) var(--ease-smooth), border-color var(--duration-fast) var(--ease-smooth);
}
.settings-tab:hover { color: var(--text-dim); }
.settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Toggle switch */
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle-row label { margin-bottom: 0; }
.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border-medium);
  border-radius: 20px;
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  bottom: 2px;
  background: white;
  border-radius: 50%;
  transition: transform var(--duration-fast) var(--ease-smooth);
}
.toggle-switch input:checked + .toggle-slider { background: var(--accent); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

/* Number input for settings */
.modal input[type="number"] {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition: border-color var(--duration-fast) var(--ease-smooth), background var(--duration-fast) var(--ease-smooth);
}
.modal input[type="number"]:focus { border-color: var(--accent); background: var(--msg-tool-hover); }

/* Textarea for settings */
.modal textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  resize: vertical;
  min-height: 60px;
  transition: border-color var(--duration-fast) var(--ease-smooth), background var(--duration-fast) var(--ease-smooth);
}
.modal textarea:focus { border-color: var(--accent); background: var(--msg-tool-hover); }

/* ===== Mobile ===== */
.mobile-tabs {
  display: none;
  border-top: 0.5px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.mobile-tabs button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  padding: 12px 8px;
  cursor: pointer;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color var(--duration-fast) var(--ease-smooth);
}
.mobile-tabs button.active {
  color: var(--accent);
}

/* Mobile panel overlay */
.mobile-panel {
  display: none;
  position: fixed;
  bottom: 44px;
  left: 0;
  right: 0;
  max-height: 60vh;
  overflow-y: auto;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
  padding: 16px;
  z-index: 50;
  padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
}
.mobile-panel.show {
  display: block;
  animation: slideUp var(--duration-normal) var(--ease-smooth);
}
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
  }
  .sidebar-left, .sidebar-right { display: none; }
  .bottombar { display: none; }
  .mobile-tabs { display: flex; }

  /* Compact metrics bar for mobile */
  .mobile-metrics {
    display: flex;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-light);
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mobile-metrics::-webkit-scrollbar { display: none; }
  .mobile-metrics .mm-item {
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .mobile-metrics .mm-bar {
    width: 40px;
    height: 3px;
    background: var(--msg-tool-hover);
    border-radius: 2px;
    overflow: hidden;
  }
  .mobile-metrics .mm-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width var(--duration-slow) var(--ease-smooth);
  }

  /* Mobile chat adjustments */
  .agent-header {
    padding: 8px 12px;
    gap: 8px;
  }
  .agent-avatar {
    width: 24px;
    height: 24px;
  }
  .agent-name {
    font-size: 13px;
  }
  .agent-mode {
    font-size: 11px;
  }

  .chat-messages {
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg {
    margin-bottom: 16px;
    max-width: 100%;
  }

  .chat-input-wrap {
    padding: 10px 12px;
    gap: 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
  }
  .chat-prompt {
    font-size: 13px;
  }
  .chat-input {
    font-size: 13px;
  }
  .chat-send {
    padding: 6px 12px;
    font-size: 11px;
  }

  .topbar {
    padding: 10px 12px;
    min-height: 48px;
  }
  .topbar-logo-img {
    height: 17px;
  }
  .status-text {
    font-size: 12px;
  }
  .btn-icon {
    width: 32px;
    height: 32px;
  }

  .panel {
    padding: 12px;
  }
  .panel-title {
    font-size: 11px;
    margin-bottom: 10px;
  }
  .gauge-label {
    font-size: 12px;
  }
  .panel-list li {
    font-size: 13px;
    padding: 6px 0;
  }
}

@media (min-width: 769px) {
  .mobile-metrics { display: none !important; }
}

/* Empty state */
.empty {
  color: var(--text-tertiary);
  font-size: 12px;
  padding: 16px 0;
  text-align: center;
}

/* Deploy progress - enhanced startup visualization */
.deploy-progress {
  height: 4px;
  background: var(--msg-tool-hover);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.deploy-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--cyan-bright, #409cff));
  transition: width 0.3s ease;
  position: relative;
}
.deploy-progress-fill.starting {
  background: linear-gradient(90deg, var(--warning), var(--accent));
  animation: progressPulse 1.5s ease-in-out infinite;
}
@keyframes progressPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.deploy-phase-text {
  font-size: 10px;
  color: var(--accent);
  margin-top: 3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.deploy-phase-icon {
  margin-right: 4px;
  animation: spin 1.5s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.deploy-eta {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.deploy-error-lines {
  font-size: 10px;
  color: var(--error);
  white-space: pre-wrap;
  word-break: break-all;
  margin-top: 4px;
  max-height: 60px;
  overflow: hidden;
  font-family: var(--font-mono);
  background: rgba(255, 69, 58, 0.1);
  padding: 4px 6px;
  border-radius: 4px;
}

/* Starting deployment highlight */
.panel-list li.starting {
  background: var(--gauge-bg);
  border-radius: 6px;
  padding: 8px;
  margin: -8px;
  margin-bottom: 0;
}

/* ===== Support Page ===== */

/* Support page layout (fills .center) */
.support-page {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.support-page-shell {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(100%, 820px);
  margin: 0 auto;
  padding: 18px 24px 18px;
  flex: 1;
  min-height: 0;
}

/* Hero / not-connected state */
.support-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: var(--spacing-md);
  text-align: center;
  max-width: 480px;
  margin: 0 auto;
}
.support-hero-icon {
  font-size: 48px;
  opacity: 0.6;
}
.support-hero h2 {
  font-family: var(--font-sans);
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin: 0;
}
.support-hero p {
  font-size: 14px;
  color: var(--text-dim);
  margin: 0;
  line-height: 1.5;
}
.support-hero textarea {
  width: 100%;
  padding: 12px;
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  resize: vertical;
  min-height: 60px;
}
.support-hero-btn {
  padding: 12px 36px;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font-sans);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
}
.support-hero-btn:hover {
  background: var(--accent-hover);
  transform: scale(1.02);
}
.support-hero-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Prompt input (invite/recovery code) */
.support-hero .support-code-row {
  display: flex;
  gap: 8px;
  width: 100%;
}
.support-hero .support-code-row input {
  flex: 1;
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font-mono);
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
}
.support-hero .support-code-row button {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
}

/* Connected panel */
.support-connected {
  display: flex;
  flex-direction: column;
  width: 100%;
  flex: 1;
  min-height: 0;
  gap: 12px;
}
.support-flow {
  flex: 1;
  min-height: 0;
}
.support-content-scroll {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding-right: 4px;
}
.support-content-scroll::-webkit-scrollbar {
  width: 8px;
}
.support-content-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.support-content-scroll::-webkit-scrollbar-thumb {
  background: var(--border-medium);
  border-radius: 4px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
.support-content-scroll::-webkit-scrollbar-thumb:hover {
  background: var(--text-dim);
}
.support-status-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.support-status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--text-dim);
}
.support-status-pill strong {
  color: var(--text);
  font-weight: 600;
  font-family: var(--font-mono);
}
.support-summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.support-summary-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
  padding: 12px 14px;
  background: var(--bg-secondary);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
}
.support-summary-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.support-summary-card .value {
  font-size: 14px;
  font-family: var(--font-mono);
  color: var(--text);
  word-break: break-word;
}
.support-summary-card .meta {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.support-summary-link {
  font-size: 12px;
  line-height: 1.45;
  color: var(--accent);
  font-family: var(--font-mono);
  word-break: break-all;
}
.support-summary-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.support-summary-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: 999px;
  cursor: pointer;
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.support-summary-btn:hover {
  border-color: rgba(10, 132, 255, 0.35);
  color: var(--accent);
}
.support-summary-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.support-intake {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.02);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
}
.support-intake-header {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.support-intake-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}
.support-intake-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.support-starter-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.support-starter-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.support-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.support-chip {
  padding: 7px 10px;
  font-size: 12px;
  color: var(--text);
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: 999px;
  cursor: pointer;
  text-align: left;
}
.support-chip:hover {
  border-color: rgba(10, 132, 255, 0.35);
  color: var(--text);
}
.support-note {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.support-helper {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.4;
}
.support-status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-sm);
}
.support-status-card {
  background: var(--bg-panel);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.support-status-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.support-status-card .value {
  font-size: 14px;
  font-family: var(--font-mono);
  color: var(--text);
  word-break: break-all;
}
.support-msg-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--spacing-sm);
  background: var(--bg-secondary);
  border: var(--panel-border);
  border-radius: var(--radius-sm);
  min-height: 160px;
}
.support-msg {
  padding: 8px 10px;
  font-size: 13px;
  color: var(--text);
  background: var(--bg-panel);
  border-radius: 6px;
  line-height: 1.4;
}
.support-msg-body {
  white-space: pre-wrap;
}
.support-msg .msg-time {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-right: 6px;
}
.support-msg .msg-type {
  font-size: 10px;
  text-transform: uppercase;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  margin-right: 6px;
}
.support-msg .msg-type.info { color: var(--accent); background: var(--accent-dim); }
.support-msg .msg-type.command { color: var(--warning); background: rgba(255, 159, 10, 0.15); }
.support-msg .msg-type.error { color: var(--error); background: rgba(255, 69, 58, 0.15); }
.support-msg .msg-type.complete { color: var(--success); background: rgba(48, 209, 88, 0.15); }
.support-msg .msg-type.question { color: var(--accent); background: rgba(10, 132, 255, 0.18); }
.support-msg .msg-type.approval { color: var(--warning); background: rgba(255, 159, 10, 0.15); }
.support-feedback {
  font-size: 13px;
  color: var(--error);
  background: rgba(255, 69, 58, 0.1);
  border: 1px solid rgba(255, 69, 58, 0.25);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}

.support-input-row {
  display: flex;
  gap: 8px;
}
.support-footer {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
  padding-top: 4px;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(29, 29, 31, 0.18) 100%);
}
.support-input-row input {
  flex: 1;
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
}
.support-input-row input:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.support-input-row button {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.support-input-row button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.support-disconnect-btn {
  align-self: center;
  padding: 8px 24px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  color: var(--error);
  background: rgba(255, 69, 58, 0.1);
  border: 1px solid var(--error);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
}
.support-disconnect-btn:hover {
  background: var(--error);
  color: #fff;
}

/* Support empty messages */
.support-msg-empty {
  color: var(--text-tertiary);
  font-size: 13px;
  text-align: center;
  padding: 24px;
}

@media (max-width: 768px) {
  .support-page {
    padding: 0;
  }
  .support-page-shell {
    width: 100%;
    padding: 12px;
  }
  .support-content-scroll {
    padding-right: 0;
  }
  .support-hero h2 {
    font-size: 18px;
  }
  .support-summary-grid,
  .support-status-grid {
    grid-template-columns: 1fr;
  }
  .agent-header {
    padding: 12px 16px;
    gap: 12px;
  }
  .agent-support-btn {
    padding: 7px 10px;
    font-size: 12px;
  }
}
</style>

<script>
  (function() {
    var theme = localStorage.getItem('aima_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
</head>

<body>
<div id="app" x-data="aimaApp()" x-init="init()" @keydown.window="handleGlobalKey($event)">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo"><img :src="theme === 'dark' ? 'logo-dark-wordmark.svg' : 'logo-light-wordmark.svg'" alt="AIMA" class="topbar-logo-img"></div>
    <div class="topbar-right">
      <span class="status-text">
        <span class="status-dot" :class="systemOnline ? 'online' : 'offline'"></span>
        <span x-text="systemOnline ? t('system_online') : t('connecting')"></span>
      </span>
      <select class="lang-select" x-model="theme" @change="saveTheme()">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
      <select class="lang-select" x-model="lang" @change="saveLang()">
        <option value="en">EN</option>
        <option value="zh">&#x4E2D;&#x6587;</option>
        <option value="ja">&#x65E5;&#x672C;&#x8A9E;</option>
        <option value="ko">&#xD55C;&#xAD6D;&#xC5B4;</option>
        <option value="es">ES</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
      </select>
      <button class="btn-icon" @click="openSettings()" :title="t('settings')">&#x2699;</button>
    </div>
  </div>

  <!-- Mobile Metrics -->
  <div class="mobile-metrics">
    <template x-if="hw.gpu">
      <div class="mm-item">
        GPU <span x-text="hw.gpu.util + '%'"></span>
        <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.gpu.util + '%'"></div></div>
        <span x-text="hw.gpu.temp ? hw.gpu.temp + '\u00B0C' : ''"></span>
      </div>
    </template>
    <div class="mm-item">
      MEM <span x-text="hw.mem.pct + '%'"></span>
      <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.mem.pct + '%'"></div></div>
    </div>
    <div class="mm-item">
      CPU <span x-text="hw.cpu.pct + '%'"></span>
      <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.cpu.pct + '%'"></div></div>
    </div>
  </div>

  <!-- Main 3-Column Layout -->
  <div class="main">

    <!-- Left Sidebar: Hardware + Engines + Models -->
    <div class="sidebar-left">

      <!-- Hardware Panel -->
      <div class="panel">
        <div class="panel-title">&#x25A0; <span x-text="t('hardware')"></span></div>
        <!-- Device identity -->
        <div class="device-identity">
          <span class="device-name" x-text="hostname || selfIp || 'This Device'"></span>
          <span class="device-ip" x-show="selfIp && selfIp !== 'localhost' && selfIp !== '127.0.0.1'" x-text="selfIp"></span>
        </div>
        <template x-if="hw.gpu">
          <div>
            <div class="gauge">
              <div class="gauge-label">
                <span x-text="'GPU ' + hw.gpu.name"></span>
                <span x-text="hw.gpu.util + '%'"></span>
              </div>
              <div class="gauge-bar">
                <div class="gauge-fill" :class="hw.gpu.util > 90 ? 'crit' : hw.gpu.util > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.util + '%'"></div>
              </div>
            </div>
            <div class="gauge">
              <div class="gauge-label">
                <span>VRAM</span>
                <span x-text="hw.gpu.memUsed + '/' + hw.gpu.memTotal"></span>
              </div>
              <div class="gauge-bar">
                <div class="gauge-fill" :class="hw.gpu.memPct > 90 ? 'crit' : hw.gpu.memPct > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.memPct + '%'"></div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px" x-show="hw.gpu.temp">
              <span x-text="hw.gpu.temp + '\u00B0C'"></span>
              <span x-show="hw.gpu.power" x-text="' / ' + hw.gpu.power + 'W'"></span>
            </div>
          </div>
        </template>
        <template x-if="!hw.gpu">
          <div class="empty" x-text="t('no_gpu')"></div>
        </template>
        <div class="gauge" style="margin-top:8px">
          <div class="gauge-label"><span>CPU</span><span x-text="hw.cpu.pct + '%'"></span></div>
          <div class="gauge-bar">
            <div class="gauge-fill" :class="hw.cpu.pct > 90 ? 'crit' : hw.cpu.pct > 70 ? 'warn' : ''" :style="'width:' + hw.cpu.pct + '%'"></div>
          </div>
        </div>
        <div class="gauge">
          <div class="gauge-label">
            <span>RAM</span>
            <span x-text="hw.mem.used + '/' + hw.mem.total"></span>
          </div>
          <div class="gauge-bar">
            <div class="gauge-fill" :class="hw.mem.pct > 90 ? 'crit' : hw.mem.pct > 70 ? 'warn' : ''" :style="'width:' + hw.mem.pct + '%'"></div>
          </div>
        </div>
      </div>

      <!-- Engines Panel -->
      <div class="panel">
        <div class="panel-title">&#x25B6; <span x-text="t('engines')"></span></div>
        <template x-if="engines.length === 0">
          <div class="empty" x-text="t('no_engines')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="(e, ei) in engines" :key="ei">
            <li>
              <span class="dot" :class="e.available ? 'dot-green' : 'dot-dim'"></span>
              <span x-text="e.type"></span>
              <span class="item-detail" x-text="e.variant || ''"></span>
            </li>
          </template>
        </ul>
      </div>

      <!-- Models Panel -->
      <div class="panel">
        <div class="panel-title">&#x25C6; <span x-text="t('models')"></span></div>
        <template x-if="models.length === 0">
          <div class="empty" x-text="t('no_models')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="(m, mi) in models" :key="mi">
            <li>
              <span class="dot dot-green"></span>
              <span x-text="m.name" style="flex:1;overflow:hidden;text-overflow:ellipsis"></span>
              <span class="item-detail" x-text="m.size || ''"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>

    <!-- Center: Chat / Support (toggled by currentView) -->
    <div class="center">
      <div class="agent-header">
        <div class="agent-header-main">
          <img class="agent-avatar" src="avatar.svg" alt="AIMA Agent">
          <div class="agent-meta">
            <div class="agent-name">AIMA Agent</div>
            <div class="agent-mode">
              <span class="status-dot" :class="currentView === 'support' ? (supportConnected ? 'online' : 'offline') : (agentAvailable ? 'online' : 'offline')" style="width:6px;height:6px"></span>
              <span x-text="currentView === 'support' ? (supportConnected ? supportEntryLabel() : t('support_connecting')) : (agentAvailable ? t('agent_ready') : t('direct_mode'))"></span>
            </div>
          </div>
        </div>
        <button class="agent-support-btn"
          :class="{ active: currentView === 'support', connected: supportConnected }"
          @click="openSupportFlow()">
          <span class="support-dot"></span>
          <span x-text="supportEntryLabel()"></span>
        </button>
      </div>

      <!-- Chat View -->
      <div x-show="currentView === 'chat'" class="chat-view">
        <div class="chat-messages" x-ref="chatMessages">
          <template x-if="messages.length === 0 && !thinking">
            <div class="chat-welcome">
              <div class="chat-welcome-title">AIMA</div>
              <div class="chat-welcome-hint" x-text="t('welcome')"></div>
            </div>
          </template>
          <template x-for="(msg, i) in messages" :key="i">
            <div class="msg" :class="'msg-' + msg.role">
              <template x-if="msg.role === 'user'">
                <div><span class="msg-prefix">&gt;</span><span class="msg-text" x-text="msg.text"></span></div>
              </template>
              <template x-if="msg.role === 'ai'">
                <div><span class="msg-prefix">○</span><span class="msg-text" x-text="msg.text"></span></div>
              </template>
              <template x-if="msg.role === 'tool'">
                <div class="msg-tool" :class="msg.expanded ? 'expanded' : ''" @click="msg.expanded = !msg.expanded">
                  <div class="msg-tool-header">
                    <span class="msg-tool-indicator" :class="msg.status || 'running'"></span>
                    <span class="msg-tool-name" x-text="msg.toolName || 'tool'"></span>
                    <span class="msg-tool-duration" x-show="msg.duration" x-text="msg.duration"></span>
                    <span class="msg-tool-expand">▸</span>
                  </div>
                  <div class="msg-tool-content">
                    <div class="msg-tool-args" x-show="msg.args">
                      <strong>Input:</strong>
                      <pre x-text="typeof msg.args === 'object' ? JSON.stringify(msg.args, null, 2) : msg.args"></pre>
                    </div>
                    <div class="msg-tool-result" :class="msg.status" x-show="msg.result">
                      <strong>Result:</strong>
                      <pre x-text="typeof msg.result === 'object' ? JSON.stringify(msg.result, null, 2) : msg.result"></pre>
                    </div>
                  </div>
                </div>
              </template>
              <template x-if="msg.role === 'error'">
                <div><span class="msg-text" x-text="msg.text"></span></div>
              </template>
              <template x-if="msg.role === 'system'">
                <div><span class="msg-text" x-text="msg.text"></span></div>
              </template>
            </div>
          </template>
          <div class="thinking" x-show="thinking">&middot;&middot;&middot;</div>
        </div>

        <div class="chat-input-wrap">
          <span class="chat-prompt">&gt;</span>
          <input class="chat-input"
            x-ref="chatInput"
            x-model="input"
            @keydown.enter="send()"
            :placeholder="t('chat_placeholder')"
            :disabled="thinking"
            autocomplete="off"
            spellcheck="false">
          <button class="chat-send" @click="send()" :disabled="thinking || !input.trim()" x-text="t('send')"></button>
        </div>
      </div>

      <!-- Support View -->
      <div x-show="currentView === 'support'" class="support-page" x-cloak>
        <div class="support-page-shell">
          <div class="support-feedback" x-show="supportPageError" x-text="supportPageError"></div>
          <div class="support-connected support-flow">
            <div class="support-content-scroll" x-ref="supportPageScroll">
              <div class="support-status-strip">
                <div class="support-status-pill">
                  <span x-text="t('support_device_id')"></span>
                  <strong x-text="supportState.deviceId || 'linking…'"></strong>
                </div>
                <div class="support-status-pill">
                  <span x-text="t('support_active_task')"></span>
                  <strong x-text="supportState.activeTask ? (supportState.activeTask.status || 'active') : (supportConnected ? t('support_no_task') : t('support_connecting'))"></strong>
                </div>
              </div>

              <div class="support-summary-grid" x-show="supportSummaryVisible()">
                <div class="support-summary-card">
                  <div class="label" x-text="t('support_device_id')"></div>
                  <div class="value" x-text="supportState.deviceId || 'linking…'"></div>
                  <div class="meta" x-text="supportBindSummaryText()"></div>
                  <div class="support-summary-link" x-show="supportBindingURL()" x-text="supportBindingURL()"></div>
                  <div class="support-summary-actions">
                    <button type="button" class="support-summary-btn" @click="openSupportBinding()" :disabled="!supportCanBind()" x-text="supportBindActionLabel()"></button>
                  </div>
                </div>
                <div class="support-summary-card">
                  <div class="label" x-text="supportBudgetTasksLabel()"></div>
                  <div class="value" x-text="supportTaskBudgetValue()"></div>
                  <div class="meta" x-text="supportBudgetAmountSummary()"></div>
                </div>
                <div class="support-summary-card">
                  <div class="label" x-text="supportShareHeading()"></div>
                  <div class="value" x-text="supportSharePrimaryValue()"></div>
                  <div class="meta" x-text="supportShareMetaText()"></div>
                  <div class="support-summary-actions" x-show="supportState.shareText">
                    <button type="button" class="support-summary-btn" @click="copySupportShareText()" x-text="supportCopyShareLabel()"></button>
                  </div>
                </div>
              </div>

              <div class="support-msg-list">
                <template x-if="supportPageFeed.length === 0">
                  <div class="support-msg-empty" x-text="supportPageEmptyStateText()"></div>
                </template>
                <template x-for="entry in supportPageFeed" :key="entry.id">
                  <div class="support-msg">
                    <span class="msg-type" :class="supportPageTypeClass(entry.type)" x-text="supportPageTypeLabel(entry.type)"></span>
                    <span class="support-msg-body" x-text="entry.text"></span>
                  </div>
                </template>
              </div>

              <div class="support-intake" x-show="supportPageShowTaskMenu()">
                <div class="support-intake-header">
                  <div class="support-intake-title" x-text="supportTaskMenuTitle()"></div>
                  <div class="support-intake-subtitle" x-text="supportTaskMenuSubtitle()"></div>
                </div>
                <div class="support-starter-section" x-show="supportTaskMenuOptions().length > 0">
                  <div class="support-starter-label" x-text="supportTaskMenuPrompt()"></div>
                  <div class="support-chip-list">
                    <template x-for="option in supportTaskMenuOptions()" :key="option.id || option.value">
                      <button type="button" class="support-chip" @click="applySupportTaskOption(option)" x-text="supportManifestText(option.label, option.value || option.id || '')"></button>
                    </template>
                  </div>
                </div>
                <div class="support-starter-section" x-show="supportTaskMenuExamples().length > 0">
                  <div class="support-starter-label" x-text="supportTaskMenuFreeformHint()"></div>
                  <div class="support-chip-list">
                    <template x-for="example in supportTaskMenuExamples()" :key="supportManifestText(example, '')">
                      <button type="button" class="support-chip" @click="applySupportExample(example)" x-text="supportManifestText(example, '')"></button>
                    </template>
                  </div>
                </div>
                <div class="support-note" x-show="supportPageGuidedHint" x-text="supportPageGuidedHint"></div>
                <div class="support-note" x-show="!supportPageGuidedHint && supportTaskMenuSecretWarning()" x-text="supportTaskMenuSecretWarning()"></div>
                <div class="support-helper" x-show="supportTaskMenuFooter()" x-text="supportTaskMenuFooter()"></div>
              </div>
            </div>

            <div class="support-footer">
              <div class="support-input-row">
                <input
                  x-ref="supportPageInput"
                  :value="supportPageInputValue()"
                  @input="setSupportPageInput($event.target.value)"
                  @keydown.enter="submitSupportInput()"
                  :placeholder="supportPageInputPlaceholder()"
                  :disabled="supportPageInputDisabled()">
                <button @click="submitSupportInput()" :disabled="!supportPageCanSubmit()" x-text="supportPageButtonLabel()"></button>
              </div>

              <button class="support-disconnect-btn" x-show="supportConnected" @click="disconnectSupport()" x-text="supportDisconnectLabel()"></button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Right Sidebar: Agent Status + Fleet + Deployments -->
    <div class="sidebar-right">

      <!-- Agent Status Panel -->
      <div class="panel">
        <div class="panel-title">&#x25CE; <span x-text="t('agent_status')"></span></div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('mode')"></span>
          <span class="agent-info-value">
            <span class="status-dot" :class="agentAvailable ? 'online' : agentInfo.llmEndpoint ? 'online' : 'offline'" style="width:6px;height:6px;vertical-align:middle"></span>
            <span x-text="agentInfo.llmEndpoint ? 'L3a Agent' : t('direct_mode')"></span>
          </span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('llm_model')"></span>
          <span class="agent-info-value" x-text="agentInfo.llmModel || t('not_configured')" :title="agentInfo.llmModel || ''"></span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('llm_endpoint')"></span>
          <span class="agent-info-value" x-text="agentInfo.llmEndpoint ? truncateUrl(agentInfo.llmEndpoint) : t('not_configured')" :title="agentInfo.llmEndpoint || ''"></span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label">OpenClaw</span>
          <span class="agent-info-value" :title="openClawStatusTitle()">
            <span class="status-dot" :class="openClawDotClass()" style="width:6px;height:6px;vertical-align:middle"></span>
            <span x-text="openClawStatusText()"></span>
          </span>
        </div>
        <div class="support-summary-actions" x-show="openclaw.claimNeeded" style="justify-content:flex-end;margin-top:10px">

          <template x-for="(dep, di) in deployments" :key="di">
            <li :class="{ starting: dep.startup_progress > 0 && dep.startup_progress < 100 }">
              <span class="dot" :class="dep.phase === 'running' && dep.ready ? 'dot-green' : dep.phase === 'failed' ? 'dot-red' : 'dot-orange'"></span>
              <div style="flex:1;overflow:hidden">

                <div style="font-size:10px;color:var(--text-dim)" x-text="dep.detail"></div>

                <template x-if="(dep.phase === 'starting' || dep.startup_progress > 0) && !dep.ready">
                  <div style="margin-top:6px">
                    <div class="deploy-progress">
                      <div class="deploy-progress-fill starting" :style="'width:' + Math.max(5, Math.min(dep.startup_progress || 5, 95)) + '%'"></div>
                    </div>

                      <span>
                        <span class="deploy-phase-icon">◐</span>
                        <span x-text="dep.startup_message || dep.startup_phase || 'Initializing...'"></span>

                      <span class="deploy-eta" x-text="dep.eta ? '~' + dep.eta : (dep.startup_progress || 5) + '%'"></span>
                    </div>
                  </div>

                <template x-if="dep.phase === 'running' && dep.ready && dep.address">

                      <span x-text="'Ready: ' + dep.address"></span>
                    </div>
                  </template>
                  <template x-if="(dep.phase === 'starting' || dep.startup_progress > 0) && !dep.ready">

                        <div class="deploy-progress-fill starting" :style="'width:' + Math.max(5, Math.min(dep.startup_progress || 5, 95)) + '%'"></div>

                          <span class="deploy-phase-icon">◐</span>

          <div class="agent-info-row">
            <span class="agent-info-label" x-text="t('llm_model')"></span>

          <div class="agent-info-row">
            <span class="agent-info-label">OpenClaw</span>
            <span class="agent-info-value" :title="openClawStatusTitle()">

              <span x-text="openClawStatusText()"></span>
            </span>
          </div>
          <div class="support-summary-actions" x-show="openclaw.claimNeeded" style="justify-content:flex-end;margin-top:8px">
            <button type="button" class="support-summary-btn" @click="claimOpenClaw()" :disabled="openclawClaiming" x-text="openclawClaiming ? t('openclaw_claiming') : t('openclaw_claim_action')"></button>

          <div class="support-feedback" x-show="openclawClaimError" x-text="openclawClaimError" style="margin-top:8px"></div>
          <div style="margin-top:6px;text-align:right">
            <span class="agent-info-value clickable" @click="openSettings()" x-text="t('configure')"></span>

        </div>
        <div class="panel">
          <div class="panel-title">&#x25A0; <span x-text="t('hardware')"></span></div>

        <div class="panel">
          <div class="panel-title">&#x25B6; <span x-text="t('engines')"></span></div>

          <div class="panel-title">&#x25C6; <span x-text="t('models')"></span></div>

      </div>
    </template>
    <template x-if="mobileTab === 'fleet'">

          <div class="panel-title">&#x25C9; <span x-text="t('fleet')"></span></div>

        </div>
        <div class="panel">
          <div class="panel-title">&#x25B2; <span x-text="t('deployments')"></span></div>

    <template x-if="mobileTab === 'support'">

                <div class="support-status-pill"><span x-text="t('support_active_task')"></span><strong x-text="supportState.activeTask ? (supportState.activeTask.status || 'active') : (supportConnected ? t('support_no_task') : t('support_connecting'))"></strong></div>
              </div>
              <div class="support-summary-grid" x-show="supportSummaryVisible()">
                <div class="support-summary-card">
                  <div class="label" x-text="t('support_device_id')"></div>
                  <div class="value" x-text="supportState.deviceId || 'linking…'"></div>
                  <div class="meta" x-text="supportBindSummaryText()"></div>
                  <div class="support-summary-link" x-show="supportBindingURL()" x-text="supportBindingURL()"></div>
                  <div class="support-summary-actions">
                    <button type="button" class="support-summary-btn" @click="openSupportBinding()" :disabled="!supportCanBind()" x-text="supportBindActionLabel()"></button>
                  </div>
                </div>
                <div class="support-summary-card">
                  <div class="label" x-text="supportBudgetTasksLabel()"></div>
                  <div class="value" x-text="supportTaskBudgetValue()"></div>
                  <div class="meta" x-text="supportBudgetAmountSummary()"></div>
                </div>
                <div class="support-summary-card">
                  <div class="label" x-text="supportShareHeading()"></div>
                  <div class="value" x-text="supportSharePrimaryValue()"></div>
                  <div class="meta" x-text="supportShareMetaText()"></div>
                  <div class="support-summary-actions" x-show="supportState.shareText">
                    <button type="button" class="support-summary-btn" @click="copySupportShareText()" x-text="supportCopyShareLabel()"></button>
                  </div>
                </div>
              </div>
              <div class="support-msg-list" style="min-height:80px">

              </div>
              <div class="support-intake" x-show="supportPageShowTaskMenu()">
                <div class="support-intake-header">
                  <div class="support-intake-title" x-text="supportTaskMenuTitle()"></div>
                  <div class="support-intake-subtitle" x-text="supportTaskMenuSubtitle()"></div>
                </div>
                <div class="support-starter-section" x-show="supportTaskMenuOptions().length > 0">
                  <div class="support-starter-label" x-text="supportTaskMenuPrompt()"></div>
                  <div class="support-chip-list">
                    <template x-for="option in supportTaskMenuOptions()" :key="option.id || option.value"><button type="button" class="support-chip" @click="applySupportTaskOption(option)" x-text="supportManifestText(option.label, option.value || option.id || '')"></button></template>
                  </div>
                </div>
                <div class="support-starter-section" x-show="supportTaskMenuExamples().length > 0">
                  <div class="support-starter-label" x-text="supportTaskMenuFreeformHint()"></div>
                  <div class="support-chip-list">
                    <template x-for="example in supportTaskMenuExamples()" :key="supportManifestText(example, '')"><button type="button" class="support-chip" @click="applySupportExample(example)" x-text="supportManifestText(example, '')"></button></template>

            </div>

              <label x-text="t('gpu_idle_pct')"></label>

            <div class="modal-field">
              <label x-text="t('llm_api_key')"></label>
              <input type="password" x-model="settingsForm.llmApiKey" :placeholder="t('llm_api_key_hint')">
            </div>
            <div class="modal-field">
              <label x-text="t('llm_user_agent')"></label>
              <input type="text" x-model="settingsForm.llmUserAgent" placeholder="claude-code/2.1.5">
            </div>
            <div class="modal-field">
              <label x-text="t('llm_extra_params')"></label>
              <textarea x-model="settingsForm.llmExtraParams" :placeholder="t('llm_extra_params_hint')" rows="2"></textarea>
            </div>
            <div class="modal-hint" x-text="t('llm_config_hint')"></div>
          </div>
        </div>

        <!-- Tab: Connectivity -->
        <div x-show="settingsTab === 'connectivity'">
          <div class="modal-section">
            <div class="modal-section-title" x-text="t('central_server')"></div>
            <div class="modal-field">
              <label x-text="t('central_endpoint')"></label>
              <input type="url" x-model="settingsForm.centralEndpoint" placeholder="https://central.example.com">
            </div>
            <div class="modal-field">
              <label x-text="t('central_api_key')"></label>
              <input type="password" x-model="settingsForm.centralApiKey" :placeholder="t('central_api_key_hint')">

          </div>

            <div class="modal-section-title" x-text="t('support_service')"></div>

              <label x-text="t('support_endpoint_label')"></label>
              <input type="url" x-model="settingsForm.supportEndpoint" placeholder="https://support.example.com">
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button class="modal-btn" @click="showSettings = false" x-text="t('cancel')"></button>

</div>

    // i18n

      localStorage.setItem('aima_theme', this.theme);
      document.documentElement.setAttribute('data-theme', this.theme);
    },


    t(key) {
      var dict = I18N[this.lang] || I18N.en;
      return dict[key] || I18N.en[key] || key;
    },

    saveLang() {
      localStorage.setItem('aima_lang', this.lang);
    },

    // State
    systemOnline: false,

    input: '',
    thinking: false,

      // Agent tab
      llmEndpoint: '', llmModel: '', llmApiKey: '', llmUserAgent: '', llmExtraParams: '',
      // Connectivity tab

    },

    },

    supportPageCode: '',

    openclaw: {
