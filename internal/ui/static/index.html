<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AIMA</title>
<style>
/* ===== CSS Variables (Apple-inspired Design System) ===== */
:root {
  /* Background - Elegant dark gradients */
  --bg-primary: #1d1d1f;
  --bg-secondary: #2d2d2d;
  --bg-tertiary: #3a3a3c;
  --bg-panel: rgba(45, 45, 45, 0.72);
  --bg-input: rgba(58, 58, 60, 0.85);
  --bg-deep: linear-gradient(180deg, #1d1d1f 0%, #0d0d0d 100%);

  /* Accent - Apple System Blue */
  --accent: #0a84ff;
  --accent-hover: #409cff;
  --accent-dim: rgba(10, 132, 255, 0.25);
  --accent-glow: rgba(10, 132, 255, 0.12);
  --cyan: var(--accent);
  --cyan-bright: var(--accent-hover);
  --cyan-dim: var(--accent-dim);
  --cyan-glow: var(--accent-glow);

  /* Status Colors - Apple HIG */
  --success: #30d158;
  --warning: #ff9f0a;
  --error: #ff453a;
  --green: var(--success);
  --orange: var(--warning);
  --red: var(--error);

  /* Text - High contrast */
  --text: #f5f5f7;
  --text-dim: rgba(245, 245, 247, 0.55);
  --text-tertiary: rgba(245, 245, 247, 0.35);

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;

  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --panel-radius: var(--radius-md);

  /* Animation */
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --ease-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;

  /* Panel Styles */
  --panel-border: 1px solid rgba(255, 255, 255, 0.08);
  --panel-shadow:
    0 4px 24px rgba(0, 0, 0, 0.4),
    0 1px 2px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Layout ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(20, 20, 22, 0.8);
  flex-shrink: 0;
  min-height: 48px;
}
.topbar-logo {
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.topbar-logo span {
  color: var(--accent);
  font-size: 18px;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(48, 209, 88, 0.5); }
.status-dot.offline { background: var(--error); box-shadow: 0 0 6px rgba(255, 69, 58, 0.5); }
.status-text { font-size: 12px; color: var(--text-tertiary); }
.btn-icon {
  background: rgba(255, 255, 255, 0.05);
  border: none;
  color: var(--text-dim);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.btn-icon:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
}

/* Language selector */
.lang-select {
  background: rgba(255, 255, 255, 0.05);
  border: none;
  color: var(--text-dim);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    color var(--duration-fast) var(--ease-smooth);
}
.lang-select:hover { background: rgba(255, 255, 255, 0.1); color: var(--text); }
.lang-select option {
  background: var(--bg-secondary);
  color: var(--text);
}

/* Main content area */
.main {
  display: grid;
  grid-template-columns: 220px 1fr 260px;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* Side panels */
.sidebar-left, .sidebar-right {
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sidebar-left {
  border-right: 1px solid rgba(255, 255, 255, 0.04);
  background: rgba(0, 0, 0, 0.15);
}
.sidebar-right {
  border-left: 1px solid rgba(255, 255, 255, 0.04);
  background: rgba(0, 0, 0, 0.15);
}

/* Panel card - subtle style */
.panel {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  padding: 12px;
}
.panel-title {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Device identity in hardware panel */
.device-identity {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}
.device-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.device-ip {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
}

/* Gauge bars */
.gauge { margin-bottom: 8px; }
.gauge-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.gauge-bar {
  height: 4px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 2px;
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width var(--duration-slow) var(--ease-smooth);
  opacity: 0.8;
}
.gauge-fill.warn {
  background: var(--warning);
}
.gauge-fill.crit {
  background: var(--error);
}

/* List items in panels */
.panel-list { list-style: none; }
.panel-list li {
  padding: 6px 0;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}
.panel-list li:last-child { border-bottom: none; }
.panel-list .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-green { background: var(--success); }
.dot-orange { background: var(--warning); }
.dot-red { background: var(--error); }
.dot-dim { background: var(--text-tertiary); }
.panel-list .item-detail {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: auto;
}

/* Fleet device card */
.fleet-device {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  font-size: 13px;
}
.fleet-device:last-child { border-bottom: none; }
.fleet-device .name { font-family: var(--font-sans); font-weight: 500; }
.fleet-device .meta { font-size: 11px; color: var(--text-tertiary); }
.fleet-device.clickable {
  cursor: pointer;
  border-radius: 6px;
  padding: 8px;
  margin: 0 -8px;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.fleet-device.clickable:hover {
  background: rgba(255, 255, 255, 0.06);
}
.fleet-link-hint {
  font-size: 14px;
  color: var(--text-tertiary);
  opacity: 0;
  transition: opacity var(--duration-fast) var(--ease-smooth);
}
.fleet-device.clickable:hover .fleet-link-hint {
  opacity: 1;
  color: var(--accent);
}

/* Agent info rows */
.agent-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}
.agent-info-row:last-child { border-bottom: none; }
.agent-info-label { color: var(--text-tertiary); }
.agent-info-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
}
.agent-info-value.clickable {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: transparent;
  transition: text-decoration-color var(--duration-fast) var(--ease-smooth);
}
.agent-info-value.clickable:hover { text-decoration-color: var(--accent); }

/* ===== Center: Agent Chat ===== */
.center {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.1);
}

/* Agent header - minimal Claude Code style */
.agent-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  background: transparent;
  flex-shrink: 0;
}
.agent-avatar {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  border-radius: 6px;
  opacity: 0.9;
}
.agent-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}
.agent-mode {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 5px;
  margin-left: auto;
}

/* Chat messages - refined typography */
.chat-messages {
  flex: 1;
  min-height: 0;  /* Critical for flex child scrolling */
  overflow-y: auto;
  padding: 12px 12px;
  background: transparent;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.45;
  display: flex;
  flex-direction: column;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 2px;
}
.chat-messages::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.2);
}

.msg {
  display: flex;
  align-items: flex-start;
  white-space: pre-wrap;
  word-break: break-word;
  max-width: 680px;
}
.msg:last-child {
  margin-bottom: 0;
}
.msg-prefix {
  font-weight: 500;
  margin-right: 6px;
  user-select: none;
  flex-shrink: 0;
}
.msg-text {
  flex: 1;
}
.msg-user .msg-prefix { color: var(--accent); opacity: 0.5; }
.msg-user .msg-text { color: var(--text); }
.msg-ai .msg-prefix { color: var(--success); opacity: 0.6; }
.msg-ai .msg-text { color: var(--text); }
.msg-error .msg-text { color: var(--error); }
.msg-system .msg-text { color: var(--text-tertiary); font-style: italic; font-size: 12px; }

/* Tool call display - Claude Code style indicator lights */
.msg-tool {
  margin: 4px 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.msg-tool-header {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 4px 4px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: background var(--duration-fast) var(--ease-smooth);
}
.msg-tool-header:hover {
  background: rgba(255, 255, 255, 0.08);
}
.msg-tool-indicator {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: bold;
  flex-shrink: 0;
}
.msg-tool-indicator.running {
  background: rgba(10, 132, 255, 0.2);
  color: var(--accent);
  animation: indicatorPulse 1.2s ease-in-out infinite;
}
.msg-tool-indicator.running::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: indicatorDot 1.2s ease-in-out infinite;
}
.msg-tool-indicator.success {
  background: rgba(48, 209, 88, 0.2);
  color: var(--success);
}
.msg-tool-indicator.success::after {
  content: '✓';
}
.msg-tool-indicator.error {
  background: rgba(255, 69, 58, 0.2);
  color: var(--error);
}
.msg-tool-indicator.error::after {
  content: '✗';
}
@keyframes indicatorPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.95); }
}
@keyframes indicatorDot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.msg-tool-name {
  color: var(--text);
  font-weight: 500;
  font-family: var(--font-mono);
}
.msg-tool-duration {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-left: 4px;
}
.msg-tool-expand {
  font-size: 10px;
  color: var(--text-tertiary);
  transition: transform var(--duration-fast) var(--ease-smooth);
  margin-left: auto;
}
.msg-tool.expanded .msg-tool-expand {
  transform: rotate(90deg);
}
.msg-tool-content {
  display: none;
  margin-top: 6px;
  margin-left: 22px;
  padding: 10px 12px;
  background: rgba(0, 0, 0, 0.25);
  border-radius: 8px;
  border-left: 2px solid rgba(255, 255, 255, 0.1);
  font-size: 11px;
  color: var(--text-dim);
  overflow-x: auto;
  max-width: 100%;
}
.msg-tool.expanded .msg-tool-content {
  display: block;
  animation: fadeIn var(--duration-fast) var(--ease-smooth);
}
.msg-tool-args {
  margin-bottom: 6px;
}
.msg-tool-args strong {
  color: var(--text-tertiary);
  font-weight: 500;
}
.msg-tool-result {
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  padding-top: 6px;
  margin-top: 6px;
}
.msg-tool-result.success {
  color: var(--success);
  opacity: 0.9;
}
.msg-tool-result.error {
  color: var(--error);
}
.msg-tool pre {
  margin: 4px 0 0 0;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Welcome/empty state */
.chat-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px 24px;
  text-align: center;
}
.chat-welcome-icon {
  font-size: 32px;
  margin-bottom: 16px;
  opacity: 0.6;
}
.chat-welcome-title {
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}
.chat-welcome-hint {
  font-size: 13px;
  color: var(--text-tertiary);
  max-width: 320px;
}

/* Thinking indicator */
.thinking {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 12px;
  animation: thinkingPulse 1.5s ease-in-out infinite;
  margin-bottom: 16px;
  letter-spacing: 2px;
}
@keyframes thinkingPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* Chat input - clean minimal style */
.chat-input-wrap {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(29, 29, 31, 0.5);
  flex-shrink: 0;
  gap: 10px;
}
.chat-prompt {
  color: var(--accent);
  opacity: 0.6;
  font-family: var(--font-mono);
  font-size: 14px;
  flex-shrink: 0;
  user-select: none;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  padding: 6px 0;
  line-height: 1.5;
}
.chat-input::placeholder { color: var(--text-tertiary); }
.chat-send {
  background: var(--accent);
  border: none;
  color: white;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    opacity var(--duration-fast) var(--ease-smooth),
    transform var(--duration-fast) var(--ease-spring);
}
.chat-send:hover:not(:disabled) {
  background: var(--accent-hover);
}
.chat-send:active:not(:disabled) {
  transform: scale(0.96);
}
.chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ===== Bottom bar ===== */
.bottombar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.04);
  background: rgba(20, 20, 22, 0.8);
  flex-shrink: 0;
  font-size: 11px;
  min-height: 32px;
}
.bottom-gauge {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  max-width: 280px;
}
.bottom-gauge-label {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  font-size: 10px;
}
.bottom-gauge-bar {
  flex: 1;
  height: 3px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 2px;
  overflow: hidden;
}
.bottom-gauge-fill {
  height: 100%;
  border-radius: 2px;
  transition: width var(--duration-slow) var(--ease-smooth);
}
.bottom-temp {
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  white-space: nowrap;
  font-size: 10px;
}

/* ===== Settings Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn var(--duration-fast) var(--ease-smooth);
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  padding: 24px;
  width: 400px;
  max-height: 85vh;
  overflow-y: auto;
  animation: modalIn var(--duration-normal) var(--ease-smooth);
}
@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.96) translateY(8px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
.modal h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  font-family: var(--font-sans);
}
.modal-section {
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.modal-section:last-of-type { border-bottom: none; margin-bottom: 12px; padding-bottom: 0; }
.modal-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
}
.modal-field { margin-bottom: 12px; }
.modal-field:last-child { margin-bottom: 0; }
.modal-field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.modal input[type="text"],
.modal input[type="password"],
.modal input[type="url"] {
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition:
    border-color var(--duration-fast) var(--ease-smooth),
    background var(--duration-fast) var(--ease-smooth);
}
.modal input:focus {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.08);
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition:
    background var(--duration-fast) var(--ease-smooth),
    border-color var(--duration-fast) var(--ease-smooth);
}
.modal-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.12);
}
.modal-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.modal-btn.primary:hover {
  background: var(--accent-hover);
}
.modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.modal-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
}
.modal-feedback {
  font-size: 12px;
  font-family: var(--font-mono);
  margin-bottom: 14px;
  padding: 8px 10px;
  border-radius: 6px;
}
.modal-feedback.success { color: var(--success); background: rgba(48, 209, 88, 0.1); }
.modal-feedback.error { color: var(--error); background: rgba(255, 69, 58, 0.1); }

/* ===== Mobile ===== */
.mobile-tabs {
  display: none;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(20, 20, 22, 0.95);
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.mobile-tabs button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  padding: 10px 8px;
  cursor: pointer;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color var(--duration-fast) var(--ease-smooth);
}
.mobile-tabs button.active {
  color: var(--accent);
}

/* Mobile panel overlay */
.mobile-panel {
  display: none;
  position: fixed;
  bottom: 44px;
  left: 0;
  right: 0;
  max-height: 60vh;
  overflow-y: auto;
  background: rgba(29, 29, 31, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  padding: 16px;
  z-index: 50;
  padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
}
.mobile-panel.show {
  display: block;
  animation: slideUp var(--duration-normal) var(--ease-smooth);
}
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
  }
  .sidebar-left, .sidebar-right { display: none; }
  .bottombar { display: none; }
  .mobile-tabs { display: flex; }

  /* Compact metrics bar for mobile */
  .mobile-metrics {
    display: flex;
    gap: 12px;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    background: rgba(20, 20, 22, 0.9);
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mobile-metrics::-webkit-scrollbar { display: none; }
  .mobile-metrics .mm-item {
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .mobile-metrics .mm-bar {
    width: 40px;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .mobile-metrics .mm-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width var(--duration-slow) var(--ease-smooth);
  }

  /* Mobile chat adjustments */
  .agent-header {
    padding: 8px 12px;
    gap: 8px;
  }
  .agent-avatar {
    width: 24px;
    height: 24px;
  }
  .agent-name {
    font-size: 13px;
  }
  .agent-mode {
    font-size: 11px;
  }

  .chat-messages {
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .msg {
    margin-bottom: 16px;
    max-width: 100%;
  }

  .chat-input-wrap {
    padding: 10px 12px;
    gap: 8px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
  }
  .chat-prompt {
    font-size: 13px;
  }
  .chat-input {
    font-size: 13px;
  }
  .chat-send {
    padding: 6px 12px;
    font-size: 11px;
  }

  .topbar {
    padding: 10px 12px;
    min-height: 48px;
  }
  .topbar-logo {
    font-size: 16px;
  }
  .status-text {
    font-size: 12px;
  }
  .btn-icon {
    width: 32px;
    height: 32px;
  }

  .panel {
    padding: 12px;
  }
  .panel-title {
    font-size: 11px;
    margin-bottom: 10px;
  }
  .gauge-label {
    font-size: 12px;
  }
  .panel-list li {
    font-size: 13px;
    padding: 6px 0;
  }
}

@media (min-width: 769px) {
  .mobile-metrics { display: none !important; }
}

/* Empty state */
.empty {
  color: var(--text-tertiary);
  font-size: 12px;
  padding: 16px 0;
  text-align: center;
}

/* Deploy progress - enhanced startup visualization */
.deploy-progress {
  height: 4px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.deploy-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--cyan-bright, #409cff));
  transition: width 0.3s ease;
  position: relative;
}
.deploy-progress-fill.starting {
  background: linear-gradient(90deg, var(--warning), var(--accent));
  animation: progressPulse 1.5s ease-in-out infinite;
}
@keyframes progressPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.deploy-phase-text {
  font-size: 10px;
  color: var(--accent);
  margin-top: 3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.deploy-phase-icon {
  margin-right: 4px;
  animation: spin 1.5s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.deploy-eta {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
}
.deploy-error-lines {
  font-size: 10px;
  color: var(--error);
  white-space: pre-wrap;
  word-break: break-all;
  margin-top: 4px;
  max-height: 60px;
  overflow: hidden;
  font-family: var(--font-mono);
  background: rgba(255, 69, 58, 0.1);
  padding: 4px 6px;
  border-radius: 4px;
}

/* Starting deployment highlight */
.panel-list li.starting {
  background: rgba(255, 159, 10, 0.08);
  border-radius: 6px;
  padding: 8px;
  margin: -8px;
  margin-bottom: 0;
}
</style>
</head>
<body>
<div id="app" x-data="aimaApp()" x-init="init()" @keydown.window="handleGlobalKey($event)">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo"><span>&#x25C8;</span> AIMA</div>
    <div class="topbar-right">
      <span class="status-text">
        <span class="status-dot" :class="systemOnline ? 'online' : 'offline'"></span>
        <span x-text="systemOnline ? t('system_online') : t('connecting')"></span>
      </span>
      <select class="lang-select" x-model="lang" @change="saveLang()">
        <option value="en">EN</option>
        <option value="zh">&#x4E2D;&#x6587;</option>
        <option value="ja">&#x65E5;&#x672C;&#x8A9E;</option>
        <option value="ko">&#xD55C;&#xAD6D;&#xC5B4;</option>
        <option value="es">ES</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
      </select>
      <button class="btn-icon" @click="openSettings()" :title="t('settings')">&#x2699;</button>
    </div>
  </div>

  <!-- Mobile Metrics -->
  <div class="mobile-metrics">
    <template x-if="hw.gpu">
      <div class="mm-item">
        GPU <span x-text="hw.gpu.util + '%'"></span>
        <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.gpu.util + '%'"></div></div>
        <span x-text="hw.gpu.temp ? hw.gpu.temp + '\u00B0C' : ''"></span>
      </div>
    </template>
    <div class="mm-item">
      MEM <span x-text="hw.mem.pct + '%'"></span>
      <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.mem.pct + '%'"></div></div>
    </div>
    <div class="mm-item">
      CPU <span x-text="hw.cpu.pct + '%'"></span>
      <div class="mm-bar"><div class="mm-fill" :style="'width:' + hw.cpu.pct + '%'"></div></div>
    </div>
  </div>

  <!-- Main 3-Column Layout -->
  <div class="main">

    <!-- Left Sidebar: Hardware + Engines + Models -->
    <div class="sidebar-left">

      <!-- Hardware Panel -->
      <div class="panel">
        <div class="panel-title">&#x25A0; <span x-text="t('hardware')"></span></div>
        <!-- Device identity -->
        <div class="device-identity">
          <span class="device-name" x-text="hostname || selfIp || 'This Device'"></span>
          <span class="device-ip" x-show="selfIp && selfIp !== 'localhost' && selfIp !== '127.0.0.1'" x-text="selfIp"></span>
        </div>
        <template x-if="hw.gpu">
          <div>
            <div class="gauge">
              <div class="gauge-label">
                <span x-text="'GPU ' + hw.gpu.name"></span>
                <span x-text="hw.gpu.util + '%'"></span>
              </div>
              <div class="gauge-bar">
                <div class="gauge-fill" :class="hw.gpu.util > 90 ? 'crit' : hw.gpu.util > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.util + '%'"></div>
              </div>
            </div>
            <div class="gauge">
              <div class="gauge-label">
                <span>VRAM</span>
                <span x-text="hw.gpu.memUsed + '/' + hw.gpu.memTotal"></span>
              </div>
              <div class="gauge-bar">
                <div class="gauge-fill" :class="hw.gpu.memPct > 90 ? 'crit' : hw.gpu.memPct > 70 ? 'warn' : ''" :style="'width:' + hw.gpu.memPct + '%'"></div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px" x-show="hw.gpu.temp">
              <span x-text="hw.gpu.temp + '\u00B0C'"></span>
              <span x-show="hw.gpu.power" x-text="' / ' + hw.gpu.power + 'W'"></span>
            </div>
          </div>
        </template>
        <template x-if="!hw.gpu">
          <div class="empty" x-text="t('no_gpu')"></div>
        </template>
        <div class="gauge" style="margin-top:8px">
          <div class="gauge-label"><span>CPU</span><span x-text="hw.cpu.pct + '%'"></span></div>
          <div class="gauge-bar">
            <div class="gauge-fill" :class="hw.cpu.pct > 90 ? 'crit' : hw.cpu.pct > 70 ? 'warn' : ''" :style="'width:' + hw.cpu.pct + '%'"></div>
          </div>
        </div>
        <div class="gauge">
          <div class="gauge-label">
            <span>RAM</span>
            <span x-text="hw.mem.used + '/' + hw.mem.total"></span>
          </div>
          <div class="gauge-bar">
            <div class="gauge-fill" :class="hw.mem.pct > 90 ? 'crit' : hw.mem.pct > 70 ? 'warn' : ''" :style="'width:' + hw.mem.pct + '%'"></div>
          </div>
        </div>
      </div>

      <!-- Engines Panel -->
      <div class="panel">
        <div class="panel-title">&#x25B6; <span x-text="t('engines')"></span></div>
        <template x-if="engines.length === 0">
          <div class="empty" x-text="t('no_engines')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="e in engines" :key="e.id">
            <li>
              <span class="dot" :class="e.available ? 'dot-green' : 'dot-dim'"></span>
              <span x-text="e.type"></span>
              <span class="item-detail" x-text="e.variant || ''"></span>
            </li>
          </template>
        </ul>
      </div>

      <!-- Models Panel -->
      <div class="panel">
        <div class="panel-title">&#x25C6; <span x-text="t('models')"></span></div>
        <template x-if="models.length === 0">
          <div class="empty" x-text="t('no_models')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="m in models" :key="m.name">
            <li>
              <span class="dot dot-green"></span>
              <span x-text="m.name" style="flex:1;overflow:hidden;text-overflow:ellipsis"></span>
              <span class="item-detail" x-text="m.size || ''"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>

    <!-- Center: Agent Chat -->
    <div class="center">
      <div class="agent-header">
        <img class="agent-avatar" src="avatar.svg" alt="AIMA">
        <div>
          <div class="agent-name">AIMA Agent</div>
          <div class="agent-mode">
            <span class="status-dot" :class="agentAvailable ? 'online' : 'offline'" style="width:6px;height:6px"></span>
            <span x-text="agentAvailable ? t('agent_ready') : t('direct_mode')"></span>
          </div>
        </div>
      </div>

      <div class="chat-messages" x-ref="chatMessages">
        <template x-for="(msg, i) in messages" :key="i">
          <div class="msg" :class="'msg-' + msg.role">
            <template x-if="msg.role === 'user'">
              <div><span class="msg-prefix">&gt;</span><span class="msg-text" x-text="msg.text"></span></div>
            </template>
            <template x-if="msg.role === 'ai'">
              <div><span class="msg-prefix">○</span><span class="msg-text" x-text="msg.text"></span></div>
            </template>
            <template x-if="msg.role === 'tool'">
              <div class="msg-tool" :class="msg.expanded ? 'expanded' : ''" @click="msg.expanded = !msg.expanded">
                <div class="msg-tool-header">
                  <span class="msg-tool-indicator" :class="msg.status || 'running'"></span>
                  <span class="msg-tool-name" x-text="msg.toolName || 'tool'"></span>
                  <span class="msg-tool-duration" x-show="msg.duration" x-text="msg.duration"></span>
                  <span class="msg-tool-expand">▸</span>
                </div>
                <div class="msg-tool-content">
                  <div class="msg-tool-args" x-show="msg.args">
                    <strong>Input:</strong>
                    <pre x-text="typeof msg.args === 'object' ? JSON.stringify(msg.args, null, 2) : msg.args"></pre>
                  </div>
                  <div class="msg-tool-result" :class="msg.status" x-show="msg.result">
                    <strong>Result:</strong>
                    <pre x-text="typeof msg.result === 'object' ? JSON.stringify(msg.result, null, 2) : msg.result"></pre>
                  </div>
                </div>
              </div>
            </template>
            <template x-if="msg.role === 'error'">
              <div><span class="msg-text" x-text="msg.text"></span></div>
            </template>
            <template x-if="msg.role === 'system'">
              <div><span class="msg-text" x-text="msg.text"></span></div>
            </template>
          </div>
        </template>
        <div class="thinking" x-show="thinking">&middot;&middot;&middot;</div>
      </div>

      <div class="chat-input-wrap">
        <span class="chat-prompt">&gt;</span>
        <input class="chat-input"
          x-ref="chatInput"
          x-model="input"
          @keydown.enter="send()"
          :placeholder="t('chat_placeholder')"
          :disabled="thinking"
          autocomplete="off"
          spellcheck="false">
        <button class="chat-send" @click="send()" :disabled="thinking || !input.trim()" x-text="t('send')"></button>
      </div>
    </div>

    <!-- Right Sidebar: Agent Status + Fleet + Deployments -->
    <div class="sidebar-right">

      <!-- Agent Status Panel -->
      <div class="panel">
        <div class="panel-title">&#x25CE; <span x-text="t('agent_status')"></span></div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('mode')"></span>
          <span class="agent-info-value">
            <span class="status-dot" :class="agentAvailable ? 'online' : agentInfo.llmEndpoint ? 'online' : 'offline'" style="width:6px;height:6px;vertical-align:middle"></span>
            <span x-text="agentInfo.zeroclawHealthy ? 'L3b ZeroClaw' : (agentInfo.llmEndpoint ? 'L3a Agent' : t('direct_mode'))"></span>
          </span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('llm_model')"></span>
          <span class="agent-info-value" x-text="agentInfo.llmModel || t('not_configured')" :title="agentInfo.llmModel || ''"></span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('llm_endpoint')"></span>
          <span class="agent-info-value" x-text="agentInfo.llmEndpoint ? truncateUrl(agentInfo.llmEndpoint) : t('not_configured')" :title="agentInfo.llmEndpoint || ''"></span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label" x-text="t('session')"></span>
          <span class="agent-info-value" x-text="sessionId ? sessionId.substring(0, 8) + '...' : t('none')"></span>
        </div>
        <div class="agent-info-row">
          <span class="agent-info-label">ZeroClaw</span>
          <span class="agent-info-value">
            <span class="status-dot" :class="agentInfo.zeroclawHealthy ? 'online' : agentInfo.zeroclawAvailable ? 'offline' : 'offline'" style="width:6px;height:6px;vertical-align:middle"></span>
            <span x-text="agentInfo.zeroclawHealthy ? t('healthy') : agentInfo.zeroclawAvailable ? t('unhealthy') : t('unavailable')"></span>
          </span>
        </div>
        <div style="margin-top:8px;text-align:right">
          <span class="agent-info-value clickable" @click="openSettings()" x-text="t('configure')"></span>
        </div>
      </div>

      <!-- Fleet Panel -->
      <div class="panel">
        <div class="panel-title">&#x25C9; <span x-text="t('fleet')"></span></div>
        <template x-if="fleet.length === 0">
          <div class="empty" x-text="t('no_fleet')"></div>
        </template>
        <template x-for="d in fleet" :key="d.id">
          <div class="fleet-device" :class="{ clickable: d.addr && d.online }" @click="openDeviceUI(d)">
            <span class="status-dot" :class="d.online ? 'online' : 'offline'" style="width:6px;height:6px"></span>
            <div style="flex:1;min-width:0">
              <div class="name" x-text="d.name || d.id"></div>
              <div class="meta" x-text="d.meta || ''"></div>
            </div>
            <template x-if="d.addr && d.online">
              <span class="fleet-link-hint" title="Open Web UI">&#x2197;</span>
            </template>
          </div>
        </template>
      </div>

      <!-- Deployments Panel -->
      <div class="panel">
        <div class="panel-title">&#x25B2; <span x-text="t('deployments')"></span></div>
        <template x-if="deployments.length === 0">
          <div class="empty" x-text="t('no_deployments')"></div>
        </template>
        <ul class="panel-list">
          <template x-for="dep in deployments" :key="dep.name">
            <li :class="{ starting: dep.startup_progress > 0 && dep.startup_progress < 100 }">
              <span class="dot" :class="dep.phase === 'running' && dep.ready ? 'dot-green' : dep.phase === 'failed' ? 'dot-red' : 'dot-orange'"></span>
              <div style="flex:1;overflow:hidden">
                <div x-text="dep.name" style="text-overflow:ellipsis;overflow:hidden"></div>
                <div style="font-size:10px;color:var(--text-dim)" x-text="dep.detail"></div>
                <!-- Startup progress - show when starting or has progress -->
                <template x-if="(dep.phase === 'starting' || dep.startup_progress > 0) && !dep.ready">
                  <div style="margin-top:6px">
                    <div class="deploy-progress">
                      <div class="deploy-progress-fill starting" :style="'width:' + Math.max(5, Math.min(dep.startup_progress || 5, 95)) + '%'"></div>
                    </div>
                    <div class="deploy-phase-text">
                      <span>
                        <span class="deploy-phase-icon">◐</span>
                        <span x-text="dep.startup_message || dep.startup_phase || 'Initializing...'"></span>
                      </span>
                      <span class="deploy-eta" x-text="dep.eta ? '~' + dep.eta : (dep.startup_progress || 5) + '%'"></span>
                    </div>
                  </div>
                </template>
                <!-- Ready indicator -->
                <template x-if="dep.phase === 'running' && dep.ready && dep.address">
                  <div style="font-size:10px;color:var(--success);margin-top:2px;display:flex;align-items:center;gap:4px">
                    <span>●</span>
                    <span x-text="'Ready: ' + dep.address"></span>
                  </div>
                </template>
                <!-- Error display -->
                <template x-if="dep.phase === 'failed' && dep.error_lines">
                  <div class="deploy-error-lines" x-text="dep.error_lines"></div>
                </template>
              </div>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </div>

  <!-- Mobile Tabs -->
  <div class="mobile-tabs">
    <button :class="mobileTab === 'chat' ? 'active' : ''" @click="setMobileTab('chat')" x-text="t('agent')"></button>
    <button :class="mobileTab === 'dashboard' ? 'active' : ''" @click="setMobileTab('dashboard')" x-text="t('dashboard')"></button>
    <button :class="mobileTab === 'fleet' ? 'active' : ''" @click="setMobileTab('fleet')" x-text="t('fleet')"></button>
  </div>

  <!-- Mobile Panel Overlay -->
  <div class="mobile-panel" :class="mobileTab !== 'chat' ? 'show' : ''" x-show="mobileTab !== 'chat'">
    <template x-if="mobileTab === 'dashboard'">
      <div style="display:flex;flex-direction:column;gap:8px">
        <!-- Mobile Agent Status -->
        <div class="panel">
          <div class="panel-title">&#x25CE; <span x-text="t('agent_status')"></span></div>
          <div class="agent-info-row">
            <span class="agent-info-label" x-text="t('mode')"></span>
            <span class="agent-info-value" x-text="agentInfo.zeroclawHealthy ? 'L3b' : (agentInfo.llmEndpoint ? 'L3a' : t('direct_mode'))"></span>
          </div>
          <div class="agent-info-row">
            <span class="agent-info-label" x-text="t('llm_model')"></span>
            <span class="agent-info-value" x-text="agentInfo.llmModel || t('not_configured')"></span>
          </div>
          <div style="margin-top:6px;text-align:right">
            <span class="agent-info-value clickable" @click="openSettings()" x-text="t('configure')"></span>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">&#x25A0; <span x-text="t('hardware')"></span></div>
          <template x-if="hw.gpu">
            <div>
              <div class="gauge"><div class="gauge-label"><span x-text="'GPU ' + hw.gpu.name"></span><span x-text="hw.gpu.util + '%'"></span></div><div class="gauge-bar"><div class="gauge-fill" :style="'width:' + hw.gpu.util + '%'"></div></div></div>
              <div class="gauge"><div class="gauge-label"><span>VRAM</span><span x-text="hw.gpu.memUsed + '/' + hw.gpu.memTotal"></span></div><div class="gauge-bar"><div class="gauge-fill" :style="'width:' + hw.gpu.memPct + '%'"></div></div></div>
            </div>
          </template>
          <div class="gauge"><div class="gauge-label"><span>CPU</span><span x-text="hw.cpu.pct + '%'"></span></div><div class="gauge-bar"><div class="gauge-fill" :style="'width:' + hw.cpu.pct + '%'"></div></div></div>
          <div class="gauge"><div class="gauge-label"><span>RAM</span><span x-text="hw.mem.used + '/' + hw.mem.total"></span></div><div class="gauge-bar"><div class="gauge-fill" :style="'width:' + hw.mem.pct + '%'"></div></div></div>
        </div>
        <div class="panel">
          <div class="panel-title">&#x25B6; <span x-text="t('engines')"></span></div>
          <ul class="panel-list"><template x-for="e in engines" :key="e.id"><li><span class="dot" :class="e.available ? 'dot-green' : 'dot-dim'"></span><span x-text="e.type"></span></li></template></ul>
        </div>
        <div class="panel">
          <div class="panel-title">&#x25C6; <span x-text="t('models')"></span></div>
          <ul class="panel-list"><template x-for="m in models" :key="m.name"><li><span class="dot dot-green"></span><span x-text="m.name"></span></li></template></ul>
        </div>
      </div>
    </template>
    <template x-if="mobileTab === 'fleet'">
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="panel">
          <div class="panel-title">&#x25C9; <span x-text="t('fleet')"></span></div>
          <template x-for="d in fleet" :key="d.id"><div class="fleet-device"><span class="status-dot" :class="d.online ? 'online' : 'offline'" style="width:6px;height:6px"></span><div><div class="name" x-text="d.name || d.id"></div><div class="meta" x-text="d.meta || ''"></div></div></div></template>
        </div>
        <div class="panel">
          <div class="panel-title">&#x25B2; <span x-text="t('deployments')"></span></div>
          <ul class="panel-list"><template x-for="dep in deployments" :key="dep.name"><li style="flex-wrap:wrap"><span class="dot" :class="dep.phase === 'running' && dep.ready ? 'dot-green' : dep.phase === 'failed' ? 'dot-red' : 'dot-orange'"></span><span x-text="dep.name"></span><span class="item-detail" x-text="dep.startup_message || dep.phase"></span><template x-if="dep.startup_progress > 0 && dep.startup_progress < 100"><div style="width:100%;margin-top:2px"><div class="deploy-progress"><div class="deploy-progress-fill" :style="'width:' + dep.startup_progress + '%'"></div></div></div></template></li></template></ul>
        </div>
      </div>
    </template>
  </div>

  <!-- Settings Modal -->
  <template x-if="showSettings">
    <div class="modal-overlay" @click.self="showSettings = false">
      <div class="modal">
        <h3 x-text="t('settings')"></h3>

        <!-- Feedback -->
        <template x-if="settingsFeedback">
          <div class="modal-feedback" :class="settingsFeedback.type" x-text="settingsFeedback.text"></div>
        </template>

        <!-- Section: AIMA Access -->
        <div class="modal-section">
          <div class="modal-section-title" x-text="t('access_auth')"></div>
          <div class="modal-field">
            <label x-text="t('api_key')"></label>
            <input type="password" x-model="settingsForm.apiKey" :placeholder="t('api_key_hint')">
            <div class="modal-hint" x-text="t('api_key_local')"></div>
          </div>
        </div>

        <!-- Section: LLM Backend -->
        <div class="modal-section">
          <div class="modal-section-title" x-text="t('llm_backend')"></div>
          <div class="modal-field">
            <label x-text="t('llm_endpoint')"></label>
            <input type="url" x-model="settingsForm.llmEndpoint" placeholder="http://localhost:6188/v1">
          </div>
          <div class="modal-field">
            <label x-text="t('llm_model')"></label>
            <input type="text" x-model="settingsForm.llmModel" placeholder="qwen3-8b">
          </div>
          <div class="modal-field">
            <label x-text="t('llm_api_key')"></label>
            <input type="password" x-model="settingsForm.llmApiKey" :placeholder="t('llm_api_key_hint')">
          </div>
          <div class="modal-field">
            <label x-text="t('llm_user_agent')"></label>
            <input type="text" x-model="settingsForm.llmUserAgent" placeholder="claude-code/2.1.5">
            <div class="modal-hint" x-text="t('llm_config_hint')"></div>
          </div>
        </div>

        <div class="modal-actions">
          <button class="modal-btn" @click="showSettings = false" x-text="t('cancel')"></button>
          <button class="modal-btn" @click="clearSettings()" x-text="t('clear')"></button>
          <button class="modal-btn primary" @click="saveSettings()" :disabled="settingsSaving" x-text="settingsSaving ? t('saving') : t('save')"></button>
        </div>
      </div>
    </div>
  </template>

</div>

function aimaApp() {
  return {
    // i18n
    lang: localStorage.getItem('aima_lang') || 'en',

    t(key) {
      var dict = I18N[this.lang] || I18N.en;
      return dict[key] || I18N.en[key] || key;
    },

    saveLang() {
      localStorage.setItem('aima_lang', this.lang);
      // Update welcome message to match language
      if (this.messages.length === 1 && this.messages[0].role === 'system') {
        this.messages[0].text = this.t('welcome');
      }
    },

    // State
    systemOnline: false,
    agentAvailable: false,
    showSettings: false,
    apiKey: localStorage.getItem('aima_api_key') || '',
    input: '',
    thinking: false,
    messages: [],
    sessionId: '',
    mobileTab: 'chat',

    // Settings modal form
    settingsForm: { apiKey: '', llmEndpoint: '', llmModel: '', llmApiKey: '', llmUserAgent: '' },
    settingsSaving: false,
    settingsFeedback: null,

    // Agent info
    agentInfo: {
      llmEndpoint: '',
      llmModel: '',
      llmUserAgent: '',
      zeroclawAvailable: false,
      zeroclawHealthy: false
    },

    // Dashboard data
    hw: {
      gpu: null,
      cpu: { pct: 0 },
      mem: { pct: 0, used: '0', total: '0' }
    },
    hostname: '',
    selfIp: '',
    engines: [],
    models: [],
    deployments: [],
    fleet: [],

    // Polling intervals
    _timers: [],

    init() {
      // Set welcome message in current language
      this.messages = [{ role: 'system', text: this.t('welcome') }];

      this.pollSystemStatus();
      this.pollEngines();
      this.pollModels();
      this.pollDeployments();
      this.pollFleet();
      this.pollAgentInfo();

      this._timers.push(setInterval(() => this.pollSystemStatus(), 5000));
      this._timers.push(setInterval(() => this.pollEngines(), 30000));
      this._timers.push(setInterval(() => this.pollModels(), 30000));
      this._deployPollMs = 10000;
      this._deployTimer = setInterval(() => this.pollDeployments(), 10000);
      this._timers.push(setInterval(() => this.pollFleet(), 10000));
      this._timers.push(setInterval(() => this.pollAgentInfo(), 30000));

      this.$nextTick(() => {
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      });
    },

    destroy() {
      this._timers.forEach(t => clearInterval(t));
      this._timers = [];
      if (this._deployTimer) clearInterval(this._deployTimer);
    },

    // ── API helpers ──

    async callToolRaw(name, params) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.apiKey) headers['Authorization'] = 'Bearer ' + this.apiKey;
      try {
        const resp = await fetch('/api/v1/tools/' + encodeURIComponent(name), {
          method: 'POST',
          headers,
          body: JSON.stringify(params || {})
        });
        if (resp.status === 401) {
          this.systemOnline = false;
          this.showSettings = true;
          return { _err: 'unauthorized' };
        }
        return await resp.json();
      } catch (e) {
        this.systemOnline = false;
        return { _err: e.message };
      }
    },

    async callTool(name, params) {
      const raw = await this.callToolRaw(name, params);
      if (raw._err) return { _err: raw._err };
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        const text = raw.content[0].text || '';
        if (raw.isError) return { _err: text };
        try { return JSON.parse(text); } catch { return { _raw: text }; }
      }
      return raw;
    },

    // Helper to get a single config value (returns string or null)
    async getConfig(key) {
      const raw = await this.callToolRaw('system.config', { key: key });
      if (raw._err) return null;
      if (raw.content && Array.isArray(raw.content) && raw.content.length > 0) {
        var text = raw.content[0].text || '';
        if (raw.isError) return null;
        // system.config get returns plain text like the value, or JSON with a value field
        try {
          var parsed = JSON.parse(text);
          return parsed.value !== undefined ? String(parsed.value) : text;
        } catch {
          return text;
        }
      }
      return null;
    },

    // ── Polling functions ──

    async pollSystemStatus() {
      const data = await this.callTool('system.status');
      if (data._err) return;
      this.systemOnline = true;

      // Capture hostname from backend
      if (data.hostname) {
        this.hostname = data.hostname;
      }
      // Get IP from browser's location (what user used to access this device)
      if (!this.selfIp) {
        const h = window.location.host || '';
        this.selfIp = h.split(':')[0];  // strip port
      }

      const hw = data.hardware;
      const met = data.metrics;

      if (hw && hw.gpu) {
        const g = hw.gpu;
        const gm = (met && met.gpu) || {};
        const memTotal = gm.memory_total_mib || g.vram_mib || 0;
        const memUsed = gm.memory_used_mib || 0;
        const memPct = memTotal > 0 ? Math.round(memUsed / memTotal * 100) : 0;
        this.hw.gpu = {
          name: g.name || 'GPU',
          util: gm.utilization_percent || 0,
          memTotal: this.fmtMiB(memTotal),
          memUsed: this.fmtMiB(memUsed),
          memPct: memPct,
          temp: gm.temperature_celsius || g.temperature_celsius || 0,
          power: gm.power_draw_watts || g.power_draw_watts || 0
        };
      } else {
        this.hw.gpu = null;
      }

      if (met && met.cpu) {
        this.hw.cpu.pct = Math.round(met.cpu.usage_percent || 0);
      }

      if (met && met.ram) {
        const mt = met.ram.total_mib || 0;
        const mu = met.ram.used_mib || 0;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(mt)
        };
      } else if (hw && hw.ram) {
        const mt = hw.ram.total_mib || 0;
        const avail = hw.ram.available_mib || 0;
        const mu = mt - avail;
        this.hw.mem = {
          pct: mt > 0 ? Math.round(mu / mt * 100) : 0,
          used: this.fmtMiB(mu),
          total: this.fmtMiB(mt)
        };
      }
    },

    async pollEngines() {
      const data = await this.callTool('engine.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.engines = list.map(e => ({
        id: e.id || (e.type + (e.tag || '')),
        type: e.type || 'unknown',
        variant: e.tag || '',
        available: e.available !== false
      }));
    },

    async pollModels() {
      const data = await this.callTool('model.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.models = list.map(m => ({
        name: m.name || 'unknown',
        size: this.fmtModelSize(m.size_bytes || 0, m.format || '')
      }));
    },

    async pollDeployments() {
      const data = await this.callTool('deploy.list');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      const hasStarting = list.some(d => d.phase === 'starting' || (d.phase === 'running' && !d.ready));
      this.deployments = list.map(d => {
        let eta = '';
        if (d.estimated_total_s && d.startup_progress > 0 && d.startup_progress < 100) {
          const elapsed = d.estimated_total_s * d.startup_progress / 100;
          const remaining = Math.max(0, d.estimated_total_s - elapsed);
          eta = remaining >= 60 ? Math.ceil(remaining / 60) + 'm' : Math.ceil(remaining) + 's';
        }
        return {
          name: d.name || 'unknown',
          phase: d.phase || 'unknown',
          ready: d.ready || false,
          address: d.address || '',
          detail: [d.runtime, d.ready ? d.address : d.phase].filter(Boolean).join(' '),
          startup_phase: d.startup_phase || '',
          startup_progress: d.startup_progress || 0,
          startup_message: d.startup_message || '',
          error_lines: d.error_lines || '',
          eta
        };
      });
      // Adaptive polling: 3s during startup, 10s when stable
      this._adjustDeployPoll(hasStarting);
    },

    _adjustDeployPoll(fast) {
      const want = fast ? 3000 : 10000;
      if (this._deployPollMs === want) return;
      this._deployPollMs = want;
      if (this._deployTimer) clearInterval(this._deployTimer);
      this._deployTimer = setInterval(() => this.pollDeployments(), want);
    },

    async pollFleet() {
      const data = await this.callTool('fleet.list_devices');
      if (data._err) return;
      const list = Array.isArray(data) ? data : [];
      this.fleet = list.map(d => ({
        id: d.id || d.name || 'unknown',
        name: d.name || d.id || 'unknown',
        online: d.online !== false,
        meta: (d.models && d.models.length > 0) ? d.models.join(', ') : (d.addr_v4 || ''),
        addr: d.addr_v4 || '',
        port: d.port || 6188
      }));
    },

    openDeviceUI(device) {
      if (!device.addr) return;
      const url = `http://${device.addr}:${device.port}/ui/`;
      window.open(url, '_blank');
    },

    // Combined agent status + LLM config polling
    async pollAgentInfo() {
      // Fetch agent.status
      const statusData = await this.callTool('agent.status');
      if (!statusData._err) {
        this.agentInfo.zeroclawAvailable = statusData.zeroclaw_available === true;
        this.agentInfo.zeroclawHealthy = statusData.zeroclaw_healthy === true;
      }

      // Fetch LLM config from system.config
      var endpoint = await this.getConfig('llm.endpoint');
      if (endpoint && endpoint !== '***') this.agentInfo.llmEndpoint = endpoint;

      var model = await this.getConfig('llm.model');
      if (model && model !== '***') this.agentInfo.llmModel = model;

      var ua = await this.getConfig('llm.user_agent');
      if (ua && ua !== '***') this.agentInfo.llmUserAgent = ua;

      // Update agentAvailable based on combined info
      this.agentAvailable = this.agentInfo.zeroclawAvailable === true ||
        this._agentConfirmed === true ||
        (this.agentInfo.llmEndpoint !== '' && this.agentInfo.llmModel !== '');
    },
    _agentConfirmed: false,

    // ── Chat ──

    async send() {
      const text = this.input.trim();
      if (!text || this.thinking) return;
      this.input = '';

      // Clear welcome message on first user input
      if (this.messages.length === 1 && this.messages[0].role === 'system') {
        this.messages = [];
      }

      this.messages.push({ role: 'user', text });
      this.thinking = true;
      this.scrollChat();

      await this.sendAgent(text);

      this.thinking = false;
      this.scrollChat();
      this.$nextTick(() => { if (this.$refs.chatInput) this.$refs.chatInput.focus(); });
    },

    async sendAgent(text) {
      const params = { query: text };
      if (this.sessionId) params.session_id = this.sessionId;

      // Show a tool call for the agent.ask being executed
      const toolIndex = this.messages.length;
      const startTime = Date.now();
      this.messages.push({
        role: 'tool',
        toolName: 'agent.ask',
        args: { query: text },
        status: 'running',
        expanded: false,
        startTime: startTime
      });
      this.scrollChat();

      const data = await this.callTool('agent.ask', params);
      const duration = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

      if (data._err) {
        // Update tool status using splice for reactivity
        this.messages.splice(toolIndex, 1, {
          ...this.messages[toolIndex],
          status: 'error',
          result: data._err,
          duration: duration
        });
        this._agentConfirmed = false;
        this.agentAvailable = false;
        await this.sendDirect(text);
        return;
      }

      this._agentConfirmed = true;
      this.agentAvailable = true;
      if (data.session_id) this.sessionId = data.session_id;

      // Update tool status using splice for reactivity
      this.messages.splice(toolIndex, 1, {
        ...this.messages[toolIndex],
        status: 'success',
        result: data,
        duration: duration
      });

      // If response contains tool_calls, display them
      if (data.tool_calls && Array.isArray(data.tool_calls)) {
        for (const tc of data.tool_calls) {
          this.messages.push({
            role: 'tool',
            toolName: tc.name || tc.tool || 'unknown',
            args: tc.args || tc.arguments || {},
            status: tc.error ? 'error' : 'success',
            result: tc.result || tc.error || null,
            expanded: false
          });
        }
      }

      // Show final AI response
      const result = data.result || data._raw || data.response || JSON.stringify(data);
      this.messages.push({ role: 'ai', text: result });
      this.scrollChat();
    },

    async sendDirect(text) {
      const toolMap = {
        'status': 'system.status',
        'hardware': 'hardware.detect',
        'detect': 'hardware.detect',
        'metrics': 'hardware.metrics',
        'models': 'model.list',
        'engines': 'engine.list',
        'deployments': 'deploy.list',
        'deploys': 'deploy.list',
        'fleet': 'fleet.list_devices',
        'devices': 'fleet.list_devices'
      };

      const lower = text.toLowerCase().trim();

      if (lower === 'help' || lower === '?') {
        this.messages.push({ role: 'ai', text: this.t('help_text') });
        this.scrollChat();
        return;
      }

      if (toolMap[lower]) {
        const toolName = toolMap[lower];
        const toolIndex = this.messages.length;

        // Show tool call
        this.messages.push({
          role: 'tool',
          toolName: toolName,
          args: {},
          status: 'running',
          expanded: false
        });
        this.scrollChat();

        const data = await this.callTool(toolName);

        if (data._err) {
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'error',
            result: data._err
          });
          this.messages.push({ role: 'error', text: 'Error: ' + data._err });
        } else {
          this.messages.splice(toolIndex, 1, {
            ...this.messages[toolIndex],
            status: 'success',
            result: data
          });
          this.messages.push({ role: 'ai', text: JSON.stringify(data, null, 2) });
        }
        this.scrollChat();
        return;
      }

      this.messages.push({ role: 'error', text: this.t('agent_unavailable') });
    },

    scrollChat() {
      this.$nextTick(() => {
        const el = this.$refs.chatMessages;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    // ── Settings modal ──

    async openSettings() {
      this.settingsFeedback = null;
      this.settingsForm.apiKey = this.apiKey;
      this.settingsForm.llmEndpoint = this.agentInfo.llmEndpoint || '';
      this.settingsForm.llmModel = this.agentInfo.llmModel || '';
      this.settingsForm.llmApiKey = '';
      this.settingsForm.llmUserAgent = this.agentInfo.llmUserAgent || '';
      this.showSettings = true;
    },

    async saveSettings() {
      this.settingsSaving = true;
      this.settingsFeedback = null;
      var errors = [];

      // Save AIMA API key to localStorage
      this.apiKey = this.settingsForm.apiKey;
      if (this.apiKey) {
        localStorage.setItem('aima_api_key', this.apiKey);
      } else {
        localStorage.removeItem('aima_api_key');
      }

      // Save LLM config to server via system.config set
      // Always send these (empty string = reset to default)
      var r = await this.callTool('system.config', { key: 'llm.endpoint', value: this.settingsForm.llmEndpoint });
      if (r._err) errors.push('llm.endpoint: ' + r._err);
      var r2 = await this.callTool('system.config', { key: 'llm.model', value: this.settingsForm.llmModel });
      if (r2._err) errors.push('llm.model: ' + r2._err);
      // Only send api_key if non-empty (empty = "don't change", form starts blank for security)
      if (this.settingsForm.llmApiKey) {
        var r3 = await this.callTool('system.config', { key: 'llm.api_key', value: this.settingsForm.llmApiKey });
        if (r3._err) errors.push('llm.api_key: ' + r3._err);
      }
      var r4 = await this.callTool('system.config', { key: 'llm.user_agent', value: this.settingsForm.llmUserAgent });
      if (r4._err) errors.push('llm.user_agent: ' + r4._err);

      this.settingsSaving = false;

      if (errors.length > 0) {
        this.settingsFeedback = { type: 'error', text: this.t('settings_error') + ' ' + errors.join('; ') };
      } else {
        this.settingsFeedback = { type: 'success', text: this.t('settings_saved') };
        // Refresh agent info
        await this.pollAgentInfo();
        // Auto-close after brief delay
        setTimeout(() => { this.showSettings = false; this.settingsFeedback = null; }, 1200);
      }
    },

    async clearSettings() {
      this.apiKey = '';
      localStorage.removeItem('aima_api_key');
      this.settingsForm = { apiKey: '', llmEndpoint: '', llmModel: '', llmApiKey: '', llmUserAgent: '' };

      // Clear server-side config
      await this.callTool('system.config', { key: 'llm.endpoint', value: '' });
      await this.callTool('system.config', { key: 'llm.model', value: '' });
      await this.callTool('system.config', { key: 'llm.api_key', value: '' });
      await this.callTool('system.config', { key: 'llm.user_agent', value: '' });

      this.agentInfo.llmEndpoint = '';
      this.agentInfo.llmModel = '';
      this.settingsFeedback = { type: 'success', text: this.t('settings_cleared') };
      setTimeout(() => { this.settingsFeedback = null; }, 2000);
    },

    // Mobile tab
    setMobileTab(tab) {
      this.mobileTab = this.mobileTab === tab ? 'chat' : tab;
    },

    // Global keyboard shortcut
    handleGlobalKey(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (this.$refs.chatInput) this.$refs.chatInput.focus();
      }
    },

    // ── Helpers ──

    truncateUrl(url) {
      if (!url) return '';
      // Remove protocol prefix for display
      var short = url.replace(/^https?:\/\//, '');
      return short.length > 24 ? short.substring(0, 22) + '...' : short;
    },

    fmtMiB(mib) {
      if (!mib || mib <= 0) return '0M';
      if (mib >= 1024) return (mib / 1024).toFixed(1) + 'G';
      return mib + 'M';
    },

    fmtModelSize(bytes, format) {
      if (bytes > 0) {
        const gb = bytes / (1024 * 1024 * 1024);
        return gb >= 1 ? gb.toFixed(1) + 'G' : (bytes / (1024 * 1024)).toFixed(0) + 'M';
      }
      return format || '';
    }
  };
}
</script>
