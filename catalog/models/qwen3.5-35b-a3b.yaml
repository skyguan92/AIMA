kind: model_asset
metadata:
  name: qwen3.5-35b-a3b
  type: llm
  family: qwen
  parameter_count: "35B"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    # BF16 全精度 ~72GB
    - type: huggingface
      repo: Qwen/Qwen3.5-35B-A3B
      format: safetensors
    # FP8 预量化 ~36GB
    - type: huggingface
      repo: Qwen/Qwen3.5-35B-A3B-FP8
      format: safetensors
    # GGUF 量化 (Q4_K_M=21GB, Q8_0=37GB)
    - type: huggingface
      repo: unsloth/Qwen3.5-35B-A3B-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3.5-35B-A3B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # BF16 权重 ~72GB, 128GB unified 可容纳
  # MoE 35B total / 3B active, 支持视觉 + 思考模式
  # qwen3_5_moe 架构需要 vllm-nightly (stable vLLM 尚不支持)
  - name: qwen3.5-35b-a3b-blackwell-vllm-nightly-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 40960
      unified_memory: true
    engine: vllm-nightly
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.8
      max_model_len: 128000
      dtype: bfloat16
      enable_chunked_prefill: false
    expected_performance:
      tokens_per_second: [27, 30]        # measured: 29.6 tok/s steady-state
      latency_first_token_ms: [96, 133]  # measured: TTFT 96~133ms (3-run avg)
      tpot_ms: [31, 34]                  # measured: TPOT 31.5~33.6ms
      vram_mib: 67100                    # measured: 65.53 GiB model load
      notes: "vLLM v0.16.0rc2 (qwen3_5-cu130), FLASH_ATTN backend, 2026-02-28"

  # --- linux-1 (Ada, 2× RTX 4090 = 48GB total) ---
  # FP8 权重 ~36GB, TP=2 → 每 GPU 18GB, 24GB VRAM 充裕
  # vram_min_mib: 20480 → 排除 RTX 4060 (8GB), 仅 4090 (24GB) 匹配
  - name: qwen3.5-35b-a3b-ada-vllm-fp8
    hardware:
      gpu_arch: Ada
      vram_min_mib: 20480
      unified_memory: false
    engine: vllm
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.85
      max_model_len: 4096
      dtype: auto
      tensor_parallel_size: 2
    expected_performance:
      tokens_per_second: [10, 25]
      latency_first_token_ms: [40, 150]

  # --- 所有设备通用 (llamacpp + GGUF Q4_K_M=21GB) ---
  # amd395 (128GB unified) ✓, linux-1 fallback
  # dev-win (8GB) / mac-m4 (16GB) 需大量 CPU offload
  - name: qwen3.5-35b-a3b-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
    engine: llamacpp
    format: gguf
    default_config:
      n_gpu_layers: 999
      ctx_size: 4096
    expected_performance:
      tokens_per_second: [3, 15]
      latency_first_token_ms: [80, 400]
