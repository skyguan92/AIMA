kind: model_asset
metadata:
  name: qwen3.5-9b
  type: llm
  family: qwen
  parameter_count: "9B"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3.5-9B
      format: safetensors
    - type: huggingface
      repo: unsloth/Qwen3.5-9B-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3.5-9B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 120GB unified) ---
  # BF16 weights ~18GB, 120GB unified memory 充裕
  # Qwen3.5-9B dense (非 MoE), 原生多模态 (文本+视觉)
  # qwen3_5 架构需要 vllm-nightly (stable vLLM 尚不支持)
  # gpu_memory_utilization 0.25 on 120GB ≈ 30GB → 足够 18GB 权重 + KV cache
  - name: qwen3.5-9b-blackwell-vllm-nightly-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 10240
      unified_memory: true
    engine: vllm-nightly
    format: safetensors
    compatibility:
      repair_init_commands:
        - 'python3 -m pip install --no-cache-dir --upgrade https://github.com/huggingface/transformers/archive/refs/heads/main.tar.gz'
    default_config:
      gpu_memory_utilization: 0.25
      max_model_len: 65536
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      startup_time_s: 60
      cold_start_time_s: 120
      tokens_per_second: [13, 17]
      latency_first_token_ms: [30, 200]
      vram_mib: 18000
      notes: "Qwen3.5-9B dense, BF16, GB10 120GB unified LPDDR5X (273 GB/s). Estimated decode ~15 tok/s (memory-bandwidth bound: 273/18≈15). Native multimodal (vision+text)."

  # --- RTX 4090 (Ada, 2× 48GB) ---
  # BF16 weights ~18GB, 单卡 48GB 充裕
  - name: qwen3.5-9b-ada-vllm-nightly-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 16384
      unified_memory: false
    engine: vllm-nightly
    format: safetensors
    compatibility:
      repair_init_commands:
        - 'python3 -m pip install --no-cache-dir --upgrade https://github.com/huggingface/transformers/archive/refs/heads/main.tar.gz'
    default_config:
      gpu_memory_utilization: 0.80
      max_model_len: 32768
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      startup_time_s: 30
      cold_start_time_s: 90
      tokens_per_second: [40, 60]
      latency_first_token_ms: [15, 100]
      vram_mib: 36000
      notes: "Qwen3.5-9B dense, BF16, single RTX 4090 48GB. HBM bandwidth ~1TB/s → estimated 50+ tok/s decode."

  # --- 所有设备通用 (llamacpp + GGUF) ---
  # Q4_K_M ~5.5GB → 适合低 VRAM 设备
  - name: qwen3.5-9b-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
    engine: llamacpp
    format: gguf
    default_config:
      quantization: int4
      n_gpu_layers: 999
      ctx_size: 8192
    expected_performance:
      startup_time_s: 15
      cold_start_time_s: 30
      tokens_per_second: [10, 40]
      latency_first_token_ms: [30, 150]
