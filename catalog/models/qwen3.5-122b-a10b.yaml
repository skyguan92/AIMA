kind: model_asset
metadata:
  name: qwen3.5-122b-a10b
  type: llm
  family: qwen
  parameter_count: "122B"
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- linux-1 (Ada, 2× RTX 4090 = 96GB VRAM, KTransformers hybrid) ---
  # 122B total / 10B active per token, 256 experts, 8 experts/tok
  # BF16 weights ~244GB — far exceeds 96GB VRAM
  # KTransformers offloads inactive experts to CPU (503GB RAM, Xeon 8488C AMX)
  # gpu_experts=30 + cpuinfer=64 optimal (sweep tested 6 params × 16 configs)
  - name: qwen3.5-122b-a10b-ada-sglang-kt-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 20480
      unified_memory: false
    engine: sglang-kt
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
    default_config:
      kt_num_gpu_experts: 30
      kt_method: BF16
      kt_cpuinfer: 64
      kt_threadpool_count: 1
      tp_size: 2
      mem_fraction_static: 0.85
      disable_shared_experts_fusion: true
      enable_p2p_check: true
      chunked_prefill_size: 32768
      max_running_requests: 16
      attention_backend: triton
      context_length: 131072
      reasoning_parser: qwen3
      tool_call_parser: qwen3_coder
    expected_performance:
      tokens_per_second: [21, 23]
      vram_mib: 84232
      notes: "KTransformers + SGLang hybrid, 2× RTX 4090 + Xeon 8488C AMX. 256 experts, 30 on GPU, rest CPU-offloaded via AMX. 228GB RAM. Optimal params from 22-config sweep: gpu_experts=30 (+5 tok/s vs 15), cpuinfer=64 (+3% vs 40). 2026-03-03."
