kind: model_asset
metadata:
  name: qwen3.5-122b-a10b
  type: llm
  family: qwen
  parameter_count: "122B"
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- linux-1 (Ada, 2× RTX 4090 = 96GB VRAM, KTransformers hybrid) ---
  # 122B total / 10B active per token, 256 experts, 8 experts/tok
  # BF16 weights ~244GB — far exceeds 96GB VRAM
  # KTransformers offloads inactive experts to CPU (503GB RAM, Xeon 8488C AMX)
  # gpu_experts=30 + cpuinfer=64 optimal (sweep tested 6 params × 16 configs)
  - name: qwen3.5-122b-a10b-ada-sglang-kt-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 20480
      unified_memory: false
    engine: sglang-kt
    format: safetensors
    source:
      type: huggingface
      repo: Qwen/Qwen3.5-122B-A10B
    default_config:
      kt_num_gpu_experts: 30
      kt_method: BF16
      kt_cpuinfer: 64
      kt_threadpool_count: 1
      tp_size: 2
      mem_fraction_static: 0.85
      disable_shared_experts_fusion: true
      enable_p2p_check: true
      chunked_prefill_size: 32768
      max_running_requests: 16
      attention_backend: triton
      context_length: 131072
      reasoning_parser: qwen3
      tool_call_parser: qwen3_coder
    expected_performance:
      tokens_per_second: [21, 23]
      vram_mib: 84232
      notes: "KTransformers + SGLang hybrid, 2× RTX 4090 + Xeon 8488C AMX. 256 experts, 30 on GPU, rest CPU-offloaded via AMX. 228GB RAM. Optimal params from 22-config sweep: gpu_experts=30 (+5 tok/s vs 15), cpuinfer=64 (+3% vs 40). 2026-03-03."

  # --- AMD W7900D RDNA3 (8× 48GB, vLLM ROCm) ---
  # BLOCKED: Qwen3_5MoeForConditionalGeneration (multimodal MoE + Gated-DeltaNet hybrid)
  # requires transformers>=5.0 AND vLLM native qwen3_5_moe support
  # vLLM ROCm 0.16.0 (transformers 4.57.6) does not support this architecture
  # Tested 2026-04-02: pip upgrade transformers → model recognized,
  #   but vLLM has no Qwen3_5Moe model class. --model-impl transformers fails
  #   (ConditionalGeneration not compatible with CausalLM backend).
  #   TransformersMultiModalMoEForCausalLM override fails at weight loading
  #   (model.mtp + model.visual modules not mapped).
  # BF16 ~244GB / TP=8 = ~30.5GB/GPU would fit comfortably if supported.
  #
  # --- AMD W7900D RDNA3 (Ollama 0.19.0, Q4_K_M GGUF) ---
  # BLOCKED: GPU offload fails — Ollama offloads 0/49 layers to GPU (100% CPU)
  # Tested 2026-04-02: Ollama 0.19.0, qwen3.5:122b Q4_K_M (81GB), 8× W7900D gfx1100
  #   Ollama scheduler creates empty GPULayers=[], forces all weights to CPU
  #   Even with num_gpu=49, still 0 layers offloaded — architecture not supported on RDNA3
  #   CPU-only performance: ~2 tok/s (Xeon 8488C 64-thread), not usable for inference
  #   Root cause: ggml ROCm backend lacks MoE + Gated-DeltaNet kernels for gfx1100
  #   Same class of issue as Qwen3-Coder-Next (512 experts, MUL_MAT_ID crash)
