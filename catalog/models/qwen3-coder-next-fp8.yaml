kind: model_asset
metadata:
  name: qwen3-coder-next-fp8
  type: llm
  family: qwen
  parameter_count: "80B"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    # FP8 预量化权重 (F8_E4M3 + BF16 混合), ~80GB
    - type: huggingface
      repo: Qwen/Qwen3-Coder-Next-FP8
      format: safetensors
    # GGUF 量化 (Q4_K_M=48GB, Q8_0=85GB)
    - type: huggingface
      repo: Qwen/Qwen3-Coder-Next-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3-Coder-Next-FP8
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # FP8 权重 ~80GB, 128GB unified memory 可容纳
  # MoE 80B total / 3B active, 推理高效
  # qwen3_next 架构需要 vllm-nightly (stable vLLM/NGC 26.01 尚不支持)
  - name: qwen3-coder-next-fp8-blackwell-vllm-nightly-fp8
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 81920
      unified_memory: true
    engine: vllm-nightly
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.85
      max_model_len: 262144
      dtype: auto
      enable_chunked_prefill: true
    expected_performance:
      tokens_per_second: [0.2, 42.5]       # decode 42.5 tok/s @1K → 0.2 tok/s @262K
      latency_first_token_ms: [239, 141200] # TTFT 239ms @1K → 141.2s @262K
      tpot_ms: [22.3, 46.6]               # measured: TPOT 22.3~46.6ms
      vram_mib: 113691                     # measured: 110.8 GiB model load (unified mem)
      max_context_tokens: 262144           # model max_position_embeddings, GB10 verified stable
      notes: "Two engines tested; scitrera/dgx-spark-vllm:0.14.1-t5 (vllm-spark) has 2-3x better prefill than qwen3_5-cu130 (official nightly). Note: vllm-spark supports Qwen3NextForCausalLM only; qwen3_5-cu130 supports both Qwen3NextForCausalLM + Qwen3_5MoeForConditionalGeneration."
      # --- Engine A: scitrera/dgx-spark-vllm (vllm-spark, best prefill) ---
      engine_comparison:
        scitrera-dgx-spark-vllm:
          version: "vLLM v0.14.1 (scitrera.ai build, CUDA 13.1, PyTorch 2.10, FlashInfer, Transformers 5)"
          attention: FLASH_ATTN
          prefill_peak_tps: 9937            # @16K, 2.2x faster than official nightly (measured on v0.14.0)
          supported_archs: [Qwen3NextForCausalLM]  # does NOT support Qwen3_5MoeForConditionalGeneration
          notes: "scitrera/dgx-spark-vllm:0.14.1-t5, SM121 (Blackwell) optimized. Recommended for long-context code gen."
          context_scaling:
            1024:   [0.239,  42.5, 4280]
            2048:   [0.301,  38.4, 6801]
            4096:   [0.466,  40.3, 8795]
            8192:   [0.853,  37.0, 9602]
            16384:  [1.649,  31.9, 9937]    # prefill peak
            32768:  [3.347,  24.5, 9791]
            65536:  [7.067,  16.5, 9274]
            128000: [15.890, 6.8,  8055]
          concurrency_1k:
            1: [41.4,  242,  22.4]
            2: [65.3,  286,  28.6]
            4: [96.3,  548,  37.5]
            8: [126.5, 910,  55.6]
        # --- Engine B: vllm/vllm-openai:qwen3_5-cu130 (official nightly) ---
        qwen3_5-cu130:
          version: "vLLM v0.16.0rc2.dev376 (official nightly, CUDA 13.0)"
          attention: TRITON_ATTN
          prefill_peak_tps: 4745            # @8K, 2.1x slower than custom
          supported_archs: [Qwen3NextForCausalLM, Qwen3_5MoeForConditionalGeneration]
          notes: "Official nightly. Better concurrency scaling (+21% @8-way). max_model_len=262144 verified."
          context_scaling:
            1024:   [0.280,  41.1, 3570]
            2048:   [0.451,  38.7, 4433]
            4096:   [0.859,  34.3, 4658]
            8192:   [1.686,  27.8, 4745]
            16384:  [3.514,  19.5, 4610]
            32768:  [7.624,  11.8, 4276]
            65536:  [18.079, 5.9,  3617]
            128000: [47.635, 2.5,  2750]
            192000: [85.6,   0.4,  2244]
            220000: [106.4,  0.3,  2068]
            240000: [122.7,  0.2,  1956]
            256000: [135.6,  0.2,  1888]
            262000: [141.2,  0.2,  1855]    # max context, stable
          concurrency_1k:
            1: [42.6,  174,  22.3]
            2: [68.5,  219,  27.7]
            4: [104.1, 362,  35.8]
            8: [145.6, 530,  51.1]

  # --- 通用 llamacpp (GGUF Q4_K_M=48GB) ---
  # amd395 (128GB unified) ✓, linux-1 (24GB/GPU + 1TB RAM, GPU+CPU offload) ✓
  # FP8 80GB >> 2×24GB=48GB TP=2，不设 Ada-vllm
  # dev-win (8GB) / mac-m4 (16GB) 太小，需极大量 CPU offload
  - name: qwen3-coder-next-fp8-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
    engine: llamacpp
    format: gguf
    default_config:
      n_gpu_layers: 999
      ctx_size: 4096
    expected_performance:
      tokens_per_second: [3, 15]
      latency_first_token_ms: [100, 500]
