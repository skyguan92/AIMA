kind: model_asset
metadata:
  name: qwen3-coder-next-fp8
  type: llm
  family: qwen
  parameter_count: "80B"
storage:
  formats: [safetensors, gguf]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    # FP8 预量化权重 (F8_E4M3 + BF16 混合), ~80GB
    - type: huggingface
      repo: Qwen/Qwen3-Coder-Next-FP8
      format: safetensors
    # GGUF 量化 (Q4_K_M=48GB, Q8_0=85GB)
    - type: huggingface
      repo: Qwen/Qwen3-Coder-Next-GGUF
      format: gguf
    - type: modelscope
      repo: Qwen/Qwen3-Coder-Next-FP8
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # FP8 权重 ~80GB, 128GB unified memory 可容纳
  # MoE 80B total / 3B active, 推理高效
  # qwen3_next 架构需要 vllm-nightly (stable vLLM/NGC 26.01 尚不支持)
  - name: qwen3-coder-next-fp8-blackwell-vllm-nightly-fp8
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 81920
      unified_memory: true
    engine: vllm-nightly
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.85
      max_model_len: 262144
      dtype: auto
      enable_chunked_prefill: true
    expected_performance:
      tokens_per_second: [6.8, 42.5]       # decode 42.5 tok/s @1K → 6.8 tok/s @128K
      latency_first_token_ms: [239, 15890]  # TTFT 239ms @1K → 15890ms @128K
      tpot_ms: [22.4, 28.7]                # measured: TPOT 22.4~28.7ms
      vram_mib: 113691                      # measured: 110.8 GiB model load (unified mem)
      notes: "vLLM v0.1.dev1+g6a3c7ede8 (aima-vllm-qwen3-omni), FLASH_ATTN backend, 2026-02-28"
      context_scaling:                      # measured: 1-concurrency, 128-200 token output
        # input_tokens: [ttft_s, decode_tok_s, prefill_tok_s]
        1024:   [0.239,  42.5, 4280]
        2048:   [0.301,  38.4, 6801]
        4096:   [0.466,  40.3, 8795]
        8192:   [0.853,  37.0, 9602]
        16384:  [1.649,  31.9, 9937]        # prefill peak
        32768:  [3.347,  24.5, 9791]
        65536:  [7.067,  16.5, 9274]
        128000: [15.890, 6.8,  8055]        # 128K full context verified
      concurrency:                          # measured: 128-token output
        # context_len: {concurrency: [total_tok_s, avg_ttft_ms, avg_tpot_ms]}
        1024:
          1: [41.4,  242,  22.4]
          2: [65.3,  286,  28.6]
          4: [96.3,  548,  37.5]
          8: [126.5, 910,  55.6]
        4096:
          1: [38.4,  448,  22.7]
          2: [57.1,  796,  28.9]
          4: [74.3, 1338,  43.4]
          8: [96.7, 2316,  64.0]
        16384:
          1: [27.1, 1646,  23.7]
          2: [36.2, 2705,  34.0]
          4: [43.0, 4471,  57.2]
        32768:
          1: [15.5, 3345,  24.4]
          2: [23.9, 5293,  41.9]
          4: [26.4, 8792,  80.5]
      kv_cache:
        total_tokens: 249696
        max_concurrent_128k: 7.68           # vLLM reported

  # --- 通用 llamacpp (GGUF Q4_K_M=48GB) ---
  # amd395 (128GB unified) ✓, linux-1 (24GB/GPU + 1TB RAM, GPU+CPU offload) ✓
  # FP8 80GB >> 2×24GB=48GB TP=2，不设 Ada-vllm
  # dev-win (8GB) / mac-m4 (16GB) 太小，需极大量 CPU offload
  - name: qwen3-coder-next-fp8-universal-llamacpp-q4
    hardware:
      gpu_arch: "*"
      vram_min_mib: 0
    engine: llamacpp
    format: gguf
    default_config:
      n_gpu_layers: 999
      ctx_size: 4096
    expected_performance:
      tokens_per_second: [3, 15]
      latency_first_token_ms: [100, 500]
