kind: model_asset
metadata:
  name: qwen3-asr-1.7b
  type: asr
  family: qwen
  parameter_count: "1.7B"
storage:
  formats: [safetensors]
  default_path_pattern: "{{.DataDir}}/models/{{.Name}}"
  sources:
    - type: huggingface
      repo: Qwen/Qwen3-ASR-1.7B
      format: safetensors
    - type: modelscope
      repo: Qwen/Qwen3-ASR-1.7B
      format: safetensors
    - type: local_path
      path: ""
variants:
  # --- CPU-only 容器 (任何硬件) ---
  # 1.7B 参数, CPU 推理, 使用 glm-asr-fastapi 引擎 (OpenAI 兼容 /v1/audio/transcriptions)
  - name: qwen3-asr-1.7b-cpu-fastapi
    hardware:
      gpu_arch: "*"
    engine: glm-asr-fastapi
    format: safetensors
    default_config:
      port: 8003
    expected_performance:
      vram_mib: 0
      notes: "CPU-only ASR inference, Qwen3-ASR-1.7B model via glm-asr-fastapi engine"

  # --- GB10 (Blackwell, 128GB unified, K3S) ---
  # BF16 权重 ~3.4GB, 128GB unified 余量充足
  # 复用 vllm-nightly (qwen3_5-cu130 镜像), gmu=0.1 (0.05 不够 CUDA context 开销)
  - name: qwen3-asr-1.7b-blackwell-vllm-nightly-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-nightly
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.1
      max_model_len: 8192
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 3870
      notes: "3.87 GiB model, KV cache 5.25 GiB (49K tokens), max audio 157s (encoder cache 2048), latency 0.14s@10s, 4-conc peak 10.4 req/s"

  # --- GB10 vllm-spark variant (vllm-spark-tf5 镜像, 已在 containerd) ---
  - name: qwen3-asr-1.7b-blackwell-vllm-spark-bf16
    hardware:
      gpu_arch: Blackwell
      vram_min_mib: 4096
      unified_memory: true
    engine: vllm-spark
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.1
      max_model_len: 8192
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 3870
      notes: "vllm-spark-tf5, needs fix_rope.py + fix_funasr_import.py patches"

  # --- linux-1 (Ada, RTX 4090, K3S) ---
  - name: qwen3-asr-1.7b-ada-vllm-nightly-bf16
    hardware:
      gpu_arch: Ada
      vram_min_mib: 4096
      unified_memory: false
    engine: vllm-nightly-audio
    format: safetensors
    default_config:
      gpu_memory_utilization: 0.14
      max_model_len: 4096
      dtype: bfloat16
      trust_remote_code: true
    expected_performance:
      vram_mib: 6630
      notes: "gmu=0.14 for triple-model coexistence (LLM gmu=0.78 leaves ~7.8GiB/GPU). 3.87GiB model + KV cache. Audio deps: librosa+soundfile via init_commands. TTS→ASR chain verified: en/zh 100% accurate. 2026-03-02."
