kind: stack_component
metadata:
  name: hami
  version: "2.4.1"
  description: "HAMi GPU virtualization middleware for fine-grained GPU sharing"

compatibility:
  aima_min: "0.1.0"

source:
  chart: "hami-2.4.1.tgz"
  airgap: "hami-airgap-images.tar"
  platforms: [linux/amd64, linux/arm64]
  download:
    linux/amd64: "https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
    linux/arm64: "https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
  mirror:
    linux/amd64: "https://ghfast.top/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
    linux/arm64: "https://ghfast.top/https://github.com/Project-HAMi/HAMi/releases/download/v2.4.1/hami-2.4.1.tgz"
  airgap_download:
    linux/amd64: "https://github.com/Approaching-AI/AIMA/releases/download/v0.1.0-images/hami-airgap-images-amd64.tar"
    linux/arm64: "https://github.com/Approaching-AI/AIMA/releases/download/v0.1.0-images/hami-airgap-images-arm64.tar"
  airgap_mirror:
    linux/amd64: "https://ghfast.top/https://github.com/Approaching-AI/AIMA/releases/download/v0.1.0-images/hami-airgap-images-amd64.tar"
    linux/arm64: "https://ghfast.top/https://github.com/Approaching-AI/AIMA/releases/download/v0.1.0-images/hami-airgap-images-arm64.tar"

install:
  method: helm
  priority: 20
  helm:
    chart: "hami-2.4.1.tgz"
    namespace: "hami-system"
    values:
      scheduler:
        defaultMem: 0
        defaultCores: 0
        kubeScheduler:
          # Disable: K3S version tag "v1.31.4+k3s1" has invalid "+" for OCI image refs.
          # Single-GPU edge devices only need HAMi device plugin, not custom scheduler.
          enabled: false
      devicePlugin:
        deviceMemoryScaling: 1.0
        runtimeClassName: nvidia

verify:
  command: "k3s kubectl get pods -n hami-system"
  ready_condition: "Running"
  timeout_s: 120
  pods:
    - namespace: hami-system
      label: "app=hami-device-plugin"
      min_ready: 1

profiles:
  Blackwell-arm64:
    extra_env:
      HAMI_DEVICE_MEMORY_SCALING: "1.0"
  nvidia-rtx4090-x86:
    extra_env:
      HAMI_DEVICE_MEMORY_SCALING: "1.0"

open_questions:
  - question: "What deviceMemoryScaling works best for vLLM on GB10?"
    hypothesis: "1.0 (no overcommit) since inference is memory-bound"
    test_method: "Deploy two models with gpu_memory_utilization=0.5 each, check OOM"
  - question: "Does HAMi work correctly with K3S containerd?"
    hypothesis: "Yes, HAMi supports containerd as runtime"
    test_method: "Install HAMi on K3S, deploy GPU workload, verify nvidia-smi in container"
  - question: "GB10 UMA: NVML nvmlDeviceGetMemoryInfo returns NVML_ERROR_NOT_SUPPORTED (code 3)"
    hypothesis: "HAMi PR #1637 (merged 2026-02-04) adds PreConfiguredDeviceMemory fallback, but not in any release yet (v2.8.0 is pre-PR). Even with fix, HAMi memory isolation effectiveness on UMA is uncertain."
    test_method: "Wait for HAMi release with PR #1637, install on GB10, verify device-plugin starts and GPU allocation works"
  - question: "Is engine-layer memory management sufficient for GB10 without HAMi?"
    hypothesis: "Yes — llama.cpp --ctx-size and vLLM gpu_memory_utilization work on UMA. 128GB unified memory bottleneck is bandwidth/compute, not capacity."
    test_method: "Deploy multi-model on GB10 with engine-level limits only, observe stability and throughput"
