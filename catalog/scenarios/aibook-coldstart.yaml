kind: deployment_scenario
metadata:
  name: aibook-coldstart
  description: "AIBook M1000 SoC cold-start: LLM + Embedding + ASR pipeline on 32GB unified memory"

target:
  hardware_profile: moore-threads-m1000-soc-arm64
  partition_strategy: ""  # no partition — engine-level gmu controls memory

deployments:
  - model: qwen3-8b
    engine: vllm-musa
    slot: ""
    role: primary
    modalities: [text]
    config:
      gpu_memory_utilization: 0.50
      max_model_len: 8192
      num_gpu_blocks_override: 256
      max_num_seqs: 1
      enforce_eager: true
      quantization: gptq
      dtype: float16
      block_size: 32
      swap_space: 0
      port: 32102
      served_model_name: musachat_local
    notes: "Pre-loaded GPTQ-Int4, ~5GB weights, gmu=0.5 → 16GB GPU alloc. 7.5 tok/s decode, 525ms TTFT. Cold start 117s."

  - model: qwen3-emb-0.6b
    engine: vllm-musa
    slot: ""
    role: auxiliary
    modalities: [embedding]
    config:
      gpu_memory_utilization: 0.20
      max_model_len: 4096
      num_gpu_blocks_override: 128
      enforce_eager: true
      block_size: 32
      swap_space: 0
      port: 32104
    notes: "1024-dim embeddings, gmu=0.2 → 6.4GB GPU alloc. 240-370ms single, 35ms/item batch-20. Cold start 80s."

  - model: funasr-paraformer-onnx
    engine: funasr
    slot: ""
    role: auxiliary
    modalities: [asr]
    config:
      port: 10095
    notes: "CPU-only ONNX ASR pipeline: FSMN-VAD + Paraformer + Punctuation. Zero GPU impact."

  - model: litetts-mnn
    engine: litetts
    slot: ""
    role: auxiliary
    modalities: [tts]
    config:
      port: 8081
    notes: "CPU-only MNN TTS: LiteTTS encoder/decoder + HiFiGAN vocoder. Zero GPU impact."

memory_budget:
  total_unified_mib: 32768
  gpu_allocated_mib: 22528  # gmu=0.5 (16GB) + gmu=0.2 (6.4GB) = 22.4GB
  cpu_reserved_mib: 5120    # OS + ASR ONNX + TTS MNN
  headroom_mib: 5120        # ~5GB safety margin
  notes: "LLM+Embedding coexist at gmu=0.70 total (26GB measured). CPU services add ~2GB. Total ~28GB/32GB."

startup_order:
  - step: 1
    model: qwen3-8b
    wait_for: health_check
    timeout_s: 180
    notes: "Start LLM first — primary service, longest cold start (117s)"
  - step: 2
    model: qwen3-emb-0.6b
    wait_for: health_check
    timeout_s: 120
    notes: "Start embedding after LLM — needs GPU memory coexistence (80s cold start)"
  - step: 3
    model: funasr-paraformer-onnx
    wait_for: port_open
    timeout_s: 30
    notes: "CPU ASR pipeline — fast startup, no GPU contention"
  - step: 4
    model: litetts-mnn
    wait_for: port_open
    timeout_s: 30
    notes: "CPU TTS — fast startup, no GPU contention"

alternative_configs:
  # If user needs the larger 30B MoE model instead of 8B
  - name: aibook-30b-solo
    description: "Single Qwen3-30B-A3B GPTQ for maximum LLM quality (no embedding)"
    replace:
      - model: qwen3-30b-a3b
        engine: vllm-musa
        config:
          gpu_memory_utilization: 0.70
          max_model_len: 8192
          quantization: gptq
          port: 32102
        notes: "30B MoE (3B active) at gmu=0.7. ~12 tok/s decode. Cannot coexist with embedding."

  # GPU ASR via MoOER instead of CPU FunASR
  # WARNING: MoOER uses ~15GB GPU — cannot coexist with LLM+EMB (total > 32GB)
  # Only viable as LLM+MoOER (no embedding) or MoOER standalone
  - name: aibook-gpu-asr
    description: "Replace CPU ASR with GPU-accelerated MoOER (higher quality, but ~15GB GPU — mutual exclusion with embedding)"
    replace:
      - model: mooer-asr-1.5b
        engine: mooer-asr-musa
        config:
          port: 32107
        notes: "GPU ASR via torch-MUSA. Measured ~15GB GPU memory. RTF 0.55-0.67 steady state, 42s warmup. Can coexist with LLM-only (16+15=31GB). CANNOT coexist with LLM+EMB (total > 32GB)."

verified:
  date: "2026-03-27"
  hardware: moore-threads-m1000-soc-arm64
  results:
    llm_chat: pass
    embedding: pass
    llm_emb_coexist: pass
    mooer_asr: pass
    asr_onnx: untested  # FunASR integrated in mt_digitalme_sdk_server, no standalone service
    tts_mnn: fail       # PyInstaller binary missing torch_musa, crashes on startup
  notes: "LLM: 7.5 tok/s, 525ms TTFT, 117s cold start. Embedding: 240-370ms, 80s cold start. LLM+EMB coexist at 26GB/32GB. MoOER ASR: RTF 0.55-0.67, 42s warmup, ~15GB GPU — cannot triple-coexist with LLM+EMB. TTS blocked by vendor binary issue."

open_questions:
  - question: "MoOER ASR 启动后额外 GPU 内存占用是多少？能否与 LLM+EMB 三服务共存？"
    answer: "实测 ~15GB GPU（远超预估 3GB）。三服务共存会 OOM (16+6.4+15=37GB > 32GB)。仅能 LLM+MoOER 二服务共存 (16+15=31GB)。"
    verified: "2026-03-27"
  - question: "FunASR ONNX 在 ARM64 上的实时率 (RTF) 是多少？"
    answer: "未能单独测试。AIBook 上 FunASR 被集成在 mt_digitalme_sdk_server 内部，无独立 FunASR 服务端。"
    verified: "2026-03-27"
  - question: "LiteTTS MNN 在 M1000 ARM64 上的 RTF？"
    answer: "无法测试。integrated_server 二进制启动失败：RuntimeError Device string must not be empty — PyInstaller 打包环境缺少 torch_musa。需厂商更新打包。"
    verified: "2026-03-27"
