kind: engine_asset
metadata:
  name: sglang-ascend
  type: sglang
  version: "0.4.6-cann8.5"
  supported_formats: [safetensors]
image:
  name: docker.1ms.run/lmsysorg/sglang
  tag: "main-cann8.5.0-910b"
  size_approx_mb: 12000
  platforms: [linux/arm64]
patterns:
  - "^sglang-ascend"
  - "ascend.*sglang"
  - "sglang.*ascend"
  - "sglang.*910"
hardware:
  gpu_arch: Ascend910B
  vram_min_mib: 32768
startup:
  command: ["python3", "-m", "sglang.launch_server", "--model-path", "{{.ModelPath}}", "--host", "0.0.0.0", "--device", "npu", "--attention-backend", "ascend"]
  init_commands:
    - "source /usr/local/Ascend/ascend-toolkit/set_env.sh && source /usr/local/Ascend/nnal/atb/set_env.sh"
  env:
    SGLANG_NPU_USE_MLAPO: "1"
  default_args:
    port: 30000
    tp: 8
    mem_fraction_static: 0.86
    context_length: 8192
    disable_radix_cache: true
    watchdog_timeout: 9000
  health_check:
    path: /health
    timeout_s: 900
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 120
  log_patterns:
    phases:
      - name: loading_weights
        pattern: "Loading model weights|loading weights"
        progress: 40
      - name: server_starting
        pattern: "The server is fired up"
        progress: 80
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|NPU out of memory"
        message: "NPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - continuous_batching
    - ascend_attention
  performance_gain: "NPU-optimized inference with CANN backend"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 2.5
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 32768
  recommended_gpu_cores_percent: 100
time_constraints:
  cold_start_s: [120, 600]
  model_switch_s: [120, 600]
power_constraints:
  typical_draw_watts: [200, 400]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
