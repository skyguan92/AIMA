kind: engine_asset
metadata:
  name: llamacpp-universal
  type: llamacpp
  version: "b8157"
image:
  name: ghcr.io/ggml-org/llama.cpp
  tag: "server"
  size_approx_mb: 500
  platforms: [linux/amd64]
  registries:
    - ghcr.io/ggml-org/llama.cpp
    - registry.cn-hangzhou.aliyuncs.com/aima/llama-cpp-server
patterns:
  - "^llama\\.cpp$"
  - "^llama\\.cpp-server$"
  - "^llama-cpp-server$"
  - "-llama-"
  - "-llamacpp"
  - "llama.cpp"
  - "llamacpp"
  - "llama-server"
  - "llama-box"
hardware:
  gpu_arch: "*"
  vram_min_mib: 0
startup:
  command: ["llama-server", "--model", "{{.ModelPath}}", "--host", "0.0.0.0"]
  default_args:
    port: 8080
    n_gpu_layers: 999
    ctx_size: 4096
  health_check:
    path: /health
    timeout_s: 60
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 30
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - flash_attention
    - quantization_gguf
  performance_gain: "fast startup, low memory, CPU offload"
  resource_expansion:
    cpu_offload: true
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 0
  recommended_gpu_cores_percent: 30
time_constraints:
  cold_start_s: [3, 10]
  model_switch_s: [3, 10]
power_constraints:
  typical_draw_watts: [20, 60]
runtime:
  default: "auto"
  platform_recommendations:
    windows/amd64: "native"
    darwin/arm64: "native"
    darwin/amd64: "native"
    linux/amd64: "container"
source:
  binary: "llama-server"
  # 原生二进制仅 3 个平台有预编译，linux/arm64 无预编译需用容器
  platforms: [windows/amd64, darwin/arm64, linux/amd64]
  download:
    windows/amd64: "https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-win-cuda-12.4-x64.zip"
    darwin/arm64:  "https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-macos-arm64.tar.gz"
    linux/amd64:   "https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-ubuntu-x64.tar.gz"
  mirror:
    windows/amd64: "https://ghfast.top/https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-win-cuda-12.4-x64.zip"
    darwin/arm64:  "https://ghfast.top/https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-macos-arm64.tar.gz"
    linux/amd64:   "https://ghfast.top/https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-ubuntu-x64.tar.gz"
