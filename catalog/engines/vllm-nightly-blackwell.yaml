kind: engine_asset
metadata:
  name: vllm-nightly-blackwell
  type: vllm-nightly
  version: "nightly"
image:
  # vLLM nightly with CUDA 13.0 + arm64 for Blackwell SM121 (GB10)
  # Required for newer model architectures (qwen3_5_moe, etc.) not yet in stable vLLM
  name: vllm/vllm-openai
  tag: "cu130-nightly-aarch64"
  size_approx_mb: 8000
  platforms: [linux/arm64]
  registries:
    - docker.io/vllm/vllm-openai
patterns:
  - "^vllm-nightly$"
  - "vllm-nightly"
hardware:
  gpu_arch: Blackwell
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    VLLM_ATTENTION_BACKEND: TRITON_ATTN
  default_args:
    port: 8000
    gpu_memory_utilization: 0.8
    max_model_len: 128000
    enable_chunked_prefill: false
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - triton_attention
  performance_gain: "2-4x throughput vs naive serving, nightly with latest model support"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [60, 180]
  model_switch_s: [60, 180]
power_constraints:
  typical_draw_watts: [40, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
