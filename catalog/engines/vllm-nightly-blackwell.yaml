kind: engine_asset
metadata:
  name: vllm-nightly-blackwell
  type: vllm-nightly
  version: "nightly"
image:
  # vLLM Qwen3.5 专用 build, CUDA 13.0, multi-arch (含 arm64)
  # 备选 tag (按优先级):
  #   1. qwen3_5-cu130          ← 当前使用，Qwen3.5 专用 build (2026-02-23)
  #   2. cu130-nightly-aarch64  ← 滚动 nightly，不稳定但最新
  #   3. v0.17.0-cu130          ← 待发布，将是首个稳定支持 qwen3_5_moe 的版本
  name: vllm/vllm-openai
  tag: "qwen3_5-cu130"
  size_approx_mb: 8000
  platforms: [linux/arm64, linux/amd64]
  registries:
    - docker.io/vllm/vllm-openai
patterns:
  - "^vllm-nightly$"
  - "vllm-nightly"
hardware:
  gpu_arch: Blackwell
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    VLLM_ATTENTION_BACKEND: TRITON_ATTN
  default_args:
    port: 8000
    gpu_memory_utilization: 0.8
    max_model_len: 128000
    enable_chunked_prefill: false
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - triton_attention
  performance_gain: "2-4x throughput vs naive serving, nightly with latest model support"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [60, 180]
  model_switch_s: [60, 180]
power_constraints:
  typical_draw_watts: [40, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
