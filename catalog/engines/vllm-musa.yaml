kind: engine_asset
metadata:
  name: vllm-musa
  type: vllm
  version: "0.9.2-musa"
  supported_formats: [safetensors]
hardware:
  gpu_arch: MUSA
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    ENABLE_MUSA_MMA: "1"
    TRITON_CACHE_DIR: "/tmp/triton"
  default_args:
    port: 8000
    gpu_memory_utilization: 0.70
    max_model_len: 16384
    max_num_seqs: 1
    swap_space: 0
    block_size: 32
    enforce_eager: true
    dtype: auto
    served_model_name: "{{.ModelName}}"
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 120
  log_patterns:
    phases:
      - name: model_init
        pattern: "Starting to load model"
        progress: 5
      - name: loading_shards
        pattern: "Loading safetensors checkpoint shards:\\s+(\\d+)%"
        progress_regex_group: 1
        progress_base: 5
        progress_range: 55
      - name: weights_loaded
        pattern: "Loading weights took|Loading model weights"
        progress: 60
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|out of memory"
        message: "GPU memory insufficient"
      - pattern: "CreatePlatform failed"
        message: "MUSA platform init failed — check GPU device access"
      - pattern: "MUSA initialization error"
        message: "MUSA init error — display may need to be connected"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
  performance_gain: "MUSA-optimized vLLM, GPTQ quantization, enforce-eager mode"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 80
time_constraints:
  cold_start_s: [60, 300]
  model_switch_s: [60, 300]
power_constraints:
  typical_draw_watts: [30, 80]
runtime:
  default: "native"
  platform_recommendations:
    linux/arm64: "native"
