kind: engine_asset
metadata:
  name: vllm-blackwell
  type: vllm
  version: "26.01"
image:
  # NGC 官方 DGX Spark 预编译镜像，含 arm64 + Blackwell SM121 支持
  name: nvcr.io/nvidia/vllm
  tag: "26.01-py3"
  size_approx_mb: 12000
  platforms: [linux/arm64]
  registries:
    - nvcr.io/nvidia/vllm
patterns:
  - "^vllm$"
  - "^vllm-"
  - "^vllm/"
  - "-vllm"
  - "vllm/"
  - ":vllm"
  - "nvidia/vllm"
hardware:
  gpu_arch: Blackwell
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "--model", "{{.ModelPath}}"]
  default_args:
    port: 8000
    gpu_memory_utilization: 0.75
    max_model_len: 8192
  health_check:
    path: /health
    timeout_s: 300
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - flash_attention
  performance_gain: "2-4x throughput vs naive serving, Blackwell SM121 optimized"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [30, 90]
  model_switch_s: [30, 90]
power_constraints:
  typical_draw_watts: [40, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
