kind: engine_asset
metadata:
  name: mooer-asr-musa
  type: mooer
  version: "1.5"
  supported_formats: [safetensors]
hardware:
  gpu_arch: MUSA
  vram_min_mib: 15360
source:
  binary: mooer_server_aibook2
startup:
  command: ["./mooer_server_aibook2"]
  default_args:
    port: 32107
    only_ast: false
    mode: zh2en
  health_check:
    path: /health
    timeout_s: 120
  log_patterns:
    phases:
      - name: ready
        pattern: "Application startup complete|Uvicorn running|Server started"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|out of memory"
        message: "GPU memory insufficient"
api:
  protocol: custom
  base_path: /
amplifier:
  features:
    - flash_attention
  performance_gain: "MoOER ASR with flash_attn for MUSA GPU acceleration"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
runtime:
  default: "native"
  platform_recommendations:
    linux/arm64: "native"
