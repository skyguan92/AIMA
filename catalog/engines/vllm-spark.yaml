kind: engine_asset
metadata:
  name: vllm-spark
  type: vllm-spark
  version: "0.14.1"
  supported_formats: [safetensors]
image:
  # scitrera/dgx-spark-vllm: community build for DGX Spark / GB10
  # BLOCKED: all scitrera tags require CUDA 13.1 (PTX incompatible with Driver 580 / CUDA 13.0)
  # Re-enable after GB10 upgrades to Driver 590+ (DGX OS r590)
  # Source: https://github.com/scitrera/dgx-spark-vllm
  name: scitrera/dgx-spark-vllm
  tag: "0.14.1-t5"
  size_approx_mb: 25000
  platforms: [linux/arm64]
  registries:
    - docker.io/scitrera/dgx-spark-vllm
  source:
    mirror:
      docker.io:
        - docker.1ms.run/scitrera/dgx-spark-vllm
patterns:
  - "^vllm-spark"
  - "vllm-spark"
  - "spark-vllm"
hardware:
  gpu_arch: Blackwell
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    VLLM_ATTENTION_BACKEND: FLASH_ATTN
  default_args:
    port: 8000
    gpu_memory_utilization: 0.85
    max_model_len: 128000
    enable_chunked_prefill: true
    served_model_name: "{{.ModelName}}"
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_xml
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: model_init
        pattern: "Starting to load model"
        progress: 5
      - name: loading_shards
        pattern: "Loading safetensors checkpoint shards:\\s+(\\d+)%"
        progress_regex_group: 1
        progress_base: 5
        progress_range: 35
      - name: weights_loaded
        pattern: "Loading weights took|Loading model weights"
        progress: 40
      - name: torch_compile
        pattern: "torch\\.compile takes"
        progress: 50
      - name: cuda_piecewise
        pattern: "Capturing CUDA graphs \\(mixed.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 5
      - name: cuda_full
        pattern: "Capturing CUDA graphs \\(decode.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 55
        progress_range: 35
      - name: cuda_graphs
        pattern: "Capturing CUDA graph[^s].*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 40
      - name: graph_done
        pattern: "Graph capturing finished"
        progress: 92
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
      - pattern: "torch.cuda.OutOfMemoryError"
        message: "GPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - flash_attention
    - flashinfer
  performance_gain: "spark-vllm-docker: SM121 optimized, FlashInfer + FLASH_ATTN, prefill 2-3x faster than official nightly"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 2.5
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [60, 300]
  model_switch_s: [60, 300]
power_constraints:
  typical_draw_watts: [40, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
