kind: engine_asset
metadata:
  name: vllm-spark
  type: vllm-spark
  version: "main"
  supported_formats: [safetensors]
image:
  # spark-vllm-docker: community build for DGX Spark / GB10
  # Built from vLLM main + FlashInfer + Transformers 5 (glm4_moe_lite support)
  # Source: https://github.com/eugr/spark-vllm-docker
  name: vllm-spark-tf5
  tag: "latest"
  size_approx_mb: 25000
  platforms: [linux/arm64]
  registries: []
patterns:
  - "^vllm-spark"
  - "vllm-spark"
  - "spark-vllm"
hardware:
  gpu_arch: Blackwell
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  init_commands:
    - "python3 /patches/fix_rope.py"
    - "python3 /patches/fix_funasr_import.py"
  env:
    VLLM_ATTENTION_BACKEND: FLASH_ATTN
  default_args:
    port: 8000
    gpu_memory_utilization: 0.85
    max_model_len: 128000
    enable_chunked_prefill: true
    served_model_name: "{{.ModelName}}"
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_xml
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  extra_volumes:
    - name: patches
      host_path: /tmp/aima-patches
      mount_path: /patches
      read_only: true
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - flash_attention
    - flashinfer
  performance_gain: "spark-vllm-docker: SM121 optimized, FlashInfer + Transformers 5, GLM/Qwen3 arch support"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [60, 300]
  model_switch_s: [60, 300]
power_constraints:
  typical_draw_watts: [40, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
