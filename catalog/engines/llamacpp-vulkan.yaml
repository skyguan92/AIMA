kind: engine_asset
metadata:
  name: llamacpp-vulkan
  type: llamacpp
  version: "b8157"
  supported_formats: [gguf]
image:
  name: ghcr.io/ggml-org/llama.cpp
  tag: "server"
  size_approx_mb: 500
  platforms: [linux/amd64]
  registries:
    - ghcr.io/ggml-org/llama.cpp
    - registry.cn-hangzhou.aliyuncs.com/aima/llama-cpp-server
patterns:
  - "^llama\\.cpp$"
  - "^llama\\.cpp-server$"
  - "^llama-cpp-server$"
  - "-llama-"
  - "-llamacpp"
  - "llama.cpp"
  - "llamacpp"
  - "llama-server"
  - "llama-box"
hardware:
  # gpu_arch: RDNA3.5 — 精确匹配 amd395 的 Radeon 8060S (Strix Halo iGPU, RDNA3.5)
  # resolver 优先匹配精确 gpu_arch，因此 RDNA3.5 设备不会 fallback 到 llamacpp-universal
  gpu_arch: RDNA3.5
  vram_min_mib: 0
startup:
  command: ["llama-server", "--model", "{{.ModelPath}}", "--host", "0.0.0.0"]
  default_args:
    port: 8080
    n_gpu_layers: 999
    ctx_size: 4096
  health_check:
    path: /health
    timeout_s: 60
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 30
  log_patterns:
    phases:
      - name: loading_model
        pattern: "llm_load_print_meta|loading model"
        progress: 50
      - name: ready
        pattern: "HTTP server listening|server listening"
        progress: 100
    errors:
      - pattern: "failed to load model|unable to load model"
        message: "Model load failed"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - flash_attention
    - quantization_gguf
    - vulkan_compute
  performance_gain: "Vulkan GPU acceleration for AMD RDNA3.5, fast startup, CPU offload"
  resource_expansion:
    cpu_offload: true
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 0
  recommended_gpu_cores_percent: 30
time_constraints:
  cold_start_s: [3, 10]
  model_switch_s: [3, 10]
power_constraints:
  typical_draw_watts: [20, 80]
runtime:
  default: "native"
  platform_recommendations:
    linux/amd64: "native"
source:
  binary: "llama-server"
  platforms: [linux/amd64]
  download:
    linux/amd64: "https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-ubuntu-vulkan-x64.tar.gz"
  mirror:
    linux/amd64:
      - "https://ghfast.top/https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-ubuntu-vulkan-x64.tar.gz"
      - "https://cf.ghproxy.cc/https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-ubuntu-vulkan-x64.tar.gz"
      - "https://gh-proxy.com/https://github.com/ggml-org/llama.cpp/releases/download/b8157/llama-b8157-bin-ubuntu-vulkan-x64.tar.gz"
