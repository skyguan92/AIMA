kind: engine_asset
metadata:
  name: sglang-universal
  type: sglang
  version: "0.5.9"
  supported_formats: [safetensors]
image:
  name: lmsysorg/sglang
  tag: "v0.5.9"
  size_approx_mb: 6000
  platforms: [linux/amd64, linux/arm64]
  registries:
    - docker.io/lmsysorg/sglang
    - registry.cn-hangzhou.aliyuncs.com/aima/sglang
patterns:
  - "^sglang$"
  - "^sglang-"
  - "^sglang/"
  - "-sglang"
  - "sglang"
  - "sglang/"
  - ":sglang"
hardware:
  gpu_arch: "*"
  vram_min_mib: 4096
startup:
  command: ["python3", "-m", "sglang.launch_server", "--model-path", "{{.ModelPath}}", "--host", "0.0.0.0"]
  env:
    SGLANG_DISABLE_CUDNN_CHECK: "1"
  default_args:
    port: 30000
    mem_fraction_static: 0.80
  health_check:
    path: /health
    timeout_s: 300
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: loading_weights
        pattern: "Loading model weights|loading weights"
        progress: 40
      - name: server_starting
        pattern: "The server is fired up"
        progress: 80
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - flash_infer
    - continuous_batching
    - radix_attention
  performance_gain: "1.5-3x throughput, low-latency streaming, RadixAttention cache reuse"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [30, 90]
  model_switch_s: [30, 90]
power_constraints:
  typical_draw_watts: [60, 350]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
    linux/arm64: "container"
