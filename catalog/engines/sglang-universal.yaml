kind: engine_asset
metadata:
  name: sglang-universal
  type: sglang
  version: "latest"
image:
  name: lmsysorg/sglang
  tag: "latest"
  size_approx_mb: 6000
  platforms: [linux/amd64, linux/arm64]
  registries:
    - docker.io/lmsysorg/sglang
    - registry.cn-hangzhou.aliyuncs.com/aima/sglang
patterns:              # image name patterns for matching
  - "^sglang$"
  - "^sglang-"
  - "^sglang/"
  - "-sglang"
  - "sglang"
  - "sglang/"
  - ":sglang"
hardware:
  gpu_arch: "*"
  vram_min_mib: 4096
startup:
  command: ["python3", "-m", "sglang.launch_server", "--model-path", "{{.ModelPath}}", "--host", "0.0.0.0"]
  default_args:
    port: 30000
    mem_fraction_static: 0.80
  health_check:
    path: /health
    timeout_s: 300
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - flash_infer
    - continuous_batching
    - radix_attention
  performance_gain: "1.5-3x throughput, low-latency streaming"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [30, 90]
  model_switch_s: [30, 90]
power_constraints:
  typical_draw_watts: [60, 350]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
    linux/arm64: "container"
