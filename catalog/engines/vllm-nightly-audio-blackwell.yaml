kind: engine_asset
metadata:
  name: vllm-nightly-audio-blackwell
  type: vllm-nightly-audio
  version: "nightly"
  supported_formats: [safetensors]
image:
  # Custom vLLM image with vllm[audio] pre-installed (librosa + soundfile)
  # Built from vllm/vllm-openai:qwen3_5-cu130 + pip install vllm[audio]
  name: vllm-asr-audio
  tag: "latest"
  size_approx_mb: 9000
  platforms: [linux/arm64]
patterns:
  - "^vllm-nightly-audio$"
  - "vllm-nightly-audio"
hardware:
  gpu_arch: Blackwell
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    VLLM_ATTENTION_BACKEND: TRITON_ATTN
  default_args:
    port: 8000
    gpu_memory_utilization: 0.10
    max_model_len: 8192
    served_model_name: "{{.ModelName}}"
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: model_init
        pattern: "Starting to load model"
        progress: 5
      - name: loading_shards
        pattern: "Loading safetensors checkpoint shards:\\s+(\\d+)%"
        progress_regex_group: 1
        progress_base: 5
        progress_range: 35
      - name: weights_loaded
        pattern: "Loading weights took|Loading model weights"
        progress: 40
      - name: torch_compile
        pattern: "torch\\.compile takes"
        progress: 50
      - name: cuda_piecewise
        pattern: "Capturing CUDA graphs \\(mixed.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 5
      - name: cuda_full
        pattern: "Capturing CUDA graphs \\(decode.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 55
        progress_range: 35
      - name: cuda_graphs
        pattern: "Capturing CUDA graph[^s].*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 40
      - name: graph_done
        pattern: "Graph capturing finished"
        progress: 92
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
      - pattern: "torch.cuda.OutOfMemoryError"
        message: "GPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - triton_attention
    - audio_input
  performance_gain: "vLLM nightly + audio support for ASR on Blackwell"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
  performance_multiplier: 2.5
  extends_resource_boundary: false
  effective_vram_multiplier: 1.0
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 13
time_constraints:
  cold_start_s: [120, 300]
  model_switch_s: [120, 300]
power_constraints:
  typical_draw_watts: [40, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/arm64: "container"
