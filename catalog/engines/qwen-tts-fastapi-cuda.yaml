kind: engine_asset
metadata:
  name: qwen-tts-fastapi-cuda
  type: qwen-tts-fastapi-cuda
  version: "1.0"
image:
  name: qwen3-tts-cuda-x86
  tag: "latest"
  size_approx_mb: 5000
  platforms: [linux/amd64]
patterns:
  - "^qwen-tts-fastapi-cuda$"
  - "tts-fastapi-cuda"
hardware:
  gpu_arch: Ada
  vram_min_mib: 2048
startup:
  command: ["python", "main.py", "--model", "{{.ModelPath}}", "--port", "8002", "--device", "cuda"]
  init_commands:
    - "rm -rf /model && ln -s /models /model"
  default_args:
    port: 8002
  # No health_check: TTS server is single-threaded; liveness probe
  # kills the pod during long inference requests (2-5 min).
  # health_check:
  warmup:
    enabled: false
  log_patterns:
    phases:
      - name: loading_model
        pattern: "Loading model|loading model"
        progress: 50
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "ImportError|ModuleNotFoundError"
        message: "Missing Python dependency"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - gpu_inference
    - openai_compatible_tts
  performance_gain: "CUDA GPU TTS inference"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 2048
  recommended_gpu_cores_percent: 7
time_constraints:
  cold_start_s: [10, 30]
  model_switch_s: [10, 30]
power_constraints:
  typical_draw_watts: [30, 80]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
