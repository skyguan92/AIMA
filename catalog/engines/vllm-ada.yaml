kind: engine_asset
metadata:
  name: vllm-ada
  type: vllm
  version: "0.8.5"
  supported_formats: [safetensors]
image:
  name: vllm/vllm-openai
  tag: "v0.8.5"
  size_approx_mb: 9000
  platforms: [linux/amd64]
  registries:
    - docker.io/vllm/vllm-openai
    - registry.cn-hangzhou.aliyuncs.com/aima/vllm-openai
patterns:
  - "^vllm$"
  - "^vllm-"
  - "^vllm/"
  - "-vllm"
  - "vllm/"
  - ":vllm"
hardware:
  gpu_arch: Ada
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  default_args:
    port: 8000
    gpu_memory_utilization: 0.90
    max_model_len: 8192
    served_model_name: "{{.ModelName}}"
  health_check:
    path: /health
    timeout_s: 300
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: loading_weights
        pattern: "Loading model weights"
        progress: 40
      - name: cuda_graphs
        pattern: "Capturing CUDA graph.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 40
        progress_range: 50
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
      - pattern: "torch.cuda.OutOfMemoryError"
        message: "GPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - flash_attention
  performance_gain: "2-4x throughput vs naive serving"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [30, 60]
  model_switch_s: [30, 60]
power_constraints:
  typical_draw_watts: [150, 350]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
