kind: engine_asset
metadata:
  name: vllm-rocm
  type: vllm
  version: "nightly"
image:
  # Community gfx1151 build: TheRock nightly ROCm + patched vLLM
  # https://github.com/kyuz0/amd-strix-halo-vllm-toolboxes
  name: kyuz0/vllm-therock-gfx1151
  tag: "latest"
  size_approx_mb: 15000
  platforms: [linux/amd64]
  registries:
    - docker.io/kyuz0/vllm-therock-gfx1151
patterns:
  - "^vllm$"
  - "^vllm-"
  - "^vllm/"
  - "-vllm"
  - "vllm/"
  - ":vllm"
  - "vllm-therock"
  - "gfx1151"
hardware:
  gpu_arch: RDNA3.5
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    HSA_OVERRIDE_GFX_VERSION: "11.5.1"
    VLLM_USE_TRITON_FLASH_ATTN: "1"
  default_args:
    port: 8000
    gpu_memory_utilization: 0.90
    max_model_len: 8192
    served_model_name: "{{.ModelName}}"
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - triton_flash_attention
  performance_gain: "Better throughput than llamacpp on RDNA3.5 unified memory APU"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [60, 180]
  model_switch_s: [60, 180]
power_constraints:
  typical_draw_watts: [60, 120]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
