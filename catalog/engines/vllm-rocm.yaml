kind: engine_asset
metadata:
  name: vllm-rocm
  type: vllm
  version: "nightly"
  supported_formats: [safetensors]
image:
  # Community gfx1151 build: TheRock nightly ROCm + patched vLLM
  # https://github.com/kyuz0/amd-strix-halo-vllm-toolboxes
  name: kyuz0/vllm-therock-gfx1151
  tag: "latest"
  size_approx_mb: 15000
  platforms: [linux/amd64]
  registries:
    - docker.io/kyuz0/vllm-therock-gfx1151
    - registry.cn-hangzhou.aliyuncs.com/aima/vllm-therock
patterns:
  - "^vllm$"
  - "^vllm-"
  - "^vllm/"
  - "-vllm"
  - "vllm/"
  - ":vllm"
  - "vllm-therock"
  - "gfx1151"
hardware:
  gpu_arch: RDNA3.5
  vram_min_mib: 4096
startup:
  command: ["vllm", "serve", "{{.ModelPath}}"]
  env:
    HSA_OVERRIDE_GFX_VERSION: "11.5.1"
    VLLM_USE_TRITON_FLASH_ATTN: "1"
  default_args:
    port: 8000
    gpu_memory_utilization: 0.90
    max_model_len: 8192
    served_model_name: "{{.ModelName}}"
  health_check:
    path: /health
    timeout_s: 600
  warmup:
    enabled: true
    prompt: "Hello"
    max_tokens: 1
    timeout_s: 60
  log_patterns:
    phases:
      - name: model_init
        pattern: "Starting to load model"
        progress: 5
      - name: loading_shards
        pattern: "Loading safetensors checkpoint shards:\\s+(\\d+)%"
        progress_regex_group: 1
        progress_base: 5
        progress_range: 35
      - name: weights_loaded
        pattern: "Loading weights took|Loading model weights"
        progress: 40
      - name: torch_compile
        pattern: "torch\\.compile takes"
        progress: 50
      - name: cuda_piecewise
        pattern: "Capturing CUDA graphs \\(mixed.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 5
      - name: cuda_full
        pattern: "Capturing CUDA graphs \\(decode.*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 55
        progress_range: 35
      - name: cuda_graphs
        pattern: "Capturing CUDA graph[^s].*?(\\d+)%"
        progress_regex_group: 1
        progress_base: 50
        progress_range: 40
      - name: graph_done
        pattern: "Graph capturing finished"
        progress: 92
      - name: ready
        pattern: "Application startup complete|Uvicorn running"
        progress: 100
    errors:
      - pattern: "OutOfMemoryError|CUDA out of memory"
        message: "GPU memory insufficient"
      - pattern: "torch.cuda.OutOfMemoryError"
        message: "GPU memory insufficient"
api:
  protocol: openai
  base_path: /v1
amplifier:
  features:
    - paged_attention
    - continuous_batching
    - triton_flash_attention
  performance_gain: "Better throughput than llamacpp on RDNA3.5 unified memory APU"
  resource_expansion:
    cpu_offload: false
    ssd_offload: false
    npu_offload: false
partition_hints:
  min_gpu_memory_mib: 4096
  recommended_gpu_cores_percent: 50
time_constraints:
  cold_start_s: [60, 180]
  model_switch_s: [60, 180]
power_constraints:
  typical_draw_watts: [60, 120]
runtime:
  default: "container"
  platform_recommendations:
    linux/amd64: "container"
